// SHELF TALKER — PRINT ENGINE
// Renders a completed shelf talker to a 2-up or 4-up canvas
// Paper: 8.5×11" @ 150 dpi → 1275×1650 px
// ═══════════════════════════════════════════════════════════════
const PX_PER_IN = 150;
const PAGE_W = Math.round(8.5 * PX_PER_IN); // 1275
const PAGE_H = Math.round(11  * PX_PER_IN); // 1650
const MARGIN  = Math.round(0.25 * PX_PER_IN); // 37px = 0.25"
const CROP_LEN = 18;  // px length of crop mark lines
const CROP_GAP = 6;   // px gap between artwork and crop mark

// Evaluate a formula string like "{PRICE 1}+{PRICE 2}+{PRICE 3}"
// using the current field values. Returns a string result or ''.
function evaluateFormula(formula, fields, values) {
  if (!formula || !formula.trim()) return '';
  var expr = formula;
  for (var fi = 0; fi < fields.length; fi++) {
    var field = fields[fi];
    var token = '{' + field.label + '}';
    if (expr.indexOf(token) !== -1) {
      var rawVal = values[field.id] || '0';
      var num = parseFloat(rawVal);
      if (isNaN(num)) num = 0;
      expr = expr.split(token).join(String(num));
    }
  }
  try {
    // eslint-disable-next-line no-new-func
    var result = (new Function('return (' + expr + ')'))();
    if (typeof result === 'number' && isFinite(result)) {
      return String(Math.round(result * 100) / 100);
    }
    return '';
  } catch(evalErr) {
    return '';
  }
}

// Render completed shelf-talker to an off-screen canvas.
// Returns a canvas element at (widthIn×heightIn×PX_PER_IN) px.
async function renderSTCanvas(template, fields, values) {
  const { file_data, width_in, height_in } = template;
  const W = Math.round(width_in  * PX_PER_IN);
  const H = Math.round(height_in * PX_PER_IN);

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Draw template artwork
  await new Promise(res => {
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, 0, 0, W, H); res(); };
    img.onerror = res;
    img.src = file_data;
  });

  // Draw text fields
  for (const f of fields) {
    const text = values[f.id] || '';
    if (!text && !f.required) continue;
    const box = {
      x: Math.round(f.x_pct / 100 * W),
      y: Math.round(f.y_pct / 100 * H),
      w: Math.round(f.w_pct / 100 * W),
      h: Math.round(f.h_pct / 100 * H),
    };
    drawTextField(ctx, text, box, {
      align: f.align, valign: f.valign, color: f.color,
      bold: f.bold, lineSpacing: f.line_spacing,
      wrap: f.wrap, maxLines: f.multiline ? f.max_lines : 1,
      maxFontSize: f.max_font_size, minFontSize: f.min_font_size,
      suffix: f.suffix || '',
    });
  }
  return canvas;
}

// Draw crop marks (corner) at (cx,cy), oriented by (dx,dy) signs.
function drawCropMark(ctx, cx, cy, dx, dy) {
  ctx.beginPath();
  ctx.moveTo(cx + dx*CROP_GAP, cy);
  ctx.lineTo(cx + dx*(CROP_GAP+CROP_LEN), cy);
  ctx.moveTo(cx, cy + dy*CROP_GAP);
  ctx.lineTo(cx, cy + dy*(CROP_GAP+CROP_LEN));
  ctx.stroke();
}

// Rotate a canvas 90° clockwise and return new canvas.
function rotateCanvas90(canvas) {
  const r = document.createElement('canvas');
  r.width = canvas.height; r.height = canvas.width;
  const ctx = r.getContext('2d');
  ctx.translate(r.width, 0);
  ctx.rotate(Math.PI / 2);
  ctx.drawImage(canvas, 0, 0);
  return r;
}

// Arrange shelf-talker canvases into a print page. Returns array of page canvases.
function buildPrintPages(stCanvas, layout, qty, isLandscape=false) {
  const perPage = layout==='4up' ? 4 : layout==='6up' ? 6 : 2;
  const totalPages = Math.ceil(qty / perPage);
  const pages = [];

  // Rotate landscape tags 90° for 4-up so each fills its quarter-page cell
  const src = (layout === '4up' && isLandscape)
    ? rotateCanvas90(stCanvas) : stCanvas;
  const stW = src.width, stH = src.height;
  // Compute cell size
  let cols, rows, cellW, cellH, useMargin;
  if (layout==='4up') {
    cols=2; rows=2; useMargin=true;
  } else if (layout==='6up') {
    // 6-up: 2 cols × 3 rows, no margin — fills page edge to edge (4.25" × 3.667" each at 150dpi)
    cols=2; rows=3; useMargin=false;
  } else {
    // 2-up: pick orientation that maximises shelf talker size
    const horizW = (PAGE_W - MARGIN*3) / 2;
    const horizH = PAGE_H - MARGIN*2;
    const vertW  = PAGE_W - MARGIN*2;
    const vertH  = (PAGE_H - MARGIN*3) / 2;
    const hScale = Math.min(horizW/stW, horizH/stH);
    const vScale = Math.min(vertW/stW,  vertH/stH);
    if (hScale >= vScale) { cols=2; rows=1; } else { cols=1; rows=2; }
    useMargin=true;
  }

  if (useMargin) {
    cellW = (PAGE_W - MARGIN*(cols+1)) / cols;
    cellH = (PAGE_H - MARGIN*(rows+1)) / rows;
  } else {
    cellW = PAGE_W / cols;
    cellH = PAGE_H / rows;
  }

  const scale = Math.min(cellW/stW, cellH/stH, 1); // never upscale beyond natural
  const dw = Math.round(stW * scale);
  const dh = Math.round(stH * scale);

  for (let p=0; p<totalPages; p++) {
    const page = document.createElement('canvas');
    page.width=PAGE_W; page.height=PAGE_H;
    const ctx=page.getContext('2d');
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,PAGE_W,PAGE_H);

    ctx.save();
    ctx.strokeStyle='#999999';
    ctx.lineWidth=0.75;

    // 6-up: draw full-page dashed cut guides before images
    if (layout==='6up') {
      ctx.save();
      ctx.strokeStyle='#bbbbbb';
      ctx.lineWidth=0.5;
      ctx.setLineDash([5, 5]);
      // vertical cut guide at centre
      ctx.beginPath(); ctx.moveTo(cellW, 0); ctx.lineTo(cellW, PAGE_H); ctx.stroke();
      // horizontal cut guides at 1/3 and 2/3
      ctx.beginPath(); ctx.moveTo(0, cellH); ctx.lineTo(PAGE_W, cellH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, cellH*2); ctx.lineTo(PAGE_W, cellH*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    const startIdx = p*perPage;
    const endIdx   = Math.min(startIdx+perPage, qty);

    for (let i=0; i<(endIdx-startIdx); i++) {
      const col=i%cols, row=Math.floor(i/cols);
      const cellX = useMargin ? MARGIN + col*(cellW+MARGIN) : col*cellW;
      const cellY = useMargin ? MARGIN + row*(cellH+MARGIN) : row*cellH;
      const cx = cellX + (cellW-dw)/2;
      const cy = cellY + (cellH-dh)/2;

      // Draw shelf talker
      ctx.drawImage(src, cx, cy, dw, dh);

      // Crop marks at 4 corners
      drawCropMark(ctx, cx,    cy,    -1, -1);
      drawCropMark(ctx, cx+dw, cy,     1, -1);
      drawCropMark(ctx, cx,    cy+dh, -1,  1);
      drawCropMark(ctx, cx+dw, cy+dh,  1,  1);
    }
    ctx.restore();
    pages.push(page);
  }
  return { pages, dw, dh };
}

// Build ONE print page from an array of different canvases (mixed layout)
function buildMixedPrintPage(canvases) {
  const count = canvases.length;
  let cols, rows;
  if (count === 1)      { cols=1; rows=1; }
  else if (count === 2) { cols=2; rows=1; }
  else                  { cols=2; rows=2; }

  const cellW = (PAGE_W - MARGIN*(cols+1)) / cols;
  const cellH = (PAGE_H - MARGIN*(rows+1)) / rows;

  const page = document.createElement('canvas');
  page.width=PAGE_W; page.height=PAGE_H;
  const ctx=page.getContext('2d');
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,PAGE_W,PAGE_H);
  ctx.save();
  ctx.strokeStyle='#999999';
  ctx.lineWidth=0.75;

  canvases.forEach((rawCanvas, i) => {
    // Rotate landscape canvases 90° when placing in a 2×2 grid (4 items)
    const stCanvas = (count === 4 && rawCanvas.width > rawCanvas.height)
      ? rotateCanvas90(rawCanvas) : rawCanvas;
    const col=i%cols, row=Math.floor(i/cols);
    const cellX = MARGIN + col*(cellW+MARGIN);
    const cellY = MARGIN + row*(cellH+MARGIN);
    const scale = Math.min(cellW/stCanvas.width, cellH/stCanvas.height, 1);
    const dw = Math.round(stCanvas.width*scale);
    const dh = Math.round(stCanvas.height*scale);
    const cx = cellX + (cellW-dw)/2;
    const cy = cellY + (cellH-dh)/2;
    ctx.drawImage(stCanvas, cx, cy, dw, dh);
    drawCropMark(ctx, cx,    cy,    -1, -1);
    drawCropMark(ctx, cx+dw, cy,     1, -1);
    drawCropMark(ctx, cx,    cy+dh, -1,  1);
    drawCropMark(ctx, cx+dw, cy+dh,  1,  1);
  });
  ctx.restore();
  return page;
}

// Export pages as a jsPDF document and trigger download
function exportPDF(pages, filename='shelf-talkers.pdf') {
  if (!window.jspdf || !window.jspdf.jsPDF) { alert('jsPDF not loaded'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'in', format:'letter' });
  // Fit canvas (8.5×11 proportions) within a 0.25" margin on all sides
  var MRG = 0.25;
  var availW = 8.5 - MRG * 2;  // 8.0"
  var availH = 11  - MRG * 2;  // 10.5"
  var scale  = Math.min(availW / 8.5, availH / 11);
  var imgW   = 8.5 * scale;
  var imgH   = 11  * scale;
  var imgX   = (8.5 - imgW) / 2;
  var imgY   = (11  - imgH) / 2;
  pages.forEach(function(page, i) {
    if (i > 0) doc.addPage('letter', 'portrait');
    var imgData = page.toDataURL('image/jpeg', 0.92);
    doc.addImage(imgData, 'JPEG', imgX, imgY, imgW, imgH);
  });
  doc.save(filename);
}

// ═══════════════════════════════════════════════════════════════
// SHELF TALKER — MANAGER CREATOR
// ═══════════════════════════════════════════════════════════════
function STCreator({ storeId, isAdmin, userId, pendingLoad, onLoadComplete }) {
  const toast = useToast();
  const { templates, loading:tplLoading } = useSTTemplates(storeId, isAdmin);
  const { saves, saveTag, deleteTag } = useSavedTags(userId);
  const [savingTag, setSavingTag] = useState(false);
  const [selected,   setSelected]   = useState(null);
  const [values,     setValues]     = useState({});
  const [layout,     setLayout]     = useState('4up');
  const [qty,        setQty]        = useState(4);
  const [step,       setStep]       = useState('browse'); // browse|compose|preview
  const [printing,      setPrinting]      = useState(false);
  const [printPages,    setPrintPages]    = useState([]);
  const [printDims,     setPrintDims]     = useState(null);
  const [printMode,     setPrintMode]     = useState('single'); // 'single'|'queue'
  const [printQueue,    setPrintQueue]    = useState([]);       // [{id,label,canvas}]
  const [addingToQueue, setAddingToQueue] = useState(false);
  const [queuePrinting, setQueuePrinting] = useState(false);
  const { fields, loading:fLoading } = useSTFields(selected?.id);
  const [catFilter,  setCatFilter]  = useState('all');
  const [search,     setSearch]     = useState('');
  const previewRef = useRef();

  // When a saved tag is loaded from the library, pre-populate template + values
  useEffect(function() {
    if (!pendingLoad || tplLoading || !templates.length) return;
    var tpl = templates.find(function(t) { return t.id === pendingLoad.templateId; });
    if (tpl) {
      setSelected(tpl);
      setValues(pendingLoad.values || {});
      setStep('compose');
      if (onLoadComplete) onLoadComplete();
    } else {
      toast.error('Template no longer available');
      if (onLoadComplete) onLoadComplete();
    }
  }, [pendingLoad, templates, tplLoading]);

  // Derive display values: apply formula and/or prefix for every field
  const computedValues = Object.assign({}, values);
  fields.forEach(function(f) {
    const pfx = f.prefix || '';
    const isPricePfx = pfx.indexOf('$') !== -1;
    if (typeof f.formula === 'string' && f.formula.trim()) {
      const cv = evaluateFormula(f.formula, fields, values);
      if (cv !== '') {
        var fmtCv = isPricePfx ? (function(){ var n = parseFloat(cv); return !isNaN(n) ? n.toFixed(2) : cv; }()) : cv;
        computedValues[f.id] = pfx + fmtCv;
      }
    } else if (pfx && values[f.id]) {
      var fmtVal = isPricePfx ? (function(){ var n = parseFloat(values[f.id]); return !isNaN(n) ? n.toFixed(2) : values[f.id]; }()) : values[f.id];
      computedValues[f.id] = pfx + fmtVal;
    }
  });

  // Field overflow validation — use actual box pixel dims from the template
  const overflowIds = fields.filter(f => {
    if (typeof f.formula === 'string' && f.formula.trim()) return false; // auto fields can't overflow
    const text = computedValues[f.id]||'';
    if (!text) return false;
    const tplW = Math.round((selected?.width_in  || 4.25) * PX_PER_IN);
    const tplH = Math.round((selected?.height_in || 5.5)  * PX_PER_IN);
    const boxW = Math.round(f.w_pct / 100 * tplW);
    const boxH = Math.round(f.h_pct / 100 * tplH);
    const { overflow } = fitText(text, boxW, boxH, {
      maxFontSize:f.max_font_size, minFontSize:f.min_font_size,
      bold:f.bold, lineSpacing:f.line_spacing, wrap:f.wrap,
      maxLines:f.multiline?f.max_lines:1,
    });
    return overflow;
  }).map(f=>f.id);
  const missingRequired = fields.filter(f => {
    if (typeof f.formula === 'string') return false; // formula fields are never "missing"
    return f.required && !(values[f.id] && values[f.id].trim());
  }).map(f=>f.id);
  const canPrint = overflowIds.length===0 && missingRequired.length===0 && selected;

  const selectTemplate = (tpl) => { setSelected(tpl); setValues({}); setStep('compose'); };

  const buildPreview = async () => {
    if (!canPrint) return;
    setPrinting(true);
    try {
      const stCanvas = await renderSTCanvas(selected, fields, computedValues);
      const { pages, dw, dh } = buildPrintPages(stCanvas, layout, qty, !!selected.is_landscape);
      setPrintPages(pages);
      setPrintDims({ dw, dh, scale: PX_PER_IN });
      setStep('preview');
    } catch(e) { toast.error('Preview failed: '+e.message); }
    finally { setPrinting(false); }
  };

  const addToQueue = async () => {
    if (!canPrint || printQueue.length >= 4) return;
    setAddingToQueue(true);
    try {
      const stCanvas = await renderSTCanvas(selected, fields, computedValues);
      const firstVal = computedValues[fields[0]?.id] || '';
      const label = selected.name + (firstVal ? ` – ${firstVal.substring(0,18)}` : '');
      setPrintQueue(q => [...q, { id: Date.now(), canvas: stCanvas, label }]);
      toast.success(`Added to queue (${printQueue.length+1}/4)`);
    } catch(e) { toast.error('Error: '+e.message); }
    finally { setAddingToQueue(false); }
  };

  const printQueueSheet = async () => {
    if (!printQueue.length) return;
    setQueuePrinting(true);
    try {
      const page = buildMixedPrintPage(printQueue.map(q=>q.canvas));
      setPrintPages([page]);
      setPrintDims({ dw: PAGE_W, dh: PAGE_H });
      setPrintMode('queue');
      setStep('preview');
    } catch(e) { toast.error('Error: '+e.message); }
    finally { setQueuePrinting(false); }
  };

  const printSheet = () => {
    if (!printPages.length) return;
    const w = window.open('','_blank');
    w.document.write(`<!DOCTYPE html><html><head><title>Shelf Talkers</title>
      <style>
        @page{size:letter portrait;margin:0.25in;}
        body{margin:0;padding:0;background:#fff;}
        img{display:block;width:100%;height:auto;page-break-after:always;}
        img:last-child{page-break-after:avoid;}
      </style></head><body>`);
    printPages.forEach(p => {
      w.document.write(`<img src="${p.toDataURL('image/jpeg',0.92)}"/>`);
    });
    w.document.write(`</body></html>`);
    w.document.close();
    w.focus();
    w.print();
  };

  // Live preview canvas
  const livePreviewRef = useRef();
  useEffect(() => {
    if (!selected || !livePreviewRef.current || step!=='compose') return;
    let cancelled = false;
    (async () => {
      const canvas = livePreviewRef.current;
      const stCanvas = await renderSTCanvas(selected, fields, computedValues);
      if (cancelled) return;
      canvas.width  = stCanvas.width;
      canvas.height = stCanvas.height;
      canvas.getContext('2d').drawImage(stCanvas, 0, 0);
    })();
    return () => { cancelled=true; };
  }, [selected, fields, values, step]);

  const filteredTpls = templates.filter(t => {
    if (catFilter!=='all' && t.category!==catFilter) return false;
    if (search && !t.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  // ── Print Queue Panel (shown on browse + compose steps) ───
  const queuePanel = printQueue.length > 0 && (
    <div className="rounded-2xl border border-indigo-200 dark:border-indigo-700 bg-indigo-50 dark:bg-indigo-950 p-4">
      <div className="flex flex-wrap items-center justify-between gap-2 mb-3">
        <h3 className="text-sm font-bold text-indigo-900 dark:text-indigo-200">
          📋 Print Queue — {printQueue.length} of 4 tags
        </h3>
        <div className="flex gap-2">
          <button onClick={()=>setPrintQueue([])} className="text-xs text-indigo-500 hover:text-red-500 underline">Clear all</button>
          <Button size="sm" onClick={printQueueSheet} loading={queuePrinting}>
            🖨 Print Sheet ({printQueue.length}-up)
          </Button>
          <Button size="sm" variant="secondary" onClick={()=>{ const p=buildMixedPrintPage(printQueue.map(q=>q.canvas)); exportPDF([p],'queue-sheet.pdf'); }}>
            ⬇ PDF
          </Button>
        </div>
      </div>
      <div className="flex gap-3 flex-wrap">
        {printQueue.map((item,i)=>(
          <div key={item.id} className="relative group">
            <div className="w-16 h-20 rounded-lg overflow-hidden border border-indigo-200 dark:border-indigo-600 bg-white flex items-center justify-center">
              <canvas ref={el=>{ if(el){ el.width=item.canvas.width; el.height=item.canvas.height; el.getContext('2d').drawImage(item.canvas,0,0); }}} className="w-full h-full object-contain"/>
            </div>
            <p className="text-xs text-indigo-700 dark:text-indigo-300 mt-1 w-16 truncate">{item.label}</p>
            <button onClick={()=>setPrintQueue(q=>q.filter((_,j)=>j!==i))}
              className="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-red-500 text-white text-xs leading-none flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">×</button>
          </div>
        ))}
        {printQueue.length < 4 && (
          <div className="w-16 h-20 rounded-lg border-2 border-dashed border-indigo-300 dark:border-indigo-600 flex items-center justify-center text-indigo-300 text-2xl select-none">+</div>
        )}
      </div>
    </div>
  );

  // ── Browse step ────────────────────────────────────────────
  if (step==='browse') return (
    <div className="space-y-4">
      {queuePanel}

      {/* Saved Tags */}
      {saves.length > 0 && (
        <div>
          <h3 className="text-sm font-bold text-gray-700 dark:text-gray-200 mb-2">💾 Saved Tags</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
            {saves.map(s => {
              const tpl = s.shelf_talker_templates;
              return (
                <div key={s.id} className="flex items-center gap-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-2.5 shadow-sm">
                  {tpl?.file_data && (
                    <img src={tpl.file_data} alt={tpl.name} className="w-12 h-12 object-contain rounded-lg bg-gray-100 dark:bg-gray-900 shrink-0"/>
                  )}
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-semibold text-gray-900 dark:text-white truncate">{s.name}</p>
                    <p className="text-xs text-gray-400 truncate">{tpl?.name}</p>
                  </div>
                  <div className="flex flex-col gap-1 shrink-0">
                    <button
                      onClick={() => {
                        const tplObj = templates.find(t => t.id === s.template_id);
                        if (tplObj) { setSelected(tplObj); setValues(s.values || {}); setStep('compose'); }
                        else toast.error('Template no longer available');
                      }}
                      className="text-xs bg-indigo-600 text-white px-2 py-0.5 rounded hover:bg-indigo-700">
                      Load
                    </button>
                    <button
                      onClick={async () => { if(confirm('Delete this saved tag?')) await deleteTag(s.id); }}
                      className="text-xs text-red-500 hover:text-red-700 px-2 py-0.5">
                      Delete
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="flex flex-wrap gap-2">
        <Input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search…" className="max-w-xs"/>
        <Select value={catFilter} onChange={e=>setCatFilter(e.target.value)} className="w-auto">
          <option value="all">All Categories</option>
          {ST_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </Select>
      </div>
      {tplLoading && <p className="text-sm text-gray-400 animate-pulse">Loading templates…</p>}
      {!tplLoading && filteredTpls.length===0 && (
        <div className="text-center py-16 text-gray-400">
          <p className="text-4xl mb-3">🏷</p>
          <p className="font-medium">No shelf talker templates available</p>
          {isAdmin && <p className="text-sm mt-1">Create one in the Admin tab</p>}
        </div>
      )}
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
        {filteredTpls.map(tpl => {
          const isGlobal = tpl.scope==='global';
          const brandNames = STORES.filter(s=>(tpl.shelf_talker_template_brands||[]).some(b=>b.store_id===s.id)).map(s=>s.name.split(' ')[0]);
          return (
            <button key={tpl.id} onClick={()=>selectTemplate(tpl)}
              className="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm hover:border-indigo-400 hover:shadow-md transition-all text-left overflow-hidden group">
              <div className="relative aspect-[4/5] bg-gray-100 dark:bg-gray-900 overflow-hidden">
                <img src={tpl.file_data} alt={tpl.name} className="absolute inset-0 w-full h-full object-contain group-hover:scale-105 transition-transform"/>
              </div>
              <div className="p-2.5">
                <p className="font-semibold text-sm text-gray-900 dark:text-white truncate">{tpl.name}</p>
                <p className="text-xs text-gray-500">{tpl.category}</p>
                <div className="flex gap-1 mt-1 flex-wrap">
                  {isGlobal ? <Badge color="blue">🌐 Global</Badge> : brandNames.map(n=><Badge key={n} color="indigo">{n}</Badge>)}
                </div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );

  // ── Compose step ───────────────────────────────────────────
  if (step==='compose') return (
    <div className="space-y-4">
      {queuePanel}
      <div className="flex items-center gap-3">
        <button onClick={()=>setStep('browse')} className="text-sm text-indigo-600 dark:text-indigo-400 hover:underline">← Back to Templates</button>
        <Badge color="indigo">{selected?.category}</Badge>
        <span className="font-semibold text-gray-900 dark:text-white text-sm">{selected?.name}</span>
        <span className="text-xs text-gray-400">{selected?.width_in}″ × {selected?.height_in}″</span>
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-2 gap-5">
        {/* Form */}
        <Card>
          <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4">Fill in the fields</h3>
          {fLoading && <p className="text-xs text-gray-400 animate-pulse">Loading fields…</p>}
          {!fLoading && fields.length===0 && <p className="text-xs text-gray-400 italic">No text fields configured for this template.</p>}
          <div className="space-y-3">
            {fields.map(f => {
              const isFormula = typeof f.formula === 'string' && !!f.formula.trim();
              const overflow = overflowIds.includes(f.id);
              const missing  = missingRequired.includes(f.id) && values[f.id]!==undefined;
              return (
                <div key={f.id}>
                  <Label>
                    {f.label}
                    {f.required && !isFormula && <span className="text-red-500 ml-0.5">*</span>}
                    {isFormula && <span className="ml-1.5 text-xs font-normal text-indigo-500">auto</span>}
                  </Label>
                  {isFormula
                    ? <Input value={computedValues[f.id]||''} readOnly
                        className="bg-indigo-50 dark:bg-indigo-950 text-indigo-700 dark:text-indigo-300 cursor-default text-center font-semibold"/>
                    : <div className={f.prefix ? 'flex items-center gap-1' : ''}>
                        {f.prefix && <span className="text-sm font-semibold text-gray-500 dark:text-gray-300 select-none">{f.prefix}</span>}
                        {f.multiline
                          ? <Textarea value={values[f.id]||''} onChange={e=>setValues(v=>({...v,[f.id]:f.uppercase?e.target.value.toUpperCase():e.target.value}))}
                              placeholder={f.placeholder} rows={Math.min(f.max_lines||2, 4)}
                              className={(overflow||missing?'border-red-400 focus:ring-red-400':'')+' flex-1'}/>
                          : <Input value={values[f.id]||''} onChange={e=>setValues(v=>({...v,[f.id]:f.uppercase?e.target.value.toUpperCase():e.target.value}))}
                              placeholder={f.placeholder} maxLength={f.max_chars||undefined}
                              className={(overflow||missing?'border-red-400 focus:ring-red-400':'')+' flex-1'}/>
                        }
                      </div>
                  }
                  {!isFormula && f.prefix && <p className="text-xs text-gray-400 mt-0.5">"{f.prefix}" is added automatically — just enter the number</p>}
                  {overflow && <p className="text-xs text-red-500 mt-0.5">⚠ Text too long — please shorten</p>}
                  {missing  && <p className="text-xs text-amber-500 mt-0.5">This field is required</p>}
                </div>
              );
            })}
          </div>

          <Divider label="Print Settings"/>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <Label>Layout</Label>
              <div className="flex gap-2 mt-1">
                {['2up','4up','6up'].map(l=>(
                  <label key={l} className="flex items-center gap-1.5 text-sm cursor-pointer">
                    <input type="radio" checked={layout===l} onChange={()=>{ setLayout(l); setQty(l==='6up'?6:l==='4up'?4:2); }} className="accent-indigo-600"/>
                    {l==='2up'?'2-up':l==='4up'?'4-up':'6-up (Small)'}
                  </label>
                ))}
              </div>
            </div>
            <div>
              <Label>Qty</Label>
              <Input type="number" value={qty} min={1} max={100} onChange={e=>setQty(Math.max(1,+e.target.value))} className="w-20"/>
            </div>
          </div>
          <p className="text-xs text-gray-400 mt-2">
            {Math.ceil(qty/(layout==='6up'?6:layout==='4up'?4:2))} page{Math.ceil(qty/(layout==='6up'?6:layout==='4up'?4:2))>1?'s':''} · ¼″ margin · disable headers &amp; footers
          </p>
          <div className="flex gap-2 mt-4 flex-wrap">
            <Button onClick={buildPreview} loading={printing} disabled={!canPrint} className="flex-1">
              👁 Preview Copies
            </Button>
            <Button variant="secondary" onClick={addToQueue} loading={addingToQueue}
              disabled={!canPrint || printQueue.length >= 4}
              title={printQueue.length>=4?'Queue is full (4/4)':'Add this tag to the mixed print queue'}>
              📋 {printQueue.length>=4 ? 'Queue Full' : `Add to Queue (${printQueue.length}/4)`}
            </Button>
            <Button variant="secondary" loading={savingTag} disabled={!selected}
              onClick={async () => {
                setSavingTag(true);
                try {
                  const firstName = fields[0] ? (values[fields[0].id] || '') : '';
                  const name = selected.name + (firstName ? ` – ${firstName.substring(0,24)}` : '');
                  await saveTag(name, selected.id, values, storeId);
                  toast.success('Tag saved!');
                } catch(e) { toast.error('Save failed: ' + e.message); }
                finally { setSavingTag(false); }
              }}>
              💾 Save Tag
            </Button>
          </div>
          {(overflowIds.length>0||missingRequired.length>0) && (
            <p className="text-xs text-red-500 mt-1">Fix errors above before printing</p>
          )}
        </Card>

        {/* Live Preview */}
        <div>
          <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">Live Preview</p>
          <div className="rounded-2xl overflow-hidden border border-gray-200 dark:border-gray-700 bg-gray-100 dark:bg-gray-900 flex items-center justify-center min-h-48">
            <canvas ref={livePreviewRef} className="max-w-full max-h-[500px] object-contain"/>
          </div>
        </div>
      </div>
    </div>
  );

  // ── Print Preview step ─────────────────────────────────────
  if (step==='preview') return (
    <div className="space-y-4">
      <div className="flex flex-wrap items-center gap-3">
        <button onClick={()=>{ setStep(printMode==='queue'?'browse':'compose'); setPrintMode('single'); }} className="text-sm text-indigo-600 dark:text-indigo-400 hover:underline">← Back</button>
        <span className="text-sm font-semibold text-gray-900 dark:text-white">
          {printMode==='queue'
            ? `Mixed Sheet · ${printQueue.length} different tags`
            : `${selected?.name} · ${layout==='4up'?'4-up':'2-up'} · ${qty} copies`}
        </span>
        {printDims && (
          <span className="text-xs text-gray-400">
            Actual print size: {(printDims.dw/PX_PER_IN).toFixed(2)}″ × {(printDims.dh/PX_PER_IN).toFixed(2)}″
          </span>
        )}
      </div>

      {printPages.map((page,i) => (
        <div key={i}>
          <p className="text-xs text-gray-400 mb-1">Page {i+1} of {printPages.length}</p>
          <div className="border border-gray-300 dark:border-gray-600 rounded-xl overflow-hidden shadow-sm bg-white">
            <canvas ref={i===0?previewRef:undefined}
              width={page.width} height={page.height}
              className="w-full"
              ref={(el)=>{ if(el){el.width=page.width;el.height=page.height;el.getContext('2d').drawImage(page,0,0);} }}
            />
          </div>
        </div>
      ))}

      <div className="flex gap-3">
        <Button onClick={printSheet} size="lg">🖨 Print</Button>
        <Button variant="secondary" size="lg" onClick={()=>exportPDF(printPages, printMode==='queue'?'mixed-sheet.pdf':`${selected?.name||'shelf-talkers'}.pdf`)}>
          ⬇ Download PDF
        </Button>
      </div>
      <p className="text-xs text-gray-400">Pages include a ¼″ margin. Disable "Print headers and footers" in your browser's print dialog.</p>
    </div>
  );

  return null;
}

function STSavedLibrary({ userId, isAdmin, onLoad }) {
  const { saves, loading, deleteTag } = useSavedTags(userId, isAdmin);
  const [storeFilter, setStoreFilter] = useState('all');
  const [userFilter,  setUserFilter]  = useState('all');

  // Derive filter options from data
  const storeOptions = STORES.filter(function(st) {
    return saves.some(function(s) { return s.store_id === st.id; });
  });
  const userOptions = isAdmin ? Array.from(new Set(saves.map(function(s) { return s.user_email; }).filter(Boolean))) : [];

  const displayed = saves.filter(function(s) {
    if (storeFilter !== 'all' && s.store_id !== storeFilter) return false;
    if (userFilter  !== 'all' && s.user_email !== userFilter)  return false;
    return true;
  });

  if (loading) return <p className="text-sm text-gray-400 animate-pulse py-8 text-center">Loading library…</p>;

  return (
    <div className="space-y-4">
      {/* Filters — admin only */}
      {isAdmin && (
        <div className="flex gap-2 flex-wrap">
          <Select value={storeFilter} onChange={function(e){ setStoreFilter(e.target.value); }} className="w-auto text-xs">
            <option value="all">All Stores</option>
            {storeOptions.map(function(st) { return <option key={st.id} value={st.id}>{st.name}</option>; })}
          </Select>
          <Select value={userFilter} onChange={function(e){ setUserFilter(e.target.value); }} className="w-auto text-xs">
            <option value="all">All Users</option>
            {userOptions.map(function(email) { return <option key={email} value={email}>{email}</option>; })}
          </Select>
          <span className="text-xs text-gray-400 self-center">{displayed.length} tag{displayed.length!==1?'s':''}</span>
        </div>
      )}

      {!displayed.length && (
        <div className="text-center py-16 text-gray-400 dark:text-gray-500">
          <p className="text-5xl mb-3">🏷</p>
          <p className="text-sm font-semibold">{saves.length ? 'No tags match the filters' : 'No saved tags yet'}</p>
          {!saves.length && <p className="text-xs mt-1">Create a shelf talker and click <strong>Save Tag</strong> to build your library</p>}
        </div>
      )}

      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
        {displayed.map(function(s) {
          var tpl = s.shelf_talker_templates;
          var storeName = s.store_id ? (function(){ var st = STORES.find(function(x){ return x.id===s.store_id; }); return st ? st.name.split(' ')[0] : null; }()) : null;
          return (
            <div key={s.id} className="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden flex flex-col">
              {/* Thumbnail */}
              <div className="aspect-video bg-gray-100 dark:bg-gray-700 flex items-center justify-center overflow-hidden relative">
                {tpl && tpl.file_data
                  ? <img src={tpl.file_data} alt={tpl.name} className="w-full h-full object-cover"/>
                  : <span className="text-4xl">🏷</span>
                }
                {storeName && (
                  <span className="absolute top-1.5 right-1.5 text-xs bg-indigo-600 text-white px-1.5 py-0.5 rounded-md font-semibold">{storeName}</span>
                )}
              </div>
              {/* Info */}
              <div className="p-2.5 flex-1">
                <p className="text-sm font-semibold text-gray-900 dark:text-white truncate" title={s.name}>{s.name}</p>
                {tpl && tpl.category && (
                  <span className="text-xs text-indigo-600 dark:text-indigo-400 font-medium">{tpl.category}</span>
                )}
                {isAdmin && s.user_email && (
                  <p className="text-xs text-gray-400 dark:text-gray-500 truncate mt-0.5" title={s.user_email}>{s.user_email}</p>
                )}
                <p className="text-xs text-gray-400 dark:text-gray-500 mt-0.5">{fmtDate(s.created_at)}</p>
              </div>
              {/* Actions */}
              <div className="flex gap-1.5 px-2.5 pb-2.5">
                <button
                  onClick={function() { onLoad(s.template_id, s.values); }}
                  className="flex-1 text-xs bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold py-1.5 rounded-lg transition-colors">
                  ✏️ Edit &amp; Print
                </button>
                <button
                  onClick={async function() { if(confirm('Delete "' + s.name + '"?')) await deleteTag(s.id); }}
                  className="text-xs text-red-500 hover:text-red-700 dark:text-red-400 border border-red-200 dark:border-red-700 rounded-lg px-2.5 py-1.5 transition-colors">
                  🗑
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// AUTHENTICATED APP (main shell)
// ─────────────────────────────────────────────
function AuthenticatedApp({ user, dark, onDark, openChangePw }) {
  const toast = useToast();
  const hardcodedAdmin = ADMIN_EMAILS.includes((user && user.email ? user.email : '').toLowerCase());
  const [isAdmin,        setIsAdmin]        = useState(hardcodedAdmin);
  const [page,           setPage]           = useState('shelf');
  const [settingsLoaded, setSettingsLoaded] = useState(false);
  const [settings,       setSettings]       = useState({
    tokens: Object.fromEntries(STORES.map(s=>[s.id,''])),
    metaToken:'', anthropicKey:'', openaiKey:'',
  });

  // Load settings + role from Supabase on mount
  useEffect(function() {
    var sb = getSB(); if (!sb) return;
    // Load settings
    Promise.all([
      sb.from('store_tokens').select('store_id,page_token'),
      sb.from('api_keys').select('key_name,key_value'),
    ]).then(function(results) {
      var tokens = results[0].data;
      var keys   = results[1].data;
      var tMap = Object.fromEntries(STORES.map(function(s) { return [s.id, '']; }));
      (tokens||[]).forEach(function(r) { if (r.store_id in tMap) tMap[r.store_id] = r.page_token||''; });
      var kMap = Object.fromEntries((keys||[]).map(function(r) { return [r.key_name, r.key_value||'']; }));
      setSettings({ tokens:tMap, metaToken:kMap.meta_token||'', anthropicKey:kMap.anthropic_key||'', openaiKey:kMap.openai_key||'' });
    }).catch(function() {}).finally(function() { setSettingsLoaded(true); });
    // Check DB role (catches admin accounts not in hardcoded list)
    if (!hardcodedAdmin && user) {
      sb.from('user_roles').select('role, store_id, store_ids').eq('user_id', user.id).maybeSingle()
        .then(function(result) {
          var data = result.data;
          if (data && data.role === 'admin') {
            setIsAdmin(true);
          } else if (data) {
            var ids = (data.store_ids && data.store_ids.length > 0) ? data.store_ids : (data.store_id ? [data.store_id] : []);
            setUserStoreIds(ids);
          }
        });
    }
  }, []);

  const saveSettings = async (s) => {
    const sb=getSB(); if(!sb) throw new Error('Supabase not connected');
    const [r1,r2]=await Promise.all([
      sb.from('store_tokens').upsert(STORES.map(st=>({store_id:st.id,page_token:s.tokens[st.id]||''})),{onConflict:'store_id'}),
      sb.from('api_keys').upsert([
        {key_name:'meta_token',    key_value:s.metaToken    ||''},
        {key_name:'anthropic_key', key_value:s.anthropicKey ||''},
        {key_name:'openai_key',    key_value:s.openaiKey    ||''},
      ],{onConflict:'key_name'}),
    ]);
    if(r1.error) throw r1.error;
    if(r2.error) throw r2.error;
    setSettings(s);
  };

  const signOut = async () => {
    await getSB().auth.signOut();
    window.location.reload();
  };

  // Change-password modal (also auto-opens when arriving via reset email link)
  const [showChangePw,   setShowChangePw]   = useState(openChangePw || false);
  const [changePwVal,    setChangePwVal]     = useState('');
  const [changePwConf,   setChangePwConf]   = useState('');
  const [changePwSaving, setChangePwSaving] = useState(false);
  const [showUserMenu,   setShowUserMenu]   = useState(false);

  const doChangePassword = async () => {
    if (changePwVal.length < 8)          { toast.error('Password must be at least 8 characters'); return; }
    if (changePwVal !== changePwConf)    { toast.error('Passwords do not match'); return; }
    setChangePwSaving(true);
    try {
      const { error } = await getSB().auth.updateUser({ password: changePwVal });
      if (error) throw error;
      toast.success('Password updated!');
      setShowChangePw(false); setChangePwVal(''); setChangePwConf('');
    } catch(e) { toast.error(e.message); }
    finally { setChangePwSaving(false); }
  };

  // Store assignments for non-hardcoded non-admin users (loaded above in combined effect)
  const [userStoreIds, setUserStoreIds] = useState([]);

  const nav = [
    { id:'shelf', icon:'🏷', label:'Shelf Talkers' },
    ...(isAdmin ? [
      { id:'posts',    icon:'📝', label:'Posts' },
      { id:'ads',      icon:'📣', label:'Ads' },
      { id:'brand',    icon:'🎨', label:'Brand' },
      { id:'settings', icon:'⚙️', label:'Settings' },
    ] : []),
  ];

  if (!settingsLoaded) return (
    <div className="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-900">
      <div className="text-center"><div className="text-4xl mb-3">🥃</div><p className="text-gray-500 dark:text-gray-400 text-sm animate-pulse">Loading settings…</p></div>
    </div>
  );

  return (
    <div className="min-h-screen flex flex-col bg-gray-100 dark:bg-gray-900 transition-colors">
      <header className="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-30">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14">
          <div className="flex items-center gap-2.5">
            <span className="text-2xl">🥃</span>
            <div>
              <p className="text-sm font-bold text-gray-900 dark:text-white leading-none">Liquor Store Social</p>
              <p className="text-xs text-gray-400 leading-none mt-0.5">4 locations · Meta v21</p>
            </div>
          </div>
          <div className="flex items-center gap-1">
            {nav.map(n=>(
              <button key={n.id} onClick={()=>setPage(n.id)} className={`px-3 py-2 rounded-xl text-sm font-semibold transition-all ${page===n.id?'bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300':'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-gray-200'}`}>
                <span className="mr-1">{n.icon}</span><span className="hidden sm:inline">{n.label}</span>
              </button>
            ))}
            <button onClick={()=>onDark(d=>!d)} className="ml-1 p-2 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="Toggle dark mode">{dark?'☀️':'🌙'}</button>
            {/* User menu */}
            <div className="relative ml-1">
              <button onClick={()=>setShowUserMenu(function(v){return !v;})} className="p-2 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">👤</button>
              {showUserMenu && (
                <div className="absolute right-0 top-full mt-1 w-52 bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-100 dark:border-gray-700 z-50 overflow-hidden">
                  <div className="px-3 py-2 border-b border-gray-100 dark:border-gray-700">
                    <p className="text-xs text-gray-500 dark:text-gray-400 truncate">{user ? user.email : ''}</p>
                  </div>
                  <button onClick={()=>{setShowUserMenu(false);setShowChangePw(true);}} className="w-full text-left px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">
                    🔑 Change Password
                  </button>
                  <button onClick={()=>{setShowUserMenu(false);signOut();}} className="w-full text-left px-3 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-gray-50 dark:hover:bg-gray-700">
                    Sign Out
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      </header>

      {/* Change Password Modal */}
      {showChangePw && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4" onClick={()=>setShowChangePw(false)}>
          <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 w-full max-w-sm" onClick={function(e){e.stopPropagation();}}>
            <h2 className="text-base font-bold text-gray-900 dark:text-white mb-4">Change Password</h2>
            <div className="space-y-3">
              <div>
                <Label>New Password</Label>
                <Input type="password" value={changePwVal} onChange={function(e){setChangePwVal(e.target.value);}} placeholder="Min 8 characters"/>
              </div>
              <div>
                <Label>Confirm Password</Label>
                <Input type="password" value={changePwConf} onChange={function(e){setChangePwConf(e.target.value);}} placeholder="Re-enter new password"
                  onKeyDown={function(e){if(e.key==='Enter') doChangePassword();}}/>
              </div>
            </div>
            <div className="flex gap-2 mt-5">
              <Button onClick={doChangePassword} loading={changePwSaving} className="flex-1">Save Password</Button>
              <Button variant="secondary" onClick={()=>setShowChangePw(false)} className="flex-1">Cancel</Button>
            </div>
          </div>
        </div>
      )}

      <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 py-6">
        {page==='posts'                  && <PostsPage       settings={settings}/>}
        {page==='shelf'                  && <ShelfTalkerPage isAdmin={isAdmin} userStoreIds={isAdmin ? [] : userStoreIds} userId={user ? user.id : null}/>}
        {page==='ads'      && isAdmin    && <AdsPage         settings={settings}/>}
        {page==='brand'    && isAdmin    && <BrandPage        settings={settings}/>}
        {page==='settings' && isAdmin    && <SettingsPage     settings={settings} onSave={saveSettings} currentUserId={user ? user.id : null}/>}
      </main>
      <footer className="text-center py-3 text-xs text-gray-300 dark:text-gray-600">
        Liquor Store Social · Supabase · Graph API v21.0 · {user?.email}
      </footer>
    </div>
  );
}

// ─────────────────────────────────────────────
// ROOT APP (auth routing)
// ─────────────────────────────────────────────
function App() {
  const [dark,      setDark]      = useState(()=>ls.get('smm_dark',false));
  const [authState, setAuthState] = useState('checking');
  const [user,      setUser]      = useState(null);
  const [recovery,  setRecovery]  = useState(false);

  useEffect(()=>{
    document.documentElement.classList.toggle('dark',dark);
    ls.set('smm_dark',dark);
  },[dark]);

  useEffect(()=>{
    const sb=getSB(); if(!sb) return;
    sb.auth.getSession().then(function(res) {
      var session = res.data.session;
      setUser(session ? session.user : null);
      setAuthState(session ? 'authed' : 'anon');
    });
    const sub = sb.auth.onAuthStateChange(function(event, session) {
      if (event === 'PASSWORD_RECOVERY') {
        setRecovery(true);
        setUser(session ? session.user : null);
        setAuthState('authed');
        return;
      }
      setUser(session ? session.user : null);
      setAuthState(session ? 'authed' : 'anon');
      if (event === 'USER_UPDATED') setRecovery(false);
    });
    return function() { sub.data.subscription.unsubscribe(); };
  },[]);

  if (authState==='checking') return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900">
      <div className="text-center"><div className="text-4xl mb-3">🥃</div><p className="text-gray-400 text-sm animate-pulse">Connecting…</p></div>
    </div>
  );

  if (authState==='anon') return (
    <ToastProvider>
      <LoginScreen/>
    </ToastProvider>
  );

  return (
    <ToastProvider>
      <AuthenticatedApp user={user} dark={dark} onDark={setDark} openChangePw={recovery}/>
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
