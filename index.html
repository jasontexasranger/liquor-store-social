// IMAGE GENERATOR
// ─────────────────────────────────────────────
function ImageGenerator({ settings, onUseInPost }) {
  const toast = useToast();
  const [storeId,    setStoreId]    = useState(STORES[0].id);
  const [brief,      setBrief]      = useState('');
  const [size,       setSize]       = useState('1024x1024');
  const [prodFile,   setProdFile]   = useState(null);
  const [prodPrev,   setProdPrev]   = useState(null);
  const [editPrompt, setEditPrompt] = useState('');
  const [showPrompt, setShowPrompt] = useState(false);
  const [genStep,    setGenStep]    = useState('idle');
  const [result,     setResult]     = useState(null);
  const [brand,      setBrand]      = useState({ ...BRAND_DEFAULTS });
  const [logo,       setLogo]       = useState(null);
  const [history,    setHistory]    = useState([]);
  const [showLib,    setShowLib]    = useState(false);
  const { images:libImages, save:saveToLib, remove:removeFromLib } = useProductLibrary(storeId);
  const prodRef = useRef();

  const store     = STORES.find(s=>s.id===storeId);
  const dalleSize = IMAGE_SIZES.find(s=>s.value===size)?.dalleSize||'1024x1024';

  // Load brand profile from Supabase when store changes
  useEffect(()=>{
    const sb=getSB(); if(!sb) return;
    sb.from('brand_profiles').select('*').eq('store_id',storeId).maybeSingle()
      .then(({data})=>{
        if (data) { const {logo_data,...p}=data; setBrand({...BRAND_DEFAULTS,...p}); setLogo(logo_data||null); }
        else      { setBrand({...BRAND_DEFAULTS}); setLogo(null); }
      });
  },[storeId]);

  // Load generation history from Supabase
  useEffect(()=>{
    const sb=getSB(); if(!sb) return;
    sb.from('generation_history').select('*').order('created_at',{ascending:false}).limit(24)
      .then(({data})=>setHistory(data||[]));
  },[]);

  const handleProd = file => {
    if (!file) return;
    setProdFile(file);
    const r=new FileReader();
    r.onload=async()=>{
      setProdPrev(r.result);
      try { await saveToQuickLib(file.name, r.result); } catch{}
    };
    r.readAsDataURL(file);
  };

  const selectFromLib = (img) => {
    setProdPrev(img.data);
    fetch(img.data).then(r=>r.blob()).then(blob=>{
      const f=new File([blob], img.product_name||'product', {type:'image/jpeg'});
      setProdFile(f);
    }).catch(()=>{});
    setShowLib(false);
    toast.info(`Selected: ${img.product_name||img.name}`);
  };

  const assemblePrompt = async () => {
    const apiKey=settings.openaiKey;
    if (!apiKey) { toast.error('Add your OpenAI API key in Settings'); return null; }
    let productDesc='';
    if (prodFile) {
      setGenStep('analyzing');
      const b64=await fileToBase64(prodFile);
      productDesc=await openAIDescribeImage(b64,prodFile.type||'image/jpeg',apiKey);
    }
    setGenStep('building');
    const parts=[`Professional social media image for "${store.name}", an independent retail liquor store in British Columbia, Canada.`];
    if (brand.visual_style)   parts.push(`Visual style: ${brand.visual_style}.`);
    if (brand.mood)           parts.push(`Mood: ${brand.mood}.`);
    if (brand.style_keywords) parts.push(`Style keywords: ${brand.style_keywords}.`);
    if (brand.primary_color&&brand.secondary_color) parts.push(`Brand colours: primary ${brand.primary_color}, secondary ${brand.secondary_color}.`);
    if (brand.avoid_visually) parts.push(`Do NOT include: ${brand.avoid_visually}.`);
    if (productDesc)          parts.push(`Feature this product prominently: ${productDesc}`);
    if (brief.trim())         parts.push(`Creative direction: ${brief.trim()}.`);
    parts.push('High-quality commercial photography. No text or words in the image unless specified. Suitable for Facebook and Instagram.');
    return parts.join(' ');
  };

  const previewPrompt = async () => {
    try { const p=await assemblePrompt(); if(p){setEditPrompt(p);setShowPrompt(true);setGenStep('idle');} }
    catch(e) { toast.error(e.message); setGenStep('idle'); }
  };

  const generate = async () => {
    const apiKey=settings.openaiKey;
    if (!apiKey) { toast.error('Add your OpenAI API key in Settings'); return; }
    setResult(null);
    try {
      let prompt;
      if (showPrompt&&editPrompt.trim()) { prompt=editPrompt.trim(); setGenStep('generating'); }
      else { prompt=await assemblePrompt(); if(!prompt) return; setEditPrompt(prompt); setShowPrompt(true); setGenStep('generating'); }

      const img=await openAIGenerateImage(prompt,dalleSize,apiKey);
      setResult(img);
      setGenStep('done');
      toast.success('Image generated!');

      // Save to Supabase
      const sb=getSB();
      if (sb) {
        await sb.from('generation_history').insert({ store_id:storeId, store_name:store.name, image_url:img.url, revised_prompt:img.revised, brief, size_label:size, prompt });
        const {data}=await sb.from('generation_history').select('*').order('created_at',{ascending:false}).limit(24);
        setHistory(data||[]);
      }
    } catch(e) { setGenStep('error'); toast.error(`Generation failed: ${e.message}`); }
  };

  const storeHistory = history.filter(h=>h.store_id===storeId);
  const isBusy = ['analyzing','building','generating'].includes(genStep);
  const stepLabel = { analyzing:'🔍 Analysing product image…', building:'⚙️ Building prompt…', generating:'🎨 Generating image…' };

  return (
    <div className="grid grid-cols-1 xl:grid-cols-2 gap-5">
      <div className="space-y-4">
        <Card>
          <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4 uppercase tracking-wide">🖼 Generate Image</h3>
          <div className="mb-4">
            <Label>Store</Label>
            <Select value={storeId} onChange={e=>{setStoreId(e.target.value);setResult(null);setShowPrompt(false);}}>
              {STORES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </Select>
            <div className="flex items-center gap-2 mt-2 flex-wrap">
              {logo && <img src={logo} alt="logo" className="h-7 w-7 rounded object-contain bg-white border border-gray-200 p-0.5"/>}
              {brand.personality && brand.personality.split(',').slice(0,3).map((p,i)=><Badge key={i} color="indigo">{p.trim()}</Badge>)}
              {brand.style_keywords && brand.style_keywords.split(',').slice(0,2).map((k,i)=><Badge key={i} color="gray">{k.trim()}</Badge>)}
              {!brand.personality&&!brand.style_keywords && <span className="text-xs text-amber-600 dark:text-amber-400">⚠ No brand profile — add one in the Brand Profile tab</span>}
            </div>
          </div>
          <div className="mb-4"><Label>Image Brief</Label><Textarea value={brief} onChange={e=>setBrief(e.target.value)} rows={3} placeholder="e.g. A bottle of Maker's Mark on a warm wooden bar with BC mountain scenery. Cozy summer evening."/></div>
          <div className="mb-4">
            <div className="flex items-center justify-between mb-1">
              <Label className="mb-0">Product Reference Photo (optional)</Label>
              {libImages.length>0 && <button onClick={()=>setShowLib(v=>!v)} className="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline">{showLib?'Hide Library ↑':`📚 Library (${libImages.length})`}</button>}
            </div>
            <p className="text-xs text-gray-500 dark:text-gray-400 mb-2">GPT-4o Vision will describe it and weave it into the prompt. Photos are auto-saved to your library.</p>
            <div className="flex items-center gap-2 flex-wrap">
              <Button variant="secondary" size="sm" onClick={()=>prodRef.current?.click()}>📦 Upload Product Photo</Button>
              {prodFile && <span className="text-xs text-gray-600 dark:text-gray-400 truncate max-w-xs">{prodFile.name}</span>}
              {prodFile && <button onClick={()=>{setProdFile(null);setProdPrev(null);}} className="text-xs text-red-500 hover:underline">Remove</button>}
            </div>
            <input ref={prodRef} type="file" accept="image/*" className="hidden" onChange={e=>handleProd(e.target.files[0])}/>
            {prodPrev && <img src={prodPrev} alt="" className="mt-2 h-24 rounded-xl object-contain border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 p-1"/>}

            {/* Product Library */}
            {showLib && (
              <div className="mt-3 p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-750">
                <p className="text-xs font-semibold text-gray-600 dark:text-gray-400 mb-2 uppercase tracking-wide">Product Library — {STORES.find(s=>s.id===storeId)?.name}</p>
                <div className="grid grid-cols-5 gap-2">
                  {libImages.map(img=>(
                    <div key={img.id} className="relative group">
                      <img src={img.data} alt={img.name} title={img.name}
                        onClick={()=>selectFromLib(img)}
                        className="w-full aspect-square object-cover rounded-lg border border-gray-200 dark:border-gray-600 cursor-pointer hover:border-indigo-400 hover:opacity-90 transition-all"/>
                      <button onClick={()=>removeFromLib(img.id)}
                        className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 text-xs items-center justify-center hidden group-hover:flex leading-none">✕</button>
                      <p className="text-xs text-gray-400 mt-0.5 truncate">{img.name}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
          <div className="mb-4">
            <Label>Image Size</Label>
            <div className="grid grid-cols-2 gap-2">
              {IMAGE_SIZES.map(s=>(
                <label key={s.value} className={`flex items-start gap-2 p-2.5 rounded-xl border cursor-pointer transition-all ${size===s.value?'border-indigo-500 bg-indigo-50 dark:bg-indigo-950/50':'border-gray-200 dark:border-gray-700 hover:border-indigo-300'}`}>
                  <input type="radio" name="imgSize" value={s.value} checked={size===s.value} onChange={()=>setSize(s.value)} className="mt-0.5 flex-shrink-0"/>
                  <div>
                    <p className="text-xs font-bold text-gray-800 dark:text-gray-200">{s.label}</p>
                    <p className="text-xs text-gray-500">{s.desc}</p>
                    {s.dalleSize!==s.value && <p className="text-xs text-amber-600 dark:text-amber-400">Renders at {s.dalleSize}</p>}
                  </div>
                </label>
              ))}
            </div>
          </div>
          <div className="mb-5">
            <div className="flex items-center justify-between mb-1">
              <Label className="mb-0">DALL-E 3 Prompt</Label>
              <button onClick={previewPrompt} disabled={isBusy} className="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline disabled:opacity-50">⚙ Preview &amp; Edit Prompt</button>
            </div>
            {showPrompt
              ? <Textarea value={editPrompt} onChange={e=>setEditPrompt(e.target.value)} rows={6} className="text-xs font-mono"/>
              : <div className="rounded-xl border border-dashed border-gray-200 dark:border-gray-700 p-3 text-xs text-gray-400 italic">Click "Preview &amp; Edit Prompt" to see the auto-built prompt — or just click Generate.</div>}
          </div>
          <Button onClick={generate} loading={isBusy} className="w-full" size="lg">
            {isBusy?(stepLabel[genStep]||'Working…'):'🎨 Generate Image'}
          </Button>
        </Card>
      </div>
      <div className="space-y-4">
        {result && (
          <Card>
            <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
              <h3 className="text-sm font-bold text-gray-900 dark:text-white uppercase tracking-wide">Result</h3>
              <div className="flex gap-2">
                {onUseInPost && (
                  <Button variant="success" size="sm" onClick={()=>onUseInPost(result.url)}>
                    📝 Use in Post
                  </Button>
                )}
                <a href={result.url} download="generated.png" target="_blank" rel="noopener noreferrer"><Button variant="secondary" size="sm">⬇ Download</Button></a>
              </div>
            </div>
            <img src={result.url} alt="Generated" className="w-full rounded-xl border border-gray-200 dark:border-gray-600 shadow-md"/>
            {result.revised && <details className="mt-3"><summary className="text-xs text-gray-400 cursor-pointer hover:text-gray-600 dark:hover:text-gray-300 select-none">DALL-E revised prompt ↓</summary><p className="text-xs text-gray-500 dark:text-gray-400 mt-1.5 font-mono leading-relaxed">{result.revised}</p></details>}
          </Card>
        )}
        {storeHistory.length>0 && (
          <Card>
            <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-3 uppercase tracking-wide">Recent — {store.name}</h3>
            <div className="grid grid-cols-4 gap-1.5">
              {storeHistory.slice(0,8).map(h=>(
                <a key={h.id} href={h.image_url} target="_blank" rel="noopener noreferrer" title={h.brief||'Generated image'}>
                  <img src={h.image_url} alt="" className="w-full aspect-square object-cover rounded-lg border border-gray-200 dark:border-gray-600 hover:opacity-75 transition-opacity"/>
                </a>
              ))}
            </div>
            <p className="text-xs text-gray-400 mt-2.5">⚠ DALL-E URLs expire in ~1 hour — download images to keep them.</p>
          </Card>
        )}
        {storeHistory.length===0&&!result && (
          <Card><div className="text-center py-10 text-gray-400 dark:text-gray-500 text-sm"><p className="text-3xl mb-2">🖼</p><p>Generated images appear here.</p><p className="text-xs mt-1">Set a brand profile first for best results.</p></div></Card>
        )}
      </div>
    </div>
  );
}

// SHELF TALKER — ADMIN: VISUAL FIELD EDITOR
// Drag-to-create, drag-to-move, resize text boxes on template preview
// Positions stored as % of template dimensions
// ═══════════════════════════════════════════════════════════════
const FIELD_DEFAULTS = {
  label:'New Field', placeholder:'', sample_text:'',
  required:false, multiline:false, max_lines:2, max_chars:null,
  align:'left', valign:'top', color:'#000000',
  max_font_size:48, min_font_size:8, bold:false, line_spacing:1.2, wrap:true,
  formula: null, prefix: '', suffix: '', uppercase: false,
};

function STFieldEditor({ templateDataUrl, fields, onChange }) {
  const containerRef = useRef();
  const [imgSize, setImgSize] = useState({ w:1, h:1 });
  const [selected, setSelected] = useState(null);
  const [dragging, setDragging] = useState(null); // { fieldId, type:'move'|'resize', startX, startY, origBox }
  const [drawing,  setDrawing]  = useState(null); // { startX, startY } %
  const [editingId, setEditingId] = useState(null);

  const pxToBox = useCallback((f, iw, ih) => ({
    x: f.x_pct/100*iw, y: f.y_pct/100*ih,
    w: f.w_pct/100*iw, h: f.h_pct/100*ih,
  }), []);

  const getRelXY = (e) => {
    const rect = containerRef.current.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) / rect.width * 100,
      y: (e.clientY - rect.top)  / rect.height * 100,
    };
  };

  const onImgLoad = (e) => setImgSize({ w: e.target.naturalWidth, h: e.target.naturalHeight });

  // Mouse down on canvas background → start drawing new field
  const onBgMouseDown = (e) => {
    if (e.target !== e.currentTarget) return;
    e.preventDefault();
    const { x, y } = getRelXY(e);
    setDrawing({ startX: x, startY: y, curX: x, curY: y });
    setSelected(null);
  };

  const onMouseMove = (e) => {
    if (drawing) {
      const { x, y } = getRelXY(e);
      setDrawing(d => d ? { ...d, curX: x, curY: y } : null);
    }
    if (dragging) {
      const { x, y } = getRelXY(e);
      const dx = x - dragging.startX, dy = y - dragging.startY;
      onChange(fields.map(f => {
        if (f.id !== dragging.fieldId) return f;
        const ob = dragging.origBox;
        if (dragging.type === 'move') {
          return { ...f,
            x_pct: Math.max(0, Math.min(95, ob.x + dx)),
            y_pct: Math.max(0, Math.min(95, ob.y + dy)),
          };
        } else {
          return { ...f,
            w_pct: Math.max(5, Math.min(100 - ob.x, ob.w + dx)),
            h_pct: Math.max(3, Math.min(100 - ob.y, ob.h + dy)),
          };
        }
      }));
    }
  };

  const onMouseUp = (e) => {
    if (drawing) {
      const { x, y } = getRelXY(e);
      const x0=Math.min(drawing.startX, x), y0=Math.min(drawing.startY, y);
      const w=Math.abs(x-drawing.startX), h=Math.abs(y-drawing.startY);
      if (w > 3 && h > 2) {
        const newField = {
          id: 'new_'+Date.now(), ...FIELD_DEFAULTS,
          x_pct: x0, y_pct: y0, w_pct: w, h_pct: h,
          label: `Field ${fields.length+1}`,
        };
        onChange([...fields, newField]);
        setSelected(newField.id);
        setEditingId(newField.id);
      }
      setDrawing(null);
    }
    if (dragging) setDragging(null);
  };

  const startDrag = (e, fieldId, type) => {
    e.preventDefault(); e.stopPropagation();
    const { x, y } = getRelXY(e);
    const f = fields.find(f=>f.id===fieldId);
    setDragging({ fieldId, type, startX:x, startY:y, origBox:{ x:f.x_pct, y:f.y_pct, w:f.w_pct, h:f.h_pct } });
    setSelected(fieldId);
  };

  const deleteField = (id) => { onChange(fields.filter(f=>f.id!==id)); setSelected(null); setEditingId(null); };
  const dupeField   = (f)  => {
    const newF = { ...f, id:'new_'+Date.now(), x_pct:f.x_pct+2, y_pct:f.y_pct+2, label:f.label+' copy' };
    onChange([...fields, newF]);
  };
  const updateField = (id, patch) => onChange(fields.map(f=>f.id===id?{...f,...patch}:f));

  const selField = fields.find(f=>f.id===selected);
  const editField = fields.find(f=>f.id===editingId);

  const draw = drawing ? {
    x: Math.min(drawing.startX, drawing.curX),
    y: Math.min(drawing.startY, drawing.curY),
    w: Math.abs(drawing.curX - drawing.startX),
    h: Math.abs(drawing.curY - drawing.startY),
  } : null;

  return (
    <div className="space-y-4">
      <p className="text-xs text-gray-500 dark:text-gray-400">
        <strong>Draw</strong> to create a field · <strong>Drag</strong> to move · <strong>Drag corner ◢</strong> to resize · <strong>Click</strong> to select and configure
      </p>
      <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
        {/* Canvas */}
        <div className="lg:col-span-3">
          <div
            ref={containerRef}
            className="relative select-none rounded-xl overflow-hidden border-2 border-dashed border-indigo-300 dark:border-indigo-700 cursor-crosshair"
            style={{ userSelect:'none' }}
            onMouseDown={onBgMouseDown}
            onMouseMove={onMouseMove}
            onMouseUp={onMouseUp}
            onMouseLeave={onMouseUp}
          >
            <img
              src={templateDataUrl}
              alt="template"
              className="w-full block pointer-events-none"
              draggable={false}
              onLoad={onImgLoad}
            />
            {/* Existing fields */}
            {fields.map(f => (
              <div
                key={f.id}
                onMouseDown={e=>startDrag(e,f.id,'move')}
                onClick={e=>{e.stopPropagation();setSelected(f.id);setEditingId(f.id);}}
                className={`absolute border-2 cursor-move ${selected===f.id?'border-indigo-500 bg-indigo-500/10':'border-blue-400/70 bg-blue-400/5'}`}
                style={{ left:`${f.x_pct}%`, top:`${f.y_pct}%`, width:`${f.w_pct}%`, height:`${f.h_pct}%` }}
              >
                <span className="absolute top-0.5 left-1 text-xs font-bold text-indigo-700 dark:text-indigo-300 whitespace-nowrap overflow-hidden leading-none" style={{fontSize:'10px'}}>
                  {f.label}
                </span>
                {f.sample_text && (
                  <span className="absolute inset-0 flex items-center justify-center text-gray-600 dark:text-gray-300 overflow-hidden pointer-events-none" style={{fontSize:'9px', padding:'14px 2px 2px'}}>
                    {f.sample_text}
                  </span>
                )}
                {/* Resize handle */}
                <div
                  onMouseDown={e=>startDrag(e,f.id,'resize')}
                  className="absolute bottom-0 right-0 w-4 h-4 cursor-se-resize flex items-end justify-end text-indigo-500"
                  style={{fontSize:'10px'}}
                >◢</div>
              </div>
            ))}
            {/* In-progress draw rectangle */}
            {draw && draw.w>0.5 && (
              <div className="absolute border-2 border-dashed border-green-500 bg-green-400/10 pointer-events-none"
                style={{left:`${draw.x}%`,top:`${draw.y}%`,width:`${draw.w}%`,height:`${draw.h}%`}}/>
            )}
          </div>
        </div>

        {/* Field list + settings panel */}
        <div className="lg:col-span-2 space-y-3">
          {/* Field list */}
          <div className="space-y-1 max-h-40 overflow-y-auto pr-1">
            {fields.length===0 && <p className="text-xs text-gray-400 italic">Draw a field on the template to get started.</p>}
            {fields.map((f,i)=>(
              <div key={f.id} onClick={()=>{setSelected(f.id);setEditingId(f.id);}}
                className={`flex items-center gap-2 px-2 py-1.5 rounded-lg cursor-pointer text-xs ${selected===f.id?'bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-300':'bg-gray-50 dark:bg-gray-700/50 border border-transparent'}`}>
                <span className="font-bold text-gray-400 w-4">{i+1}</span>
                <span className="flex-1 font-medium text-gray-800 dark:text-gray-200 truncate">{f.label}</span>
                {f.required && <Badge color="red">req</Badge>}
                <button onClick={e=>{e.stopPropagation();dupeField(f);}} className="text-gray-400 hover:text-indigo-500 px-1">⧉</button>
                <button onClick={e=>{e.stopPropagation();deleteField(f.id);}} className="text-gray-400 hover:text-red-500 px-1">✕</button>
              </div>
            ))}
          </div>

          {/* Settings panel for selected field */}
          {editField && (
            <div className="bg-gray-50 dark:bg-gray-700/50 rounded-xl p-3 space-y-2 border border-gray-200 dark:border-gray-700">
              <p className="text-xs font-bold text-gray-700 dark:text-gray-200 uppercase tracking-wide">Field Settings</p>

              <div><Label>Manager Label</Label>
                <Input value={editField.label} onChange={e=>updateField(editField.id,{label:e.target.value})} className="text-xs py-1"/>
              </div>
              <div><Label>Placeholder</Label>
                <Input value={editField.placeholder} onChange={e=>updateField(editField.id,{placeholder:e.target.value})} placeholder="Hint text…" className="text-xs py-1"/>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div><Label>Prefix (e.g. $)</Label>
                  <Input value={editField.prefix||''} onChange={e=>updateField(editField.id,{prefix:e.target.value})} placeholder="optional" className="text-xs py-1 font-mono"/>
                </div>
                <div><Label>Suffix (20% size)</Label>
                  <Input value={editField.suffix||''} onChange={e=>updateField(editField.id,{suffix:e.target.value})} placeholder="e.g. ea" className="text-xs py-1 font-mono"/>
                </div>
              </div>
              <div><Label>Sample Preview Text</Label>
                <Input value={editField.sample_text} onChange={e=>updateField(editField.id,{sample_text:e.target.value})} className="text-xs py-1"/>
              </div>

              <div className="grid grid-cols-2 gap-2">
                <div><Label>Max Font (px)</Label>
                  <Input type="number" value={editField.max_font_size} min={8} max={300}
                    onChange={e=>updateField(editField.id,{max_font_size:+e.target.value})} className="text-xs py-1"/>
                </div>
                <div><Label>Min Font (px)</Label>
                  <Input type="number" value={editField.min_font_size} min={6} max={72}
                    onChange={e=>updateField(editField.id,{min_font_size:+e.target.value})} className="text-xs py-1"/>
                </div>
                <div><Label>Align</Label>
                  <Select value={editField.align} onChange={e=>updateField(editField.id,{align:e.target.value})} className="text-xs py-1">
                    <option value="left">Left</option><option value="center">Center</option><option value="right">Right</option>
                  </Select>
                </div>
                <div><Label>V-Align</Label>
                  <Select value={editField.valign} onChange={e=>updateField(editField.id,{valign:e.target.value})} className="text-xs py-1">
                    <option value="top">Top</option><option value="middle">Middle</option><option value="bottom">Bottom</option>
                  </Select>
                </div>
                <div><Label>Text Color</Label>
                  <Input type="color" value={editField.color} onChange={e=>updateField(editField.id,{color:e.target.value})} className="text-xs py-1 h-8"/>
                </div>
                <div><Label>Line Spacing</Label>
                  <Input type="number" value={editField.line_spacing} step={0.05} min={0.8} max={3}
                    onChange={e=>updateField(editField.id,{line_spacing:+e.target.value})} className="text-xs py-1"/>
                </div>
              </div>

              <div className="flex flex-wrap gap-3 text-xs">
                <label className="flex items-center gap-1 cursor-pointer">
                  <input type="checkbox" checked={editField.required} onChange={e=>updateField(editField.id,{required:e.target.checked})} className="rounded"/>
                  Required
                </label>
                <label className="flex items-center gap-1 cursor-pointer">
                  <input type="checkbox" checked={editField.bold} onChange={e=>updateField(editField.id,{bold:e.target.checked})} className="rounded"/>
                  Bold
                </label>
                <label className="flex items-center gap-1 cursor-pointer">
                  <input type="checkbox" checked={editField.multiline} onChange={e=>updateField(editField.id,{multiline:e.target.checked})} className="rounded"/>
                  Multiline
                </label>
                <label className="flex items-center gap-1 cursor-pointer">
                  <input type="checkbox" checked={editField.wrap} onChange={e=>updateField(editField.id,{wrap:e.target.checked})} className="rounded"/>
                  Word Wrap
                </label>
                <label className="flex items-center gap-1 cursor-pointer">
                  <input type="checkbox" checked={!!editField.uppercase} onChange={e=>updateField(editField.id,{uppercase:e.target.checked})} className="rounded"/>
                  All Caps
                </label>
              </div>
              {editField.multiline && (
                <div><Label>Max Lines</Label>
                  <Input type="number" value={editField.max_lines} min={1} max={20}
                    onChange={e=>updateField(editField.id,{max_lines:+e.target.value})} className="text-xs py-1"/>
                </div>
              )}

              {/* Auto-calculate formula */}
              <div className="mt-3 pt-3 border-t border-gray-200 dark:border-gray-700">
                <label className="flex items-center gap-1.5 text-xs font-medium cursor-pointer">
                  <input type="checkbox"
                    checked={typeof editField.formula === 'string'}
                    onChange={function(e) { updateField(editField.id, {formula: e.target.checked ? '' : null}); }}
                    className="rounded"/>
                  Auto-calculate (sum other fields)
                </label>
                {typeof editField.formula === 'string' && (
                  <div className="mt-2 space-y-1.5">
                    <div className="grid grid-cols-3 text-xs text-gray-400 font-medium px-0.5">
                      <span className="col-span-1"></span>
                      <span className="col-span-1">Field</span>
                      <span className="text-right">Multiplier</span>
                    </div>
                    {fields.filter(f => f.id !== editField.id).length === 0
                      ? <p className="text-xs text-gray-400 italic">No other fields yet</p>
                      : fields.filter(f => f.id !== editField.id).map(f => {
                          const token = '{' + f.label + '}';
                          const idx = editField.formula.indexOf(token);
                          const included = idx !== -1;
                          const afterToken = included ? editField.formula.slice(idx + token.length) : '';
                          const coeffMatch = afterToken.match(/^\*(-?[\d.]+)/);
                          const coeff = coeffMatch ? parseFloat(coeffMatch[1]) : 1;

                          const rebuild = (newIncluded, newCoeff) => {
                            const parts = fields
                              .filter(ff => ff.id !== editField.id)
                              .filter(ff => {
                                if (ff.id === f.id) return newIncluded;
                                return editField.formula.indexOf('{' + ff.label + '}') !== -1;
                              })
                              .map(ff => {
                                let c;
                                if (ff.id === f.id) {
                                  c = newCoeff;
                                } else {
                                  const t = '{' + ff.label + '}';
                                  const i = editField.formula.indexOf(t);
                                  const a = i !== -1 ? editField.formula.slice(i + t.length) : '';
                                  const m = a.match(/^\*(-?[\d.]+)/);
                                  c = m ? parseFloat(m[1]) : 1;
                                }
                                return c === 1 ? ('{' + ff.label + '}') : ('{' + ff.label + '}*' + c);
                              });
                            return parts.join('+');
                          };

                          return (
                            <div key={f.id} className="flex items-center gap-2">
                              <input type="checkbox" className="rounded accent-indigo-600 shrink-0"
                                checked={included}
                                onChange={e => updateField(editField.id, {formula: rebuild(e.target.checked, coeff)})}/>
                              <span className="text-xs flex-1 text-gray-700 dark:text-gray-300 truncate">{f.label}</span>
                              {included && (
                                <Input type="number" key={coeff} defaultValue={coeff} step="1" min="-9999" max="9999"
                                  onChange={e => {
                                    const val = parseFloat(e.target.value);
                                    if (!isNaN(val)) updateField(editField.id, {formula: rebuild(true, val)});
                                  }}
                                  className="text-xs py-0.5 w-16 text-right"/>
                              )}
                              {!included && <span className="w-16"/>}
                            </div>
                          );
                        })
                    }
                    <p className="text-xs text-gray-400 pt-1">Use negative multipliers to subtract. Prefix is set above.</p>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Admin: Template Upload Form ──────────────────────────────
function STTemplateForm({ onSaved, initialTemplate=null }) {
  const toast = useToast();
  const [name,       setName]       = useState(initialTemplate?.name||'');
  const [desc,       setDesc]       = useState(initialTemplate?.description||'');
  const [category,   setCategory]   = useState(initialTemplate?.category||'Generic');
  const [scope,      setScope]      = useState(initialTemplate?.scope||'global');
  const [brands,     setBrands]     = useState(initialTemplate?.shelf_talker_template_brands?.map(b=>b.store_id)||[]);
  const [widthIn,    setWidthIn]    = useState(initialTemplate?.width_in||4.25);
  const [heightIn,   setHeightIn]   = useState(initialTemplate?.height_in||5.5);
  const [isActive,     setIsActive]     = useState(initialTemplate?.is_active ?? true);
  const [isLandscape,  setIsLandscape]  = useState(initialTemplate?.is_landscape ?? false);
  const [fileData,   setFileData]   = useState(initialTemplate?.file_data||null);
  const [fileType,   setFileType]   = useState(initialTemplate?.file_type||'png');
  const [saving,     setSaving]     = useState(false);
  const [fields,     setFields]     = useState([]);
  const [savedId,    setSavedId]    = useState(initialTemplate?.id||null);
  const [step,       setStep]       = useState(initialTemplate ? 'fields' : 'upload'); // 'upload'|'fields'
  const fileRef = useRef();
  const { fields: loadedFields, save: saveFields } = useSTFields(savedId);

  useEffect(() => {
    if (loadedFields.length) setFields(loadedFields);
  }, [loadedFields.length]);

  const handleFile = async (file) => {
    if (!file) return;
    const allowed = ['image/png','image/jpeg','image/jpg','application/pdf'];
    if (!allowed.includes(file.type)) { toast.error('Only PNG, JPG or PDF files are supported'); return; }
    if (file.size > 20*1024*1024) { toast.error('File must be under 20 MB'); return; }
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const dataUrl = ev.target.result;
      if (file.type === 'application/pdf') {
        toast.info('Rendering PDF first page…');
        try {
          const rendered = await pdfPageToDataUrl(dataUrl);
          setFileData(rendered); setFileType('pdf');
        } catch(e) { toast.error('Could not render PDF: '+e.message); }
      } else {
        setFileData(dataUrl); setFileType(file.type.includes('png')?'png':'jpg');
      }
    };
    reader.readAsDataURL(file);
  };

  const saveTemplate = async () => {
    if (!name.trim()) { toast.error('Enter a template name'); return; }
    if (!fileData)    { toast.error('Upload a template file first'); return; }
    setSaving(true);
    try {
      const sb = getSB();
      const payload = {
        name: name.trim(), description: desc.trim(), file_data: fileData,
        file_type: fileType, width_in: +widthIn, height_in: +heightIn,
        scope, category, is_active: isActive, is_landscape: isLandscape,
        updated_at: new Date().toISOString(),
      };
      let id = savedId;
      if (id) {
        await sb.from('shelf_talker_templates').update(payload).eq('id', id);
      } else {
        const { data, error } = await sb.from('shelf_talker_templates').insert(payload).select().single();
        if (error) throw error;
        id = data.id;
        setSavedId(id);
      }
      // Brand assignments
      await sb.from('shelf_talker_template_brands').delete().eq('template_id', id);
      if (scope==='brand' && brands.length) {
        await sb.from('shelf_talker_template_brands').insert(brands.map(s=>({ template_id:id, store_id:s })));
      }
      toast.success('Template saved! Now set up the text fields.');
      setStep('fields');
      setSavedId(id);
    } catch(e) { toast.error(e.message); }
    finally { setSaving(false); }
  };

  const saveFieldLayout = async () => {
    if (!savedId) { toast.error('Save template info first'); return; }
    setSaving(true);
    try {
      await saveFields(fields.map(({ id:_id, ...f }) => ({ ...f })));
      toast.success('Fields saved!');
      onSaved?.();
    } catch(e) { toast.error(e.message); }
    finally { setSaving(false); }
  };

  return (
    <div className="space-y-4">
      {/* Step tabs */}
      <div className="flex gap-1 border-b border-gray-200 dark:border-gray-700 mb-2">
        {[{id:'upload',label:'1 · Template Info'},{id:'fields',label:'2 · Text Fields'}].map(t=>(
          <button key={t.id} disabled={t.id==='fields'&&!savedId}
            onClick={()=>setStep(t.id)}
            className={`px-4 py-2 text-sm font-semibold border-b-2 transition-colors ${step===t.id?'border-indigo-500 text-indigo-600 dark:text-indigo-400':'border-transparent text-gray-500 dark:text-gray-400 disabled:opacity-40 hover:text-gray-700 dark:hover:text-gray-200'}`}>
            {t.label}
          </button>
        ))}
      </div>

      {step==='upload' && (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div className="space-y-3">
            <div><Label>Template Name *</Label><Input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Classic Sale Tag"/></div>
            <div><Label>Description</Label><Textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={2} placeholder="Optional notes…"/></div>
            <div><Label>Category</Label>
              <Select value={category} onChange={e=>setCategory(e.target.value)}>
                {ST_CATEGORIES.map(c=><option key={c}>{c}</option>)}
              </Select>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div><Label>Width (inches)</Label><Input type="number" value={widthIn} step={0.25} min={1} max={8.5} onChange={e=>setWidthIn(e.target.value)}/></div>
              <div><Label>Height (inches)</Label><Input type="number" value={heightIn} step={0.25} min={1} max={11} onChange={e=>setHeightIn(e.target.value)}/></div>
            </div>
            <div>
              <Label>Availability</Label>
              <div className="flex gap-3 mt-1">
                {['global','brand'].map(s=>(
                  <label key={s} className="flex items-center gap-1.5 text-sm cursor-pointer">
                    <input type="radio" checked={scope===s} onChange={()=>setScope(s)} className="accent-indigo-600"/>
                    {s==='global'?'🌐 Global (all stores)':'🏪 Brand Specific'}
                  </label>
                ))}
              </div>
            </div>
            {scope==='brand' && (
              <div>
                <Label>Assign to Stores</Label>
                <div className="flex flex-col gap-1 mt-1">
                  {STORES.map(s=>(
                    <label key={s.id} className="flex items-center gap-2 text-sm cursor-pointer">
                      <input type="checkbox" checked={brands.includes(s.id)}
                        onChange={e=>setBrands(p=>e.target.checked?[...p,s.id]:p.filter(x=>x!==s.id))}
                        className="accent-indigo-600 rounded"/>
                      {s.name}
                    </label>
                  ))}
                </div>
              </div>
            )}
            <label className="flex items-center gap-2 text-sm cursor-pointer">
              <input type="checkbox" checked={isLandscape} onChange={e=>setIsLandscape(e.target.checked)} className="accent-indigo-600 rounded"/>
              Landscape orientation (rotate 90° when printing 4-up)
            </label>
            <label className="flex items-center gap-2 text-sm cursor-pointer">
              <input type="checkbox" checked={isActive} onChange={e=>setIsActive(e.target.checked)} className="accent-indigo-600 rounded"/>
              Active (visible to store managers)
            </label>
            <Button onClick={saveTemplate} loading={saving} className="w-full">
              {savedId ? 'Update Template Info →' : 'Save & Continue to Fields →'}
            </Button>
          </div>
          <div>
            <Label>Template File (PNG, JPG or PDF)</Label>
            <div
              className="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-4 text-center cursor-pointer hover:border-indigo-400 transition-colors"
              onClick={()=>fileRef.current?.click()}
              onDragOver={e=>{e.preventDefault();}}
              onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}}
            >
              {fileData
                ? <img src={fileData} alt="" className="max-h-64 mx-auto rounded-lg object-contain"/>
                : <div className="py-8 text-gray-400">
                    <p className="text-3xl mb-2">📄</p>
                    <p className="text-sm font-medium">Click or drag to upload</p>
                    <p className="text-xs mt-1">PNG · JPG · PDF — max 20 MB</p>
                  </div>
              }
            </div>
            <input ref={fileRef} type="file" accept="image/png,image/jpeg,.pdf,application/pdf" className="hidden"
              onChange={e=>handleFile(e.target.files[0])}/>
            {fileData && <Button variant="ghost" size="sm" className="mt-2 text-red-500" onClick={()=>setFileData(null)}>Remove file</Button>}
          </div>
        </div>
      )}

      {step==='fields' && fileData && (
        <div className="space-y-4">
          <STFieldEditor templateDataUrl={fileData} fields={fields} onChange={setFields}/>
          <Button onClick={saveFieldLayout} loading={saving} className="w-full">
            💾 Save Field Layout
          </Button>
        </div>
      )}
    </div>
  );
}

// ─── Admin: Template Library ─────────────────────────────────
function STAdminLibrary({ onEditTemplate }) {
  const toast = useToast();
  const { templates, loading, reload } = useSTTemplates(null, true);
  const [search,     setSearch]     = useState('');
  const [catFilter,  setCatFilter]  = useState('all');
  const [scopeFilter,setScopeFilter]= useState('all');
  const [sortBy,     setSortBy]     = useState('newest');

  const toggleActive = async (tpl) => {
    const sb=getSB();
    await sb.from('shelf_talker_templates').update({ is_active:!tpl.is_active, updated_at:new Date().toISOString() }).eq('id',tpl.id);
    reload();
  };

  const duplicateTemplate = async (tpl) => {
    const sb=getSB();
    const { data:newTpl, error } = await sb.from('shelf_talker_templates')
      .insert({ ...tpl, id:undefined, name:tpl.name+' (copy)', created_at:undefined, updated_at:undefined })
      .select().single();
    if (error) { toast.error(error.message); return; }
    // Copy brands
    if (tpl.shelf_talker_template_brands?.length) {
      await sb.from('shelf_talker_template_brands').insert(
        tpl.shelf_talker_template_brands.map(b=>({ template_id:newTpl.id, store_id:b.store_id }))
      );
    }
    // Copy fields
    const { data:srcFields } = await sb.from('shelf_talker_fields').select('*').eq('template_id',tpl.id);
    if (srcFields?.length) {
      await sb.from('shelf_talker_fields').insert(
        srcFields.map(({id:_,...f})=>({ ...f, template_id:newTpl.id }))
      );
    }
    toast.success('Template duplicated!');
    reload();
  };

  const deleteTemplate = async (id) => {
    if (!confirm('Delete this template? This cannot be undone.')) return;
    await getSB().from('shelf_talker_templates').delete().eq('id',id);
    reload();
    toast.success('Deleted');
  };

  let list = [...templates];
  if (search) list = list.filter(t=>t.name.toLowerCase().includes(search.toLowerCase()));
  if (catFilter!=='all') list = list.filter(t=>t.category===catFilter);
  if (scopeFilter!=='all') list = list.filter(t=>t.scope===scopeFilter);
  if (sortBy==='newest')   list.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  if (sortBy==='updated')  list.sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));
  if (sortBy==='alpha')    list.sort((a,b)=>a.name.localeCompare(b.name));

  return (
    <div className="space-y-4">
      <div className="flex flex-wrap gap-2">
        <Input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search templates…" className="max-w-xs"/>
        <Select value={catFilter} onChange={e=>setCatFilter(e.target.value)} className="w-auto">
          <option value="all">All Categories</option>
          {ST_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </Select>
        <Select value={scopeFilter} onChange={e=>setScopeFilter(e.target.value)} className="w-auto">
          <option value="all">All Scope</option>
          <option value="global">Global</option>
          <option value="brand">Brand Specific</option>
        </Select>
        <Select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="w-auto">
          <option value="newest">Newest</option>
          <option value="updated">Recently Updated</option>
          <option value="alpha">A–Z</option>
        </Select>
      </div>

      {loading && <p className="text-sm text-gray-400 animate-pulse">Loading templates…</p>}
      {!loading && list.length===0 && <p className="text-sm text-gray-400 italic">No templates found.</p>}

      <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
        {list.map(tpl => {
          const brandNames = STORES.filter(s=>(tpl.shelf_talker_template_brands||[]).some(b=>b.store_id===s.id)).map(s=>s.name.split(' ')[0]);
          return (
            <div key={tpl.id} className="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm overflow-hidden flex flex-col">
              <div className="relative aspect-[4/5] bg-gray-100 dark:bg-gray-900 overflow-hidden">
                <img src={tpl.file_data} alt={tpl.name} className="absolute inset-0 w-full h-full object-contain"/>
                <div className="absolute top-2 left-2 flex gap-1 flex-wrap">
                  {tpl.scope==='global'
                    ? <Badge color="blue">🌐 Global</Badge>
                    : brandNames.map(n=><Badge key={n} color="indigo">{n}</Badge>)
                  }
                </div>
                <div className="absolute top-2 right-2">
                  <Badge color={tpl.is_active?'green':'gray'}>{tpl.is_active?'Active':'Inactive'}</Badge>
                </div>
              </div>
              <div className="p-3 flex-1 flex flex-col gap-2">
                <div>
                  <p className="font-semibold text-gray-900 dark:text-white text-sm">{tpl.name}</p>
                  <p className="text-xs text-gray-500 dark:text-gray-400">{tpl.category} · {tpl.width_in}″×{tpl.height_in}″</p>
                  {tpl.description && <p className="text-xs text-gray-400 mt-1 line-clamp-2">{tpl.description}</p>}
                </div>
                <p className="text-xs text-gray-400">{fmtDate(tpl.updated_at)}</p>
                <div className="flex gap-1 flex-wrap mt-auto">
                  <Button size="sm" variant="outline" onClick={()=>onEditTemplate(tpl)} className="text-xs">✏️ Edit</Button>
                  <Button size="sm" variant="secondary" onClick={()=>duplicateTemplate(tpl)} className="text-xs">⧉ Dupe</Button>
                  <Button size="sm" variant="ghost" onClick={()=>toggleActive(tpl)} className="text-xs">{tpl.is_active?'Deactivate':'Activate'}</Button>
                  <Button size="sm" variant="danger" onClick={()=>deleteTemplate(tpl.id)} className="text-xs">🗑</Button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function fmtLastSeen(ts) {
  if (!ts) return 'Never';
  var d = new Date(ts);
  var now = new Date();
  var diffMs = now - d;
  var mins  = Math.floor(diffMs / 60000);
  var hours = Math.floor(diffMs / 3600000);
  var days  = Math.floor(diffMs / 86400000);
  if (mins  <  2) return 'Just now';
  if (mins  < 60) return mins + 'm ago';
  if (hours < 24) return hours + 'h ago';
  if (days  <  7) return days + 'd ago';
  return d.toLocaleDateString('en-CA', { month:'short', day:'numeric', year: d.getFullYear()!==now.getFullYear()?'numeric':undefined });
}

// USER ACCOUNTS SECTION (admin only)
// ─────────────────────────────────────────────
function UserAccountsSection({ currentUserId }) {
  const toast = useToast();
  const [users,        setUsers]        = useState([]);
  const [loading,      setLoading]      = useState(true);
  const [email,        setEmail]        = useState('');
  const [password,     setPassword]     = useState('');
  const [role,         setRole]         = useState('store');
  const [newStoreIds,  setNewStoreIds]  = useState([]);
  const [creating,     setCreating]     = useState(false);
  const [deletingId,   setDeletingId]   = useState(null);
  const [showPw,       setShowPw]       = useState(false);
  const [resetId,      setResetId]      = useState(null);
  const [newPw,        setNewPw]        = useState('');
  const [resetting,    setResetting]    = useState(false);
  const [editStoresId, setEditStoresId] = useState(null);
  const [editStoreIds, setEditStoreIds] = useState([]);
  const [savingStores, setSavingStores] = useState(false);

  const callAdmin = async (body) => {
    const { data: { session } } = await getSB().auth.getSession();
    const resp = await fetch(`${SUPABASE_URL}/functions/v1/user-admin`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
        'apikey': SUPABASE_KEY,
      },
      body: JSON.stringify(body),
    });
    const json = await resp.json();
    if (json.error) throw new Error(json.error);
    return json;
  };

  const loadUsers = useCallback(async () => {
    setLoading(true);
    try {
      const { users: u } = await callAdmin({ action: 'list' });
      const filtered = (u || []).filter(function(x) { return x.user_id !== currentUserId; });
      const userIds = filtered.map(function(x) { return x.user_id; }).filter(Boolean);
      if (userIds.length > 0) {
        const sb = getSB();
        if (sb) {
          const rolesResult = await sb.from('user_roles').select('user_id, store_id, store_ids').in('user_id', userIds);
          const rolesData = rolesResult.data || [];
          const rolesMap = {};
          rolesData.forEach(function(r) { rolesMap[r.user_id] = r; });
          filtered.forEach(function(x) {
            const r = rolesMap[x.user_id];
            if (r) {
              x.store_id = r.store_id;
              x.store_ids = (r.store_ids && r.store_ids.length > 0) ? r.store_ids : (r.store_id ? [r.store_id] : []);
            } else {
              x.store_ids = x.store_id ? [x.store_id] : [];
            }
          });
        }
      }
      setUsers(filtered);
    } catch(e) { toast.error(e.message); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { loadUsers(); }, [loadUsers]);

  const toggleNewStore = (sid) => {
    setNewStoreIds(function(prev) {
      return prev.indexOf(sid) !== -1 ? prev.filter(function(x) { return x !== sid; }) : prev.concat(sid);
    });
  };

  const toggleEditStore = (sid) => {
    setEditStoreIds(function(prev) {
      return prev.indexOf(sid) !== -1 ? prev.filter(function(x) { return x !== sid; }) : prev.concat(sid);
    });
  };

  const createUser = async () => {
    if (!email.trim())       { toast.error('Enter an email address'); return; }
    if (password.length < 8) { toast.error('Password must be at least 8 characters'); return; }
    if (role === 'store' && newStoreIds.length === 0) { toast.error('Select at least one store'); return; }
    setCreating(true);
    try {
      await callAdmin({ action: 'create', email: email.trim(), password, role });
      const { users: fresh } = await callAdmin({ action: 'list' });
      const newU = fresh && fresh.find(function(x) { return x.email === email.trim(); });
      if (newU && newU.user_id && role === 'store') {
        await getSB().from('user_roles').update({
          store_id: newStoreIds[0] || null,
          store_ids: newStoreIds,
        }).eq('user_id', newU.user_id);
      }
      toast.success('Account created for ' + email.trim());
      setEmail(''); setPassword(''); setNewStoreIds([]);
      await loadUsers();
    } catch(e) { toast.error(e.message); }
    finally { setCreating(false); }
  };

  const deleteUser = async (userId, userEmail) => {
    if (!confirm('Delete account for ' + userEmail + '?\nThis cannot be undone.')) return;
    setDeletingId(userId);
    try {
      await callAdmin({ action: 'delete', userId });
      toast.success('Account deleted');
      setUsers(function(p) { return p.filter(function(x) { return x.user_id !== userId; }); });
    } catch(e) { toast.error(e.message); }
    finally { setDeletingId(null); }
  };

  const resetPassword = async (userId) => {
    if (newPw.length < 8) { toast.error('Password must be at least 8 characters'); return; }
    setResetting(true);
    try {
      await callAdmin({ action: 'update_password', userId, password: newPw });
      toast.success('Password updated');
      setResetId(null); setNewPw('');
    } catch(e) { toast.error(e.message); }
    finally { setResetting(false); }
  };

  const openEditStores = (u) => {
    setEditStoresId(u.user_id);
    setEditStoreIds(u.store_ids || []);
    setResetId(null);
  };

  const saveStores = async (userId) => {
    setSavingStores(true);
    try {
      await getSB().from('user_roles').update({
        store_id: editStoreIds[0] || null,
        store_ids: editStoreIds,
      }).eq('user_id', userId);
      toast.success('Stores updated');
      setEditStoresId(null);
      await loadUsers();
    } catch(e) { toast.error(e.message); }
    finally { setSavingStores(false); }
  };

  return (
    <Card>
      <h2 className="text-base font-bold text-gray-900 dark:text-white mb-1">👥 Store User Accounts</h2>
      <p className="text-xs text-gray-500 dark:text-gray-400 mb-4">Create logins for store staff. Store accounts can be assigned to one or more locations.</p>

      {/* Create form */}
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
        <div>
          <Label>Email</Label>
          <Input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="staff@hideaway.com"/>
        </div>
        <div>
          <Label>Password</Label>
          <div className="relative">
            <Input type={showPw?'text':'password'} value={password} onChange={e=>setPassword(e.target.value)} placeholder="Min 8 characters"/>
            <button type="button" onClick={()=>setShowPw(p=>!p)} className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 text-xs">{showPw?'hide':'show'}</button>
          </div>
        </div>
        <div>
          <Label>Role</Label>
          <Select value={role} onChange={e=>{ setRole(e.target.value); setNewStoreIds([]); }}>
            <option value="store">Store (Posts + Shelf Talkers)</option>
            <option value="admin">Admin (Full access)</option>
          </Select>
        </div>
        {role==='store' && (
          <div>
            <Label>Assigned Stores</Label>
            <div className="flex flex-wrap gap-x-4 gap-y-2 mt-1">
              {STORES.map(s => (
                <label key={s.id} className="flex items-center gap-1.5 text-sm cursor-pointer text-gray-700 dark:text-gray-300">
                  <input type="checkbox" checked={newStoreIds.indexOf(s.id) !== -1} onChange={()=>toggleNewStore(s.id)} className="accent-indigo-600"/>
                  {s.name.split(' ')[0]}
                </label>
              ))}
            </div>
          </div>
        )}
      </div>
      <Button onClick={createUser} loading={creating} size="sm" className="mb-5">+ Create Account</Button>

      {/* User list */}
      <div className="border-t border-gray-100 dark:border-gray-700 pt-4">
        <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-3">Existing Accounts</p>
        {loading ? (
          <p className="text-xs text-gray-400 animate-pulse">Loading…</p>
        ) : users.length === 0 ? (
          <p className="text-xs text-gray-400 italic">No store accounts yet.</p>
        ) : (
          <div className="space-y-2">
            {users.map(function(u) { return (
              <div key={u.user_id} className="rounded-xl bg-gray-50 dark:bg-gray-700/50 border border-gray-100 dark:border-gray-700 overflow-hidden">
                <div className="flex items-center justify-between px-3 py-2.5 flex-wrap gap-y-1">
                  <div className="flex flex-col gap-0.5 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="text-sm font-medium text-gray-900 dark:text-white">{u.email}</span>
                      <span className={`text-xs px-1.5 py-0.5 rounded font-semibold ${u.role==='admin'?'bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-300':'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300'}`}>{u.role}</span>
                      {(u.store_ids || []).map(function(sid) {
                        var s = STORES.find(function(st) { return st.id === sid; });
                        if (!s) return null;
                        return <span key={sid} className="text-xs text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 rounded px-1.5 py-0.5">{s.name.split(' ')[0]}</span>;
                      })}
                    </div>
                    <span className="text-xs text-gray-400 dark:text-gray-500">Last login: {fmtLastSeen(u.last_sign_in_at)}</span>
                  </div>
                  <div className="flex items-center gap-2">
                    {u.role === 'store' && (
                      <button onClick={()=>{ if(editStoresId===u.user_id){ setEditStoresId(null); } else { openEditStores(u); } }} className="text-xs text-green-600 hover:text-green-800 dark:text-green-400 font-semibold">
                        {editStoresId===u.user_id ? 'Cancel' : '🏪 Stores'}
                      </button>
                    )}
                    <button onClick={()=>{ setResetId(resetId===u.user_id?null:u.user_id); setNewPw(''); setEditStoresId(null); }} className="text-xs text-indigo-500 hover:text-indigo-700 font-semibold">
                      {resetId===u.user_id ? 'Cancel' : '🔑 Reset PW'}
                    </button>
                    <button onClick={()=>deleteUser(u.user_id, u.email)} disabled={deletingId===u.user_id} className="text-xs text-red-500 hover:text-red-700 font-semibold disabled:opacity-40">
                      {deletingId===u.user_id ? '…' : 'Remove'}
                    </button>
                  </div>
                </div>
                {editStoresId===u.user_id && (
                  <div className="px-3 pb-3 border-t border-gray-100 dark:border-gray-700 pt-2">
                    <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2">Assign Stores</p>
                    <div className="flex flex-wrap gap-x-4 gap-y-2 mb-3">
                      {STORES.map(function(s) { return (
                        <label key={s.id} className="flex items-center gap-1.5 text-sm cursor-pointer text-gray-700 dark:text-gray-300">
                          <input type="checkbox" checked={editStoreIds.indexOf(s.id) !== -1} onChange={()=>toggleEditStore(s.id)} className="accent-indigo-600"/>
                          {s.name}
                        </label>
                      ); })}
                    </div>
                    <Button size="sm" loading={savingStores} onClick={()=>saveStores(u.user_id)}>Save Stores</Button>
                  </div>
                )}
                {resetId===u.user_id && (
                  <div className="flex gap-2 px-3 pb-2.5 border-t border-gray-100 dark:border-gray-700 pt-2">
                    <Input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="New password (min 8 chars)" className="flex-1 text-sm"/>
                    <Button size="sm" loading={resetting} onClick={()=>resetPassword(u.user_id)}>Save</Button>
                  </div>
                )}
              </div>
            ); })}
          </div>
        )}
      </div>
    </Card>
  );
}

function TemplateManager({ storeId }) {
  const toast = useToast();
  const { templates, add, remove } = useBrandTemplates(storeId);
  const [name,      setName]     = useState('');
  const [sizeLabel, setSizeLabel]= useState('1:1 Square');
  const [preview,   setPreview]  = useState(null);
  const [saving,    setSaving]   = useState(false);
  const [filterSz,  setFilterSz] = useState('all');
  const fileRef = useRef();

  const handleFile = file => {
    if (!file) return;
    const r = new FileReader();
    r.onload = () => setPreview(r.result);
    r.readAsDataURL(file);
  };

  const save = async () => {
    if (!preview)      { toast.error('Upload a template image first'); return; }
    if (!name.trim())  { toast.error('Give the template a name'); return; }
    setSaving(true);
    try {
      const sz = TEMPLATE_SIZES.find(s=>s.label===sizeLabel) || TEMPLATE_SIZES[0];
      // Compress to reasonable size
      const compressed = await compressImage(preview, Math.max(sz.w, sz.h), 0.88);
      await add({ name: name.trim(), size_label: sizeLabel, canvas_w: sz.w, canvas_h: sz.h, data: compressed });
      toast.success('Template saved!');
      setName(''); setPreview(null);
      if (fileRef.current) fileRef.current.value = '';
    } catch(e) { toast.error(e.message); }
    finally { setSaving(false); }
  };

  const grouped = TEMPLATE_SIZES.reduce((acc, sz) => {
    acc[sz.label] = templates.filter(t=>t.size_label===sz.label);
    return acc;
  }, {});
  const allSizes = TEMPLATE_SIZES.filter(sz => templates.some(t=>t.size_label===sz.label));

  return (
    <div className="space-y-5">
      {/* Upload new template */}
      <Card>
        <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4 uppercase tracking-wide">Upload Template Background</h3>
        <p className="text-xs text-gray-500 dark:text-gray-400 mb-4">
          Design your ad background in Canva, Photoshop, etc. — include your logo and brand elements, but <strong>leave the right side open</strong> for the product and <strong>left side open</strong> for price text. Export as PNG and upload here.
        </p>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div className="space-y-3">
            <div><Label>Template Name</Label><Input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Weekly Deal — Navy"/></div>
            <div>
              <Label>Canvas Size</Label>
              <Select value={sizeLabel} onChange={e=>setSizeLabel(e.target.value)}>
                {TEMPLATE_SIZES.map(s=><option key={s.label} value={s.label}>{s.label} — {s.w}×{s.h} ({s.desc})</option>)}
              </Select>
            </div>
            <div>
              <Label>Template Image</Label>
              <Button variant="secondary" size="sm" onClick={()=>fileRef.current?.click()}>📂 Choose File</Button>
              <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={e=>handleFile(e.target.files[0])}/>
            </div>
            <Button onClick={save} loading={saving} className="w-full">Save Template</Button>
          </div>
          <div className="flex items-center justify-center">
            {preview
              ? <img src={preview} alt="" className="max-h-48 rounded-xl border border-gray-200 dark:border-gray-600 object-contain shadow"/>
              : <div className="w-full h-40 rounded-xl border-2 border-dashed border-gray-200 dark:border-gray-700 flex items-center justify-center text-gray-400 text-sm">Preview appears here</div>
            }
          </div>
        </div>
      </Card>

      {/* Template gallery */}
      {templates.length > 0 && (
        <Card>
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-sm font-bold text-gray-900 dark:text-white uppercase tracking-wide">Saved Templates ({templates.length})</h3>
            <Select value={filterSz} onChange={e=>setFilterSz(e.target.value)} className="w-auto text-xs">
              <option value="all">All sizes</option>
              {allSizes.map(s=><option key={s.label} value={s.label}>{s.label}</option>)}
            </Select>
          </div>
          {(filterSz==='all' ? TEMPLATE_SIZES : TEMPLATE_SIZES.filter(s=>s.label===filterSz)).map(sz=>{
            const grp = grouped[sz.label];
            if (!grp || grp.length===0) return null;
            return (
              <div key={sz.label} className="mb-5">
                <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wide">{sz.label} — {sz.w}×{sz.h}</p>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                  {grp.map(t=>(
                    <div key={t.id} className="relative group rounded-xl overflow-hidden border border-gray-200 dark:border-gray-700 shadow-sm">
                      <img src={t.data} alt={t.name} className="w-full aspect-video object-cover"/>
                      <div className="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition-all flex items-end">
                        <div className="w-full p-2 translate-y-full group-hover:translate-y-0 transition-transform">
                          <button onClick={()=>remove(t.id)} className="w-full text-xs bg-red-500 hover:bg-red-600 text-white rounded-lg py-1 font-semibold">🗑 Delete</button>
                        </div>
                      </div>
                      <div className="absolute top-1.5 left-1.5 bg-black/60 text-white text-xs rounded px-2 py-0.5 font-medium">{t.name}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </Card>
      )}

      {templates.length === 0 && (
        <div className="text-center py-12 text-gray-400 dark:text-gray-500">
          <p className="text-3xl mb-2">🖼</p>
          <p className="text-sm font-medium">No templates uploaded yet</p>
          <p className="text-xs mt-1">Upload your first brand template above</p>
        </div>
      )}
    </div>
  );
}
