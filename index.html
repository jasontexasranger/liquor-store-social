const ToastCtx = createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type='info') => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 5000);
  }, []);
  const toast = { success:m=>add(m,'success'), error:m=>add(m,'error'), info:m=>add(m,'info') };
  return (
    <ToastCtx.Provider value={toast}>
      {children}
      <div className="fixed bottom-4 right-4 space-y-2 z-50 pointer-events-none">
        {toasts.map(t => (
          <div key={t.id} className={`px-4 py-3 rounded-xl shadow-lg text-white text-sm max-w-sm pointer-events-auto
            ${t.type==='success'?'bg-emerald-600':t.type==='error'?'bg-red-600':'bg-blue-600'}`}>
            {t.type==='success'?'✓ ':t.type==='error'?'✗ ':'ℹ '}{t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

function useBrandProfile(storeId) {
  const [profile, setProfile] = useState({ ...BRAND_DEFAULTS });
  const [logo,    setLogo]    = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const sb = getSB();
    if (!sb) { setLoading(false); return; }
    setLoading(true);
    sb.from('brand_profiles').select('*').eq('store_id', storeId).maybeSingle()
      .then(({ data }) => {
        if (data) {
          const { logo_data, id, updated_at, store_id, ...p } = data;
          setProfile({ ...BRAND_DEFAULTS, ...p });
          setLogo(logo_data || null);
        } else {
          setProfile({ ...BRAND_DEFAULTS });
          setLogo(null);
        }
      })
      .finally(() => setLoading(false));
  }, [storeId]);

  const saveProfile = async (p) => {
    const sb = getSB();
    if (!sb) throw new Error('Supabase not connected');
    const { error } = await sb.from('brand_profiles')
      .upsert({ store_id: storeId, ...p }, { onConflict: 'store_id' });
    if (error) throw error;
    setProfile(p);
  };

  const saveLogo = async (dataUrl) => {
    const sb = getSB();
    if (!sb) throw new Error('Supabase not connected');
    const { error } = await sb.from('brand_profiles')
      .upsert({ store_id: storeId, logo_data: dataUrl }, { onConflict: 'store_id' });
    if (error) throw error;
    setLogo(dataUrl);
  };

  const clearLogo = async () => {
    const sb = getSB();
    if (!sb) throw new Error('Supabase not connected');
    await sb.from('brand_profiles').update({ logo_data: null }).eq('store_id', storeId);
    setLogo(null);
  };

  return { profile, logo, loading, saveProfile, saveLogo, clearLogo };
}

// ─────────────────────────────────────────────
// IMAGE COMPRESSION UTILITY
// ─────────────────────────────────────────────
function compressImage(dataUrl, maxPx=600, quality=0.75) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const c = document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      res(c.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

// ─────────────────────────────────────────────
// BACKGROUND REMOVER
// Flood-fills from all 4 edges to cut out near-white/near-cream backgrounds.
// Returns a transparent-background PNG data URL.
// ─────────────────────────────────────────────
function removeProductBackground(dataUrl, threshold=228) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width  = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const { data, width, height } = imgData;
      const visited = new Uint8Array(width * height);

      const isBg = i =>
        data[i] >= threshold && data[i+1] >= threshold && data[i+2] >= threshold && data[i+3] > 0;

      // Iterative flood fill seeded from all 4 edges (avoids recursion stack overflow)
      const stack = [];
      for (let x = 0; x < width; x++)  { stack.push(x, 0); stack.push(x, height - 1); }
      for (let y = 1; y < height - 1; y++) { stack.push(0, y); stack.push(width - 1, y); }

      while (stack.length) {
        const y = stack.pop(), x = stack.pop();
        if (x < 0 || x >= width || y < 0 || y >= height) continue;
        const idx = y * width + x;
        if (visited[idx]) continue;
        visited[idx] = 1;
        const i = idx * 4;
        if (!isBg(i)) continue;
        data[i + 3] = 0; // punch out pixel
        stack.push(x+1, y, x-1, y, x, y+1, x, y-1);
      }

      // Feather: slightly soften opaque pixels that border a transparent one
      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const idx = y * width + x;
          const i   = idx * 4;
          if (data[i+3] !== 255) continue; // skip transparent & already-soft
          const neighbors = [
            ((y-1)*width+x)*4, ((y+1)*width+x)*4,
            (y*width+x-1)*4,   (y*width+x+1)*4
          ];
          const nearTransp = neighbors.some(ni => data[ni+3] === 0);
          if (nearTransp) data[i+3] = 180; // anti-alias edge pixel
        }
      }

      ctx.putImageData(imgData, 0, 0);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// ─────────────────────────────────────────────
// LOGO COMPOSITOR
// ─────────────────────────────────────────────
function compositeLogoOnImage(imageDataUrl, logoDataUrl, logoSizePct=0.18) {
  return new Promise(resolve => {
    const canvas = document.createElement('canvas');
    const ctx    = canvas.getContext('2d');
    const img    = new Image();
    img.onload = () => {
      canvas.width  = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      if (!logoDataUrl) { resolve(canvas.toDataURL('image/png')); return; }
      const logo = new Image();
      logo.onload = () => {
        const logoW  = Math.round(img.width * logoSizePct);
        const logoH  = Math.round(logoW * (logo.height / logo.width));
        const pad    = Math.round(img.width * 0.03);
        const x      = img.width  - logoW - pad;
        const y      = img.height - logoH - pad;
        const bgPad  = 10;
        const radius = 10;
        // White pill background
        ctx.globalAlpha = 0.88;
        ctx.fillStyle   = '#ffffff';
        ctx.beginPath();
        ctx.roundRect(x-bgPad, y-bgPad, logoW+bgPad*2, logoH+bgPad*2, radius);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.drawImage(logo, x, y, logoW, logoH);
        resolve(canvas.toDataURL('image/png'));
      };
      logo.onerror = () => resolve(canvas.toDataURL('image/png'));
      logo.src = logoDataUrl;
    };
    img.onerror = () => resolve(imageDataUrl);
    img.src = imageDataUrl;
  });
}

// ─────────────────────────────────────────────
// PRODUCT + LOGO + PRICE COMPOSITOR
// Composites real product photo onto AI background, price labels, then logo
// priceOpts: { saveText, priceText, primaryColor, accentColor }
// ─────────────────────────────────────────────
function compositeProductAndLogo(bgDataUrl, productDataUrl, logoDataUrl, priceOpts={}) {
  return new Promise(resolve => {
    const canvas = document.createElement('canvas');
    const ctx    = canvas.getContext('2d');
    const bg     = new Image();
    bg.onload = () => {
      canvas.width  = bg.width;
      canvas.height = bg.height;
      ctx.drawImage(bg, 0, 0);

      const addLogo = () => {
        if (!logoDataUrl) { resolve(canvas.toDataURL('image/png')); return; }
        const logo = new Image();
        logo.onload = () => {
          const logoW = Math.round(bg.width * 0.18);
          const logoH = Math.round(logoW * (logo.height / logo.width));
          const pad   = Math.round(bg.width * 0.03);
          const x     = bg.width  - logoW - pad;
          const y     = bg.height - logoH - pad;
          const bgPad = 10;
          ctx.globalAlpha = 0.88; ctx.fillStyle = '#ffffff';
          ctx.beginPath(); ctx.roundRect(x-bgPad, y-bgPad, logoW+bgPad*2, logoH+bgPad*2, 10); ctx.fill();
          ctx.globalAlpha = 1;
          ctx.drawImage(logo, x, y, logoW, logoH);
          resolve(canvas.toDataURL('image/png'));
        };
        logo.onerror = () => resolve(canvas.toDataURL('image/png'));
        logo.src = logoDataUrl;
      };

      const addPriceThenLogo = () => {
        const { saveText, priceText, primaryColor='#1e3a5f', accentColor='#c4a35a' } = priceOpts;
        if (!saveText && !priceText) { addLogo(); return; }

        const W   = bg.width, H = bg.height;
        const pad = Math.round(W * 0.042);
        const bx  = pad; // left margin

        ctx.textBaseline = 'middle';
        ctx.textAlign    = 'left';

        // ── PRICE BLOCK (main) ──
        // Positioned at vertical center-ish of the left zone, anchored from bottom
        let blockBottom = Math.round(H * 0.80);

        if (priceText) {
          const priceVal  = priceText.startsWith('$') ? priceText : `$${priceText}`;
          const priceFs   = Math.round(H * 0.115); // large price number
          const justFs    = Math.round(H * 0.040); // "JUST" label
          const innerPadV = Math.round(H * 0.018);
          const innerPadH = Math.round(W * 0.030);

          ctx.font = `bold ${justFs}px -apple-system,Arial,sans-serif`;
          const justW = ctx.measureText('JUST').width;

          ctx.font = `900 ${priceFs}px -apple-system,Arial Black,sans-serif`;
          const priceW = ctx.measureText(priceVal).width;

          const blockW = Math.max(justW, priceW) + innerPadH * 2;
          const blockH = justFs * 1.6 + priceFs * 1.3 + innerPadV * 2;
          const by     = blockBottom - blockH;

          // Drop shadow under block
          ctx.save();
          ctx.shadowColor   = 'rgba(0,0,0,0.4)';
          ctx.shadowBlur    = Math.round(W * 0.025);
          ctx.shadowOffsetX = Math.round(W * 0.006);
          ctx.shadowOffsetY = Math.round(H * 0.008);
          ctx.globalAlpha   = 0.93;
          ctx.fillStyle     = primaryColor;
          ctx.beginPath(); ctx.roundRect(bx, by, blockW, blockH, 14); ctx.fill();
          ctx.restore();

          // "JUST" label in accent colour
          ctx.globalAlpha  = 1;
          ctx.font         = `bold ${justFs}px -apple-system,Arial,sans-serif`;
          ctx.fillStyle    = accentColor;
          ctx.fillText('JUST', bx + innerPadH, by + innerPadV + justFs * 0.75);

          // Price in white
          ctx.font      = `900 ${priceFs}px -apple-system,Arial Black,sans-serif`;
          ctx.fillStyle = '#ffffff';
          ctx.fillText(priceVal, bx + innerPadH, by + innerPadV + justFs * 1.6 + priceFs * 0.62);

          blockBottom = by - Math.round(H * 0.018);
        }

        // ── SAVE BADGE (above price block) ──
        if (saveText) {
          const saveVal  = (function(){ var raw = saveText.replace(/^\$/, ''); var n = parseFloat(raw); return 'SAVE $' + (!isNaN(n) ? n.toFixed(2) : raw); }());
          const saveFs   = Math.round(H * 0.052);
          const innerPad = Math.round(W * 0.025);

          ctx.font = `bold ${saveFs}px -apple-system,Arial,sans-serif`;
          const tw  = ctx.measureText(saveVal).width;
          const bw  = tw + innerPad * 2;
          const bh  = Math.round(saveFs * 1.65);
          const by  = blockBottom - bh;

          ctx.save();
          ctx.shadowColor   = 'rgba(0,0,0,0.3)';
          ctx.shadowBlur    = Math.round(W * 0.018);
          ctx.shadowOffsetX = Math.round(W * 0.004);
          ctx.shadowOffsetY = Math.round(H * 0.005);
          ctx.globalAlpha   = 0.95;
          ctx.fillStyle     = accentColor;
          ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 10); ctx.fill();
          ctx.restore();

          ctx.globalAlpha  = 1;
          ctx.font         = `bold ${saveFs}px -apple-system,Arial,sans-serif`;
          ctx.fillStyle    = primaryColor;
          ctx.fillText(saveVal, bx + innerPad, by + bh / 2);
        }

        addLogo();
      };

      if (!productDataUrl) { addPriceThenLogo(); return; }
      const prod = new Image();
      prod.onload = () => {
        // Shift product right so price labels on left don't overlap
        const hasPriceLabels = !!(priceOpts.saveText || priceOpts.priceText);
        const prodH  = Math.round(bg.height * 0.62);
        const prodW  = Math.round(prodH * (prod.width / prod.height));
        const clampW = Math.min(prodW, Math.round(bg.width * (hasPriceLabels ? 0.55 : 0.65)));
        const prodWf = clampW;
        const prodHf = Math.round(prodWf * (prod.height / prod.width));
        // Right-shifted when price labels present, centered otherwise
        const px = hasPriceLabels
          ? Math.round(bg.width * 0.38)
          : Math.round((bg.width - prodWf) / 2);
        const py = bg.height - prodHf - Math.round(bg.height * 0.04);
        ctx.save();
        ctx.shadowColor   = 'rgba(0,0,0,0.35)';
        ctx.shadowBlur    = Math.round(bg.width * 0.04);
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = Math.round(bg.height * 0.02);
        ctx.drawImage(prod, px, py, prodWf, prodHf);
        ctx.restore();
        addPriceThenLogo();
      };
      prod.onerror = addPriceThenLogo;
      prod.src = productDataUrl;
    };
    bg.onerror = () => resolve(bgDataUrl);
    bg.src = bgDataUrl;
  });
}

// ─────────────────────────────────────────────
// RETAIL TEMPLATE RENDERER
// Builds the entire ad with Canvas — no AI involved.
// Locked layout: top bar (logo), left (price), right (product), footer.
// tplId: 'classic' | 'dark' | 'bold'
// brandColors: { primary, accent }
// data: { saveText, priceText, productName, productSize, storeName }
// ─────────────────────────────────────────────
// bgDataUrl: optional uploaded template image (replaces flat-colour background + top bar)
// canvasW/canvasH: from the template metadata (defaults to 1080x1080)
async function renderRetailTemplate(tplId, { productDataUrl, logoDataUrl, brandPrimary='#1e3a5f', brandAccent='#c4a35a', bgDataUrl=null, canvasW=1080, canvasH=1080 }, { saveText='', priceText='', productName='', productSize='', storeName='' }) {
  const W = canvasW, H = canvasH;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const isDark  = tplId === 'dark';
  const txtMain = isDark ? '#FFFFFF' : brandPrimary;

  // ── Layer 1: background (uploaded template or flat colour) ──
  let BAR_H = 0; // when using a custom bg, no bar needed — it's in the design
  if (bgDataUrl) {
    await new Promise(res => {
      const bg = new Image();
      bg.onload = () => { ctx.drawImage(bg, 0, 0, W, H); res(); };
      bg.onerror = res;
      bg.src = bgDataUrl;
    });
  } else {
    // Built-in flat-colour template
    BAR_H = Math.round(H * 0.139); // ~150px at 1080
    const BG = isDark ? '#0D1B2A' : tplId === 'bold' ? '#FFFFFF' : '#F5EDDA';
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = brandPrimary;
    ctx.fillRect(0, 0, W, BAR_H);
    ctx.fillStyle = brandAccent;
    ctx.fillRect(0, BAR_H, W, Math.round(H * 0.006));

    // Logo or store name in top bar
    await new Promise(res => {
      if (!logoDataUrl) {
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.round(BAR_H * 0.35)}px -apple-system,Arial,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText((storeName || '').toUpperCase(), W/2, BAR_H/2);
        return res();
      }
      const logo = new Image();
      logo.onload = () => {
        const lh = BAR_H * 0.68, lw = lh * (logo.width / logo.height);
        ctx.drawImage(logo, (W - lw)/2, (BAR_H - lh)/2, lw, lh);
        res();
      };
      logo.onerror = res;
      logo.src = logoDataUrl;
    });

    // Subtle vertical divider
    ctx.strokeStyle = txtMain + '28';
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(Math.round(W * 0.477), BAR_H + Math.round(H * 0.046));
    ctx.lineTo(Math.round(W * 0.477), H - Math.round(H * 0.051));
    ctx.stroke();
  }

  // ── LEFT ZONE: measure total height first, then vertically center ──
  // All sizes scale proportionally to canvas dimensions
  const LX          = Math.round(W * 0.057);
  const MAX_TXT_W   = Math.round(W * 0.388);
  const CONTENT_TOP = BAR_H + Math.round(H * 0.013);
  const CONTENT_BOT = H - Math.round(H * 0.051);
  const CONTENT_H   = CONTENT_BOT - CONTENT_TOP;
  const FS_SAVE  = Math.round(H * 0.041);
  const IPV_SAVE = Math.round(H * 0.009);
  const IPH_SAVE = Math.round(W * 0.013);
  const FS_NAME  = Math.round(H * 0.031);
  const FS_SIZE  = Math.round(H * 0.025);
  const FS_JUST  = Math.round(H * 0.030);
  const FS_PRICE = Math.round(H * 0.109);

  // Pre-measure product name lines
  let nameLines = [];
  if (productName) {
    ctx.font = `bold ${FS_NAME}px -apple-system,Arial,sans-serif`;
    const words = productName.toUpperCase().split(' ');
    let line = '';
    for (const w of words) {
      const test = line ? `${line} ${w}` : w;
      if (ctx.measureText(test).width > MAX_TXT_W && line) { nameLines.push(line); line = w; }
      else line = test;
    }
    if (line) nameLines.push(line);
  }

  // Calculate total block height
  const saveBlockH  = saveText    ? (FS_SAVE + IPV_SAVE * 2) + 28 : 0;
  const nameBlockH  = nameLines.length > 0 ? nameLines.length * FS_NAME * 1.35 + 10 : 0;
  const sizeBlockH  = productSize ? FS_SIZE * 1.7 + 4 : 0;
  const priceBlockH = priceText   ? 22 + FS_JUST * 1.45 + FS_PRICE * 1.15 : 0;
  const totalH      = saveBlockH + nameBlockH + sizeBlockH + priceBlockH;

  // Center the block vertically
  let ly = CONTENT_TOP + Math.round(Math.max(30, (CONTENT_H - totalH) / 2));

  ctx.textAlign = 'left'; ctx.textBaseline = 'top';

  // SAVE badge
  if (saveText) {
    const label = (function(){ var raw = saveText.replace(/^\$/, ''); var n = parseFloat(raw); return 'SAVE $' + (!isNaN(n) ? n.toFixed(2) : raw); }());
    ctx.font = `bold ${FS_SAVE}px -apple-system,Arial,sans-serif`;
    const tw = ctx.measureText(label).width;
    const bw = tw + IPH_SAVE * 2, bh = FS_SAVE + IPV_SAVE * 2;
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.18)'; ctx.shadowBlur = 12; ctx.shadowOffsetY = 4;
    ctx.fillStyle = brandAccent;
    ctx.beginPath(); ctx.roundRect(LX, ly, bw, bh, 10); ctx.fill();
    ctx.restore();
    ctx.fillStyle = brandPrimary;
    ctx.textBaseline = 'middle';
    ctx.fillText(label, LX + IPH_SAVE, ly + bh / 2);
    ctx.textBaseline = 'top';
    ly += bh + 28;
  }

  // Product name
  if (nameLines.length > 0) {
    ctx.font = `bold ${FS_NAME}px -apple-system,Arial,sans-serif`;
    ctx.fillStyle = txtMain;
    for (const line of nameLines) { ctx.fillText(line, LX, ly); ly += FS_NAME * 1.35; }
    ly += 10;
  }

  // Product size
  if (productSize) {
    ctx.font = `${FS_SIZE}px -apple-system,Arial,sans-serif`;
    ctx.fillStyle = txtMain + (isDark ? 'aa' : '88');
    ctx.fillText(productSize, LX, ly);
    ly += FS_SIZE * 1.7 + 4;
  }

  // JUST + Price
  if (priceText) {
    const priceVal = priceText.startsWith('$') ? priceText : `$${priceText}`;
    ly += 22;
    ctx.font = `bold ${FS_JUST}px -apple-system,Arial,sans-serif`;
    ctx.fillStyle = brandAccent;
    ctx.fillText('JUST', LX, ly);
    ly += FS_JUST * 1.45;
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.12)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;
    ctx.font = `900 ${FS_PRICE}px -apple-system,Arial Black,sans-serif`;
    ctx.fillStyle = txtMain;
    ctx.fillText(priceVal, LX, ly);
    ctx.restore();
  }

  // Footer — pinned to bottom
  ctx.font = `22px -apple-system,Arial,sans-serif`;
  ctx.fillStyle = txtMain + (isDark ? '66' : '55');
  ctx.textBaseline = 'bottom';
  ctx.fillText('Plus tax & deposit. While supplies last.', LX, H - 24);

  // ── RIGHT ZONE: product photo — vertically centered ──
  if (productDataUrl) {
    await new Promise(res => {
      const prod = new Image();
      prod.onload = () => {
        const PX = Math.round(W * 0.49), PY = BAR_H + Math.round(H * 0.018), PW = Math.round(W * 0.454), PH = H - BAR_H - Math.round(H * 0.055);
        const scale = Math.min(PW / prod.width, PH / prod.height);
        const dw = prod.width * scale, dh = prod.height * scale;
        const dx = PX + (PW - dw) / 2;
        const dy = PY + (PH - dh) / 2; // vertically centered
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.20)';
        ctx.shadowBlur = 32; ctx.shadowOffsetX = 5; ctx.shadowOffsetY = 18;
        ctx.drawImage(prod, dx, dy, dw, dh);
        ctx.restore();
        res();
      };
      prod.onerror = res;
      prod.src = productDataUrl;
    });
  }

  return canvas.toDataURL('image/png');
}

function Lightbox({ src, onClose }) {
  useEffect(()=>{
    const esc = e => { if(e.key==='Escape') onClose(); };

  );
}

async function gFetch(path, opts={}) {
  const res  = await fetch(`${GRAPH_API}${path}`, opts);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || 'Graph API error');
  return data;
}
async function gGet(path, params, token) {
  const qs = new URLSearchParams({ ...params, access_token: token }).toString();
  return gFetch(`${path}?${qs}`);
}
async function gPost(path, body, token) {
  return gFetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, access_token: token }),
  });
}
async function gPostForm(path, form) {
  return gFetch(path, { method: 'POST', body: form });
}

async function callAI(prompt, apiKey, maxTokens=600) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text.trim();
}

async function openAIDescribeImage(base64, mime, apiKey) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      max_tokens: 200,
      messages: [{
        role: 'user',
        content: [
          { type: 'image_url', image_url: { url: `data:${mime};base64,${base64}` } },
          { type: 'text', text: 'Describe this product image in detail for a DALL-E image generation prompt. Focus on the product, packaging, label, colours, and visual characteristics. Be specific and vivid. Under 80 words, no intro text.' }
        ]
      }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.choices[0].message.content.trim();
}

async function openAIGenerateImage(prompt, dalleSize, apiKey) {
  const res = await fetch('https://api.openai.com/v1/images/generations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({ model: 'gpt-image-1', prompt, n: 1, size: dalleSize, quality: 'medium' })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  // gpt-image-1 returns base64, convert to data URL
  const item = data.data[0];
  const url = item.url || (item.b64_json ? `data:image/png;base64,${item.b64_json}` : null);
  if (!url) throw new Error('No image returned from API');
  return { url, revised: item.revised_prompt || '' };
}

const ST_CATEGORIES = ['Generic','Regular Price','Sale','Multi-Buy','Limited Time','New Product','Staff Pick','Clearance','Seasonal'];

// Render a PDF's first page to a data URL via PDF.js
async function pdfPageToDataUrl(pdfDataUrl, maxPx=2000) {
  if (!window.pdfjsLib) throw new Error('PDF.js not loaded');
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
  const raw = atob(pdfDataUrl.split(',')[1]);
  const bytes = new Uint8Array(raw.length);
  for (let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
  const pdf = await window.pdfjsLib.getDocument({ data: bytes }).promise;
  const page = await pdf.getPage(1);
  const vp0 = page.getViewport({ scale: 1 });
  const scale = Math.min(maxPx / vp0.width, maxPx / vp0.height, 4);
  const vp = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(vp.width);
  canvas.height = Math.round(vp.height);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  return canvas.toDataURL('image/png');
}

// Binary-search text fitting — returns { fontSize, lines, overflow }
// Operates on an off-screen canvas for measurement; scale-independent.
function fitText(text, boxW, boxH, settings={}) {
  const {
    maxFontSize=48, minFontSize=8, bold=false,
    lineSpacing=1.2, wrap=true, maxLines=null, align='left',
  } = settings;

  const canvas = document.createElement('canvas');
  canvas.width=2000; canvas.height=2000;
  const ctx = canvas.getContext('2d');

  const measure = (fontSize) => {
    ctx.font = `${bold?'bold ':''} ${fontSize}px Arial,sans-serif`;
    if (!wrap) {
      const w = ctx.measureText(text).width;
      return { lines:[text], fits: w<=boxW && fontSize<=boxH };
    }
    const words = text.split(/\s+/);
    const lines = [];
    let cur='';
    let maxLineW = 0;
    for (const w of words) {
      const test = cur ? cur+' '+w : w;
      if (ctx.measureText(test).width > boxW && cur) {
        maxLineW = Math.max(maxLineW, ctx.measureText(cur).width);
        lines.push(cur); cur=w;
      } else cur=test;
    }
    if (cur) { maxLineW = Math.max(maxLineW, ctx.measureText(cur).width); lines.push(cur); }
    const limit = maxLines || 99;
    const totalH = lines.length * fontSize * lineSpacing;
    // Also check that every line (including single long words) fits within boxW
    return { lines, fits: lines.length<=limit && totalH<=boxH && maxLineW<=boxW };
  };

  let lo=minFontSize, hi=maxFontSize, best=null;
  while (lo<=hi) {
    const mid=Math.floor((lo+hi)/2);
    const r=measure(mid);
    if (r.fits) { best={ fontSize:mid, lines:r.lines, overflow:false }; lo=mid+1; }
    else hi=mid-1;
  }
  if (!best) {
    const r=measure(minFontSize);
    best={ fontSize:minFontSize, lines:r.lines, overflow:true };
  }
  return best;
}

// Draw a single text field onto a canvas context.
// box: { x, y, w, h } in canvas pixels
function drawTextField(ctx, text, box, settings={}, fit=null) {
  const { align='left', valign='top', color='#000000', bold=false,
          lineSpacing=1.2, minFontSize=8, maxFontSize=48, wrap=true, maxLines=null,
          suffix='' } = settings;
  const r = fit || fitText(text, box.w, box.h, { align, bold, lineSpacing, wrap, maxLines, maxFontSize, minFontSize });
  const { fontSize, lines } = r;

  ctx.save();
  // Hard-clip to box bounds — text never bleeds outside its field
  ctx.beginPath();
  ctx.rect(box.x, box.y, box.w, box.h);
  ctx.clip();

  ctx.fillStyle = color;
  ctx.textBaseline = 'top';

  const lineH = fontSize * lineSpacing;
  const totalH = lines.length * lineH;

  let startY = box.y;
  if (valign==='middle') startY = box.y + (box.h - totalH) / 2;
  else if (valign==='bottom') startY = box.y + box.h - totalH;

  for (let i=0; i<lines.length; i++) {
    ctx.font = `${bold?'bold ':''} ${fontSize}px Arial,sans-serif`;
    let x = box.x;
    if (align==='center') {
      ctx.textAlign='center'; x=box.x+box.w/2;
    } else if (align==='right') {
      ctx.textAlign='right'; x=box.x+box.w;
    } else {
      ctx.textAlign='left';
    }
    ctx.fillText(lines[i], x, startY + i*lineH);
  }

  // Draw suffix at 20% of font size after the last line
  if (suffix && lines.length > 0) {
    const suffixSize = Math.max(6, Math.round(fontSize * 0.2));
    const lastLine = lines[lines.length - 1];
    const lastLineY = startY + (lines.length - 1) * lineH;

    // Measure last line width at full font size
    ctx.font = `${bold?'bold ':''} ${fontSize}px Arial,sans-serif`;
    const lastLineW = ctx.measureText(lastLine).width;

    // Find the right edge of the last line based on alignment
    let suffixX;
    if (align === 'center') suffixX = box.x + box.w / 2 + lastLineW / 2;
    else if (align === 'right') suffixX = box.x + box.w;
    else suffixX = box.x + lastLineW;

    ctx.font = `${bold?'bold ':''} ${suffixSize}px Arial,sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText(suffix, suffixX, lastLineY);
  }

  ctx.restore();
  return r;
}

function useSTTemplates(storeId=null, isAdmin=false) {
  const [templates, setTemplates] = useState([]);
  const [loading,   setLoading]   = useState(true);

  const load = useCallback(async () => {
    const sb=getSB(); if(!sb) return;
    setLoading(true);
    try {
      const { data } = await sb.from('shelf_talker_templates')
        .select('*, shelf_talker_template_brands(store_id)')
        .order('created_at', { ascending: false });
      const all = data || [];
      if (isAdmin) {
        setTemplates(all);
      } else {
        // Show active global templates + templates assigned to this store
        setTemplates(all.filter(t =>
          t.is_active && (
            t.scope === 'global' ||
            (t.shelf_talker_template_brands||[]).some(b => b.store_id === storeId)
          )
        ));
      }
    } finally { setLoading(false); }
  }, [storeId, isAdmin]);

  useEffect(() => { load(); }, [load]);
  return { templates, loading, reload: load };
}

function useSTFields(templateId) {
  const [fields,  setFields]  = useState([]);
  const [loading, setLoading] = useState(false);

  const load = useCallback(async () => {
    if (!templateId) { setFields([]); return; }
    const sb=getSB(); if(!sb) return;
    setLoading(true);
    const { data } = await sb.from('shelf_talker_fields')
      .select('*').eq('template_id', templateId)
      .order('field_order');
    setFields(data||[]);
    setLoading(false);
  }, [templateId]);

  useEffect(() => { load(); }, [load]);

  const save = async (fieldList) => {
    const sb=getSB(); if(!sb) throw new Error('Not connected');
    await sb.from('shelf_talker_fields').delete().eq('template_id', templateId);
    if (fieldList.length) {
      const { error } = await sb.from('shelf_talker_fields').insert(
        fieldList.map((f,i) => {
          // eslint-disable-next-line no-unused-vars
          const { id: _dropId, created_at: _dropCa, ...rest } = f;
          return { id: crypto.randomUUID(), ...rest, template_id: templateId, field_order: i };
        })
      );
      if (error) throw error;
    }
    await load();
  };

  return { fields, loading, save, reload: load };
}

function useSavedTags(userId, isAdmin) {
  const [saves,   setSaves]   = useState([]);
  const [loading, setLoading] = useState(false);

  const load = useCallback(async () => {
    const sb = getSB(); if (!sb) return;
    if (!isAdmin && !userId) return;
    setLoading(true);
    try {
      var query = sb.from('saved_shelf_talkers')
        .select('*, shelf_talker_templates(name, file_data, category)')
        .order('created_at', { ascending: false });
      if (!isAdmin) query = query.eq('user_id', userId);
      const { data } = await query;
      setSaves(data || []);
    } finally { setLoading(false); }
  }, [userId, isAdmin]);

  useEffect(function() { load(); }, [load]);

  const saveTag = async (name, templateId, values, storeId) => {
    const sb = getSB(); if (!sb) return;
    var userEmail = null;
    try { var r = await sb.auth.getUser(); userEmail = r.data.user ? r.data.user.email : null; } catch(e) {}
    const { error } = await sb.from('saved_shelf_talkers')
      .insert({ user_id: userId, template_id: templateId, name, values, store_id: storeId || null, user_email: userEmail });
    if (error) throw error;
    await load();
  };

  const deleteTag = async (id) => {
    const sb = getSB(); if (!sb) return;
    await sb.from('saved_shelf_talkers').delete().eq('id', id);
    await load();
  };

  return { saves, loading, saveTag, deleteTag, reload: load };
}

function AIWriter({ storeName, apiKey, mode='caption', onResult }) {
  const toast = useToast();
  const [topic,   setTopic]   = useState('');
  const [tone,    setTone]    = useState('Friendly');
  const [extra,   setExtra]   = useState('');
  const [loading, setLoading] = useState(false);

  const generate = async () => {
    if (!apiKey)       { toast.error('Add your Anthropic API key in Settings first'); return; }
    if (!topic.trim()) { toast.error('Enter a topic or promotion description'); return; }
    setLoading(true);
    try {
      let prompt;
      if (mode==='caption') {
        prompt = `Write a ${tone.toLowerCase()} Facebook post caption for "${storeName}", an independent retail liquor store in BC, Canada.\n\nPost topic/promotion: ${topic}${extra?`\n\nAdditional instructions: ${extra}`:''}\n\nRules:\n- Under 280 characters\n- Engaging and authentic\n- No hashtags unless requested\n- Output ONLY the caption text with no quotes, labels, or explanation`;

function InlineImageGenerator({ storeId, settings, onGenerated }) {
  const toast = useToast();
  const [mode,        setMode]       = useState('template'); // 'template' | 'lifestyle'
  const [template,    setTemplate]   = useState('classic');
  const [brief,       setBrief]      = useState('');
  const [size,        setSize]       = useState('1024x1024');
  const [prodFile,    setProdFile]   = useState(null);
  const [prodPrev,    setProdPrev]   = useState(null);
  const [saveText,    setSaveText]   = useState('');
  const [priceText,   setPriceText]  = useState('');
  const [productName, setProductName]= useState('');
  const [productSize, setProductSize]= useState('');
  const [genStep,     setGenStep]    = useState('idle');
  const [brand,       setBrand]      = useState({ ...BRAND_DEFAULTS });
  const [logo,        setLogo]       = useState(null);
  const [showLib,     setShowLib]    = useState(false);
  const [lightbox,    setLightbox]   = useState(null);
  const [selectedTpl, setSelectedTpl]= useState(null); // uploaded template object
  const { images:libImages, remove:removeFromLib } = useBrandImageLibrary(storeId);
  const { templates: uploadedTpls }  = useBrandTemplates(storeId);
  const { save:saveToQuickLib } = useProductLibrary(storeId);
  const prodRef = useRef();

  useEffect(()=>{
    const sb=getSB(); if(!sb) return;
    sb.from('brand_profiles').select('*').eq('store_id',storeId).maybeSingle()
      .then(({data})=>{
        if(data){ const {logo_data,...p}=data; setBrand({...BRAND_DEFAULTS,...p}); setLogo(logo_data||null); }
        else { setBrand({...BRAND_DEFAULTS}); setLogo(null); }
      });
  },[storeId]);

  const handleProd = file => {
    if (!file) return;
    setProdFile(file);
    const r=new FileReader();
    r.onload=async()=>{ setProdPrev(r.result); try { await saveToLib(file.name, r.result); } catch{} };
    r.readAsDataURL(file);
  };

  const selectFromLib = img => {
    setProdPrev(img.data);
    setProductName(img.product_name || '');
    setProductSize(img.size || '');
    fetch(img.data).then(r=>r.blob()).then(blob=>setProdFile(new File([blob],img.product_name||'product',{type:'image/jpeg'}))).catch(()=>{});
    setShowLib(false);
  };

  // ── TEMPLATE MODE: pure Canvas, no AI ──
  const generateTemplate = async () => {
    if (!prodPrev) { toast.error('Upload a product photo first'); return; }
    const store = STORES.find(s=>s.id===storeId);
    try {
      setGenStep('removing');
      let cleanProd = prodPrev;
      try { cleanProd = await removeProductBackground(prodPrev); } catch(e) {}

      setGenStep('compositing');
      // Use uploaded template if selected, otherwise fall back to built-in
      const bgDataUrl  = selectedTpl ? selectedTpl.data  : null;
      const canvasW    = selectedTpl ? selectedTpl.canvas_w : 1080;
      const canvasH    = selectedTpl ? selectedTpl.canvas_h : 1080;
      const sizeLabel  = selectedTpl ? selectedTpl.size_label : '1:1 Square';

      const finalUrl = await renderRetailTemplate(
        template,
        { productDataUrl: cleanProd, logoDataUrl: logo, brandPrimary: brand.primary_color||'#1e3a5f', brandAccent: brand.secondary_color||'#c4a35a', bgDataUrl, canvasW, canvasH },
        { saveText: saveText.trim(), priceText: priceText.trim(), productName: productName.trim(), productSize: productSize.trim(), storeName: store?.name||'' }
      );
      onGenerated(finalUrl);
      toast.success('Ad created!');
      setGenStep('idle');
      const sb=getSB();
      if(sb) sb.from('generation_history').insert({ store_id:storeId, store_name:store?.name, image_url:finalUrl, brief:`Template: ${selectedTpl?.name||template}`, size_label: sizeLabel });
    } catch(e) { toast.error(`Failed: ${e.message}`); setGenStep('idle'); }
  };

  // ── LIFESTYLE MODE: AI background + composite ──
  const generateLifestyle = async () => {
    const apiKey = settings.openaiKey;
    if (!apiKey) { toast.error('Add your OpenAI API key in Settings'); return; }
    const store    = STORES.find(s=>s.id===storeId);
    const storeName= store?.name || 'the store';
    const dalleSize= IMAGE_SIZES.find(s=>s.value===size)?.dalleSize || '1024x1024';
    setGenStep('building');
    try {
      const parts = [`Clean atmospheric background for a retail liquor store campaign in BC, Canada.`];

      if (brand.mood)           parts.push(`Mood: ${brand.mood}.`);
      if (brand.style_keywords) parts.push(`Keywords: ${brand.style_keywords}.`);
      if (brand.avoid_visually) parts.push(`Avoid: ${brand.avoid_visually}.`);
      if (brief.trim())         parts.push(brief.trim());
      parts.push('NO text, NO bottles, NO products, NO logos, NO prices. Pure background only.');
      const prompt = parts.join(' ');

      setGenStep('generating');

    } catch(e) { toast.error(`✗ ${e.message}`); setGenStep('idle'); }
  };

      <p className="text-xs font-bold text-indigo-700 dark:text-indigo-300 uppercase tracking-widest">🎨 Image Creator</p>

        <button onClick={()=>setMode('template')} className={`flex-1 py-2 text-xs font-bold transition-colors ${mode==='template'?'bg-indigo-600 text-white':'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-gray-700'}`}>

                    className={`rounded-xl border-2 overflow-hidden text-left transition-all ${selectedTpl?.id===t.id?'border-indigo-500 ring-2 ring-indigo-200 dark:ring-indigo-900':'border-gray-200 dark:border-gray-700'}`}>

// MODULE 1 — POST COMPOSER
// ─────────────────────────────────────────────
function PostComposer({ settings, pendingImage, onClearPending }) {
  const toast = useToast();
  const [selected,   setSelected]   = useState([STORES[0].id]);
  const [caption,    setCaption]    = useState('');
  const [imgFile,    setImgFile]    = useState(null);
  const [imgPrev,    setImgPrev]    = useState(null);
  const [genImgUrl,  setGenImgUrl]  = useState(null);
  const [schedule,   setSchedule]   = useState('');
  const [loading,    setLoading]    = useState(false);
  const [showAI,     setShowAI]     = useState(false);
  const [showImgGen, setShowImgGen] = useState(false);
  const [lightbox,   setLightbox]   = useState(null);
  const [results,    setResults]    = useState([]);

  useEffect(()=>{
    if (pendingImage) { setImgFile(null); setImgPrev(pendingImage); setGenImgUrl(pendingImage); setShowImgGen(false); }
  },[pendingImage]);

  const toggleStore = id => setSelected(p => p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  const handleFile = file => {
    if (!file) return;
    setImgFile(file); setGenImgUrl(null);
    const r=new FileReader(); r.onload=()=>setImgPrev(r.result); r.readAsDataURL(file);
    if (onClearPending) onClearPending();
  };

  const clearImage = () => {
    setImgFile(null); setImgPrev(null); setGenImgUrl(null);
    if (onClearPending) onClearPending();
  };

  const handleGenerated = (url) => {
    setGenImgUrl(url); setImgPrev(url); setImgFile(null);
    setShowImgGen(false);
    if (onClearPending) onClearPending();
  };

  const post = async () => {
    if (!caption.trim())     { toast.error('Write a caption first'); return; }
    if (selected.length===0) { toast.error('Select at least one store'); return; }
    const missing = selected.filter(id=>!settings.tokens[id]);
    if (missing.length) { toast.error(`Missing token(s) for: ${missing.map(id=>STORES.find(s=>s.id===id)?.name).join(', ')}`); return; }
    if (schedule) {
      const ts = new Date(schedule).getTime();
      if (ts < Date.now()+10*60*1000) { toast.error('Scheduled time must be at least 10 minutes in the future'); return; }
    }

    setLoading(true); setResults([]);
    const res = [];
    const activeImgUrl = genImgUrl || (pendingImage&&!imgFile?pendingImage:null);

    for (const storeId of selected) {
      const store   = STORES.find(s=>s.id===storeId);
      const token   = settings.tokens[storeId];
      const schedTs = schedule ? Math.floor(new Date(schedule).getTime()/1000) : null;
      try {
        let postId;
        if (imgFile) {
          const form = new FormData();
          form.append('caption', caption+POST_SUFFIX);
          form.append('source', imgFile);
          form.append('access_token', token);
          if (schedTs) { form.append('published','false'); form.append('scheduled_publish_time',String(schedTs)); }
          const r = await gPostForm(`/${store.pageId}/photos`, form);
          postId = r.post_id||r.id;
        } else if (activeImgUrl) {
          const body = { url: activeImgUrl, caption: caption+POST_SUFFIX };
          if (schedTs) { body.published=false; body.scheduled_publish_time=schedTs; }
          const r = await gPost(`/${store.pageId}/photos`, body, token);
          postId = r.post_id||r.id;
        } else {
          const body = { message: caption+POST_SUFFIX };
          if (schedTs) { body.published=false; body.scheduled_publish_time=schedTs; }
          const r = await gPost(`/${store.pageId}/feed`, body, token);
          postId = r.id;
        }
        res.push({ store:store.name, success:true, postId, scheduled:!!schedTs });
      } catch(e) {
        res.push({ store:store.name, success:false, error:e.message });
      }
    }

    setResults(res);
    res.forEach(r => { if(r.success) toast.success(`${r.store}: ${r.scheduled?'Scheduled!':'Published!'}`); else toast.error(`${r.store}: ${r.error}`); });
    if (res.some(r=>r.success)) { setCaption(''); setImgFile(null); setImgPrev(null); setGenImgUrl(null); setSchedule(''); if(onClearPending) onClearPending(); }
    setLoading(false);
  };

  const activeStoreId = selected.length===1 ? selected[0] : STORES[0].id;
  const activeStore   = STORES.find(s=>s.id===activeStoreId)?.name || 'our store';

  return (
    <>
    {lightbox && <Lightbox src={lightbox} onClose={()=>setLightbox(null)}/>}
    <Card>
      <h2 className="text-base font-bold text-gray-900 dark:text-white mb-4">📝 Compose Post</h2>
      <div className="mb-4">
        <Label>Post to</Label>
        <div className="grid grid-cols-2 gap-2">
          {STORES.map(s => (
            <label key={s.id} className={`flex items-center gap-2 p-2.5 rounded-xl border cursor-pointer text-sm transition-all
              ${selected.includes(s.id)?'border-indigo-500 bg-indigo-50 dark:bg-indigo-950/50 text-indigo-800 dark:text-indigo-200 shadow-sm':'border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:border-indigo-300'}`}>
              <input type="checkbox" className="rounded" checked={selected.includes(s.id)} onChange={()=>toggleStore(s.id)}/>
              <span className="leading-tight">{s.name}</span>
            </label>
          ))}
        </div>
      </div>
      <div className="mb-3">
        <div className="flex items-center justify-between mb-1">
          <Label className="mb-0">Caption</Label>
          <button onClick={()=>setShowAI(v=>!v)} className="text-xs font-semibold text-violet-600 dark:text-violet-400 hover:underline">{showAI?'Hide AI Writer ↑':'✨ AI Writer'}</button>
        </div>
        <Textarea value={caption} onChange={e=>setCaption(e.target.value)} rows={4} placeholder="What's happening at the store?"/>
        <p className="text-xs text-gray-400 mt-1 text-right">{caption.length} chars</p>
        <p className="text-xs text-gray-400 dark:text-gray-500 mt-1 italic">↳ <span className="text-gray-500 dark:text-gray-400">Auto-appended:</span> Prices exclude tax &amp; deposit - while supplies last</p>
      </div>
      {showAI && <div className="mb-4"><AIWriter storeName={activeStore} apiKey={settings.anthropicKey} mode="caption" onResult={t=>setCaption(t)}/></div>}

      {/* Image section */}
      <div className="mb-4">
        <div className="flex items-center justify-between mb-2">
          <Label className="mb-0">Image</Label>
          <div className="flex gap-2">
            <button onClick={()=>setShowImgGen(v=>!v)} className={`text-xs font-semibold hover:underline ${showImgGen?'text-indigo-600 dark:text-indigo-400':'text-indigo-500 dark:text-indigo-400'}`}>{showImgGen?'Hide Generator ↑':'🎨 Generate with AI'}</button>
          </div>
        </div>

        {/* Generated image preview */}
        {(genImgUrl||(pendingImage&&!imgFile)) && (
          <div className="mb-3">
            <div className="relative inline-block group">
              <img src={genImgUrl||pendingImage} alt="" onClick={()=>setLightbox(genImgUrl||pendingImage)}
                className="h-36 rounded-xl object-cover border border-indigo-300 dark:border-indigo-600 shadow-sm cursor-zoom-in hover:opacity-90 transition-opacity"/>
              <button onClick={clearImage} className="absolute -top-1.5 -right-1.5 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center hover:bg-red-600">✕</button>
              <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                <span className="bg-black/50 text-white text-xs px-2 py-1 rounded-lg">Click to enlarge</span>
              </div>
            </div>
            <p className="text-xs text-amber-600 dark:text-amber-400 mt-1">⚠ Post soon — image may expire.</p>
          </div>
        )}

        {/* File upload (shown when no generated image) */}
        {!genImgUrl && !(pendingImage&&!imgFile) && (
          <ImagePicker file={imgFile} preview={imgPrev} onFile={handleFile} onClear={clearImage} label="Upload Image"/>
        )}

        {/* Inline generator */}
        {showImgGen && (
          <div className="mt-3">
            <InlineImageGenerator storeId={activeStoreId} settings={settings} onGenerated={handleGenerated}/>
          </div>
        )}
      </div>

      <div className="mb-5">
        <Label>Schedule (leave blank to post immediately)</Label>
        <Input type="datetime-local" value={schedule} onChange={e=>setSchedule(e.target.value)}/>
      </div>
      <Button onClick={post} loading={loading} className="w-full" size="lg">
        {schedule?'📅 Schedule Post':'🚀 Publish Now'}
      </Button>
      {results.length>0 && (
        <div className="mt-4 space-y-2">
          <Divider label="Results"/>
          {results.map((r,i) => (
            <div key={i} className={`flex items-center justify-between text-sm p-3 rounded-xl ${r.success?'bg-emerald-50 dark:bg-emerald-950/30 text-emerald-800 dark:text-emerald-300':'bg-red-50 dark:bg-red-950/30 text-red-700 dark:text-red-400'}`}>
              <span>{r.success?'✓':'✗'} {r.store} — {r.success?(r.scheduled?'Scheduled':'Published'):r.error}</span>
              {r.success&&r.postId && <a href={fbPostUrl(r.postId)} target="_blank" rel="noopener noreferrer" className="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline ml-3 whitespace-nowrap">View post →</a>}
            </div>
          ))}
        </div>
      )}
    </Card>
    </>
  );
}

function PostHistory({ settings }) {
  const toast   = useToast();
  const [storeId, setStoreId] = useState(STORES[0].id);
  const [posts,   setPosts]   = useState([]);
  const [loading, setLoading] = useState(false);
  const [loaded,  setLoaded]  = useState(false);
  const store = STORES.find(s=>s.id===storeId);

  useEffect(()=>{setLoaded(false);setPosts([]);},[storeId]);

  const load = async () => {
    const token = settings.tokens[storeId];
    if (!token) { toast.error('No page token for this store — add it in Settings'); return; }
    setLoading(true);
    try {
      const data = await gGet(`/${store.pageId}/posts`,{
        fields:'message,story,created_time,full_picture,permalink_url,likes.summary(true),comments.summary(true),shares',limit:12
      },token);
      setPosts(data.data||[]);
      setLoaded(true);
    } catch(e) { toast.error(`Failed to load posts: ${e.message}`); }
    finally    { setLoading(false); }
  };

  return (
    <Card>
      <div className="flex items-center gap-2 mb-4 flex-wrap">
        <h2 className="text-base font-bold text-gray-900 dark:text-white flex-1">📋 Post History</h2>
        <Select value={storeId} onChange={e=>setStoreId(e.target.value)} className="w-auto text-xs">{STORES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</Select>
        <Button variant="secondary" size="sm" onClick={load} loading={loading}>{loaded?'Refresh':'Load Posts'}</Button>
      </div>
      {!loaded&&!loading && <div className="text-center py-10 text-gray-400 dark:text-gray-500 text-sm">Select a store and click Load Posts</div>}
      {loaded&&posts.length===0 && <div className="text-center py-10 text-gray-400 dark:text-gray-500 text-sm">No posts found.</div>}
      <div className="space-y-3 max-h-[480px] overflow-y-auto pr-1">
        {posts.map(p => {
          const text = p.message||p.story||'(no text)';
          return (
            <div key={p.id} className="flex gap-3 p-3 rounded-xl border border-gray-100 dark:border-gray-700 hover:border-indigo-200 dark:hover:border-indigo-700 transition-colors">
              {p.full_picture && <img src={p.full_picture} alt="" className="w-16 h-16 rounded-lg object-cover flex-shrink-0 border border-gray-200 dark:border-gray-600"/>}
              <div className="flex-1 min-w-0">
                <p className="text-sm text-gray-800 dark:text-gray-200 line-clamp-3 leading-snug">{text}</p>
                <p className="text-xs text-gray-400 mt-1">{fmtDate(p.created_time)}</p>
                <div className="flex items-center gap-3 mt-1.5 flex-wrap">
                  <span className="text-xs text-gray-500 dark:text-gray-400">👍 {p.likes?.summary?.total_count??0}</span>
                  <span className="text-xs text-gray-500 dark:text-gray-400">💬 {p.comments?.summary?.total_count??0}</span>
                  {(p.shares?.count??0)>0 && <span className="text-xs text-gray-500 dark:text-gray-400">🔄 {p.shares.count}</span>}
                  <a href={p.permalink_url||fbPostUrl(p.id)} target="_blank" rel="noopener noreferrer" className="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline ml-auto">Open →</a>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

function CampaignBuilder({ settings }) {
  const toast = useToast();
  const [storeId,     setStoreId]     = useState(STORES[0].id);
  const [objective,   setObjective]   = useState('OUTCOME_AWARENESS');
  const [campName,    setCampName]    = useState('');
  const [dailyBudget, setDailyBudget] = useState('20');
  const [lat,         setLat]         = useState(String(STORES[0].lat));
  const [lng,         setLng]         = useState(String(STORES[0].lng));
  const [radius,      setRadius]      = useState('25');
  const [ageMin,      setAgeMin]      = useState('21');
  const [ageMax,      setAgeMax]      = useState('65');
  const [placements,  setPlacements]  = useState(['facebook_feed']);
  const [headline,    setHeadline]    = useState('');
  const [bodyText,    setBodyText]    = useState('');
  const [ctaType,     setCtaType]     = useState('LEARN_MORE');
  const [destUrl,     setDestUrl]     = useState('');
  const [adImg,       setAdImg]       = useState(null);
  const [adImgPrev,   setAdImgPrev]   = useState(null);
  const [showAI,      setShowAI]      = useState(false);
  const [steps,       setSteps]       = useState([]);
  const [running,     setRunning]     = useState(false);

  const store = STORES.find(s=>s.id===storeId);

  useEffect(()=>{ const s=STORES.find(x=>x.id===storeId); if(s){setLat(String(s.lat));setLng(String(s.lng));} },[storeId]);

  const togglePlacement = p => setPlacements(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p]);

  const handleAI = (text) => {
    const lines = text.split('\n');
    for (const ln of lines) {
      if (ln.startsWith('HEADLINE:')) setHeadline(ln.replace('HEADLINE:','').trim().slice(0,25));
      if (ln.startsWith('BODY:'))     setBodyText(ln.replace('BODY:','').trim().slice(0,125));
    }
  };

  const addStep    = (label,status='pending',detail='') => setSteps(p=>[...p,{label,status,detail}]);
  const finishStep = (status,detail='') => setSteps(p=>{ const a=[...p]; a[a.length-1]={...a[a.length-1],status,detail}; return a; });

  const launch = async () => {
    const token = settings.metaToken;
    if (!token)            { toast.error('Meta User Access Token not set in Settings'); return; }
    if (!campName.trim())  { toast.error('Enter a campaign name'); return; }
    if (!headline.trim()||!bodyText.trim()) { toast.error('Enter headline and body copy'); return; }
    if (placements.length===0) { toast.error('Select at least one placement'); return; }

    const objMeta = AD_OBJECTIVES.find(o=>o.value===objective);
    setRunning(true); setSteps([]);

    try {
      addStep('Creating campaign…','running');
      const camp = await gPost(`/${AD_ACCOUNT_ID}/campaigns`,{ name:`[${store.name}] ${campName}`, objective, status:'PAUSED', special_ad_categories:[] },token);
      finishStep('done',`ID: ${camp.id}`);

      addStep('Creating ad set…','running');
      const targeting = { geo_locations:{ custom_locations:[{ latitude:parseFloat(lat)||store.lat, longitude:parseFloat(lng)||store.lng, radius:parseInt(radius)||25, distance_unit:'kilometer' }] }, age_min:parseInt(ageMin)||21, age_max:parseInt(ageMax)||65, facebook_positions:placements.filter(p=>p.startsWith('facebook')).map(p=>p.replace('facebook_','')).filter(Boolean), instagram_positions:placements.filter(p=>p.startsWith('instagram')).map(p=>p.replace('instagram_','')).filter(Boolean) };
      const adSet = await gPost(`/${AD_ACCOUNT_ID}/adsets`,{ name:`${campName} — Ad Set`, campaign_id:camp.id, daily_budget:Math.round(parseFloat(dailyBudget)*100), billing_event:'IMPRESSIONS', optimization_goal:objMeta.optGoal, targeting, status:'PAUSED', page_id:store.pageId },token);
      finishStep('done',`ID: ${adSet.id}`);

      let imageHash=null;
      if (adImg) {
        addStep('Uploading image…','running');
        const b64=await fileToBase64(adImg);
        const resp=await gPost(`/${AD_ACCOUNT_ID}/adimages`,{[adImg.name]:b64},token);
        imageHash=resp.images?Object.values(resp.images)[0]?.hash:null;
        finishStep('done',imageHash?`Hash: ${imageHash}`:'Uploaded');
      }

      addStep('Creating ad creative…','running');
      const linkUrl=destUrl.trim()||`https://www.facebook.com/${store.pageId}`;
      const creative = await gPost(`/${AD_ACCOUNT_ID}/adcreatives`,{ name:`${campName} — Creative`, object_story_spec:{ page_id:store.pageId, link_data:{ message:bodyText, name:headline, link:linkUrl, call_to_action:{type:ctaType,value:{link:linkUrl}}, ...(imageHash?{image_hash:imageHash}:{}) } } },token);
      finishStep('done',`ID: ${creative.id}`);

      addStep('Creating ad…','running');
      const ad=await gPost(`/${AD_ACCOUNT_ID}/ads`,{ name:`${campName} — Ad`, adset_id:adSet.id, creative:{creative_id:creative.id}, status:'PAUSED' },token);
      finishStep('done',`ID: ${ad.id}`);

      addStep('🎉 Campaign created — all assets are PAUSED','done','Activate in Meta Ads Manager when ready.');
      toast.success('Campaign created!');
    } catch(e) { finishStep('error',e.message); toast.error(`Failed: ${e.message}`); }
    finally    { setRunning(false); }
  };

  return (
    <div className="space-y-4">
      <Card>
        <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4 uppercase tracking-wide">Campaign</h3>
        <div className="grid grid-cols-2 gap-4">
          <div><Label>Store</Label><Select value={storeId} onChange={e=>setStoreId(e.target.value)}>{STORES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</Select></div>
          <div><Label>Objective</Label><Select value={objective} onChange={e=>setObjective(e.target.value)}>{AD_OBJECTIVES.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</Select></div>
          <div><Label>Campaign Name</Label><Input value={campName} onChange={e=>setCampName(e.target.value)} placeholder="Summer Whiskey Sale"/></div>
          <div><Label>Daily Budget (CAD $)</Label><Input type="number" min="1" step="1" value={dailyBudget} onChange={e=>setDailyBudget(e.target.value)}/></div>
        </div>
      </Card>
      <Card>
        <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4 uppercase tracking-wide">Ad Set &amp; Targeting</h3>
        <div className="grid grid-cols-3 gap-3 mb-4">
          <div><Label>Latitude</Label><Input value={lat} onChange={e=>setLat(e.target.value)} placeholder="50.6745"/></div>
          <div><Label>Longitude</Label><Input value={lng} onChange={e=>setLng(e.target.value)} placeholder="-120.3273"/></div>
          <div><Label>Radius (km)</Label><Input type="number" min="1" max="80" value={radius} onChange={e=>setRadius(e.target.value)}/></div>
          <div><Label>Min Age</Label><Input type="number" min="18" max="65" value={ageMin} onChange={e=>setAgeMin(e.target.value)}/></div>
          <div><Label>Max Age</Label><Input type="number" min="18" max="65" value={ageMax} onChange={e=>setAgeMax(e.target.value)}/></div>
        </div>
        <div><Label>Placements</Label>
          <div className="flex gap-2 flex-wrap">
            {AD_PLACEMENTS.map(p => (
              <label key={p.value} className={`flex items-center gap-2 px-3 py-2 rounded-xl border cursor-pointer text-sm transition-all
                ${placements.includes(p.value)?'border-indigo-500 bg-indigo-50 dark:bg-indigo-950/50 text-indigo-700 dark:text-indigo-300':'border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-400'}`}>
                <input type="checkbox" className="rounded" checked={placements.includes(p.value)} onChange={()=>togglePlacement(p.value)}/>{p.label}
              </label>
            ))}
          </div>
        </div>
      </Card>
      <Card>
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-sm font-bold text-gray-900 dark:text-white uppercase tracking-wide">Ad Creative</h3>
          <button onClick={()=>setShowAI(v=>!v)} className="text-xs font-semibold text-violet-600 dark:text-violet-400 hover:underline">{showAI?'Hide AI ↑':'✨ AI Copy'}</button>
        </div>
        {showAI && <div className="mb-4"><AIWriter storeName={store.name} apiKey={settings.anthropicKey} mode="ad" onResult={handleAI}/></div>}
        <div className="space-y-3">
          <div><Label>Headline <span className="text-gray-400 font-normal normal-case">({headline.length}/25)</span></Label><Input value={headline} onChange={e=>setHeadline(e.target.value)} maxLength={25} placeholder="Shop Our Whiskey Sale"/></div>
          <div><Label>Primary Text</Label><Textarea value={bodyText} onChange={e=>setBodyText(e.target.value)} rows={3} placeholder="Discover amazing local spirits…"/></div>
          <div className="grid grid-cols-2 gap-3">
            <div><Label>Call to Action</Label><Select value={ctaType} onChange={e=>setCtaType(e.target.value)}>{CTA_OPTIONS.map(c=><option key={c} value={c}>{c.replace(/_/g,' ')}</option>)}</Select></div>
            <div><Label>Destination URL</Label><Input value={destUrl} onChange={e=>setDestUrl(e.target.value)} placeholder="https://yourstore.com" type="url"/></div>
          </div>
          <ImagePicker file={adImg} preview={adImgPrev} onFile={f=>{setAdImg(f);const r=new FileReader();r.onload=()=>setAdImgPrev(r.result);r.readAsDataURL(f);}} onClear={()=>{setAdImg(null);setAdImgPrev(null);}} label="Ad Image (optional)"/>
        </div>
      </Card>
      {steps.length>0 && <Card><h3 className="text-sm font-bold text-gray-900 dark:text-white mb-3 uppercase tracking-wide">Build Progress</h3><StepIndicator steps={steps}/></Card>}
      <Button onClick={launch} loading={running} className="w-full" size="lg">🚀 Create Campaign (starts Paused)</Button>
    </div>
  );
}

// MODULE 2 — CAMPAIGN DASHBOARD
// ─────────────────────────────────────────────
function CampaignDashboard({ settings }) {
  const toast = useToast();
  const [campaigns,  setCampaigns]  = useState([]);
  const [loading,    setLoading]    = useState(false);
  const [filter,     setFilter]     = useState('all');
  const [togglingId, setTogglingId] = useState(null);

  const load = async () => {
    const token=settings.metaToken;
    if (!token) { toast.error('Meta User Access Token not set in Settings'); return; }
    setLoading(true);
    try {
      const data=await gGet(`/${AD_ACCOUNT_ID}/campaigns`,{ fields:'name,status,objective,daily_budget,insights{spend,impressions,clicks,ctr}',limit:100 },token);
      setCampaigns(data.data||[]);
    } catch(e) { toast.error(`Failed: ${e.message}`); }
    finally    { setLoading(false); }
  };

  useEffect(()=>{ load(); },[]);

  const toggleStatus = async (camp) => {
    const token=settings.metaToken;
    if(!token) { toast.error('Meta User Access Token not set'); return; }
    const newStatus=camp.status==='ACTIVE'?'PAUSED':'ACTIVE';
    setTogglingId(camp.id);
    try {
      await gPost(`/${camp.id}`,{status:newStatus},token);
      setCampaigns(p=>p.map(c=>c.id===camp.id?{...c,status:newStatus}:c));
      toast.success(`Campaign ${newStatus==='ACTIVE'?'resumed':'paused'}`);
    } catch(e) { toast.error(`Failed: ${e.message}`); }
    finally    { setTogglingId(null); }
  };

  const storeOf = name => STORES.find(s=>(name||'').startsWith(`[${s.name}]`));
  const filtered = filter==='all'?campaigns:campaigns.filter(c=>storeOf(c.name)?.id===filter);
  const insight  = (c,f) => c.insights?.data?.[0]?.[f]??null;
  const statusColor = s=>({ACTIVE:'green',PAUSED:'yellow',DELETED:'red',ARCHIVED:'gray'}[s]||'gray');

  return (
    <Card>
      <div className="flex items-center gap-3 mb-4 flex-wrap">
        <h2 className="text-base font-bold text-gray-900 dark:text-white flex-1">📊 Campaign Dashboard</h2>
        <Select value={filter} onChange={e=>setFilter(e.target.value)} className="w-auto text-xs">
          <option value="all">All Stores</option>
          {STORES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </Select>
        <Button variant="secondary" size="sm" onClick={load} loading={loading}>Refresh</Button>
      </div>
      {!loading&&filtered.length===0 && <div className="text-center py-12 text-gray-400 dark:text-gray-500 text-sm">No campaigns found.</div>}
      {filtered.length>0 && (
        <div className="overflow-x-auto -mx-1">
          <table className="w-full text-sm min-w-[700px]">
            <thead>
              <tr className="border-b border-gray-100 dark:border-gray-700">
                {['Campaign','Store','Status','Budget/day','Spend','Impressions','CTR',''].map(h=>(
                  <th key={h} className="text-left py-2 px-3 text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wide whitespace-nowrap">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-50 dark:divide-gray-700/50">
              {filtered.map(c => {
                const s=storeOf(c.name);
                const displayName=s?c.name.replace(`[${s.name}] `,''):c.name;
                const spend=insight(c,'spend'), imps=insight(c,'impressions'), ctr=insight(c,'ctr');
                return (
                  <tr key={c.id} className="hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
                    <td className="py-3 px-3"><p className="font-medium text-gray-900 dark:text-gray-100 max-w-[180px] truncate" title={displayName}>{displayName}</p><p className="text-xs text-gray-400 font-mono">{c.id}</p></td>
                    <td className="py-3 px-3">{s?<Badge color="indigo">{s.name.split(' ')[0]}</Badge>:<span className="text-xs text-gray-400">—</span>}</td>
                    <td className="py-3 px-3"><Badge color={statusColor(c.status)}>{c.status}</Badge></td>
                    <td className="py-3 px-3 text-gray-700 dark:text-gray-300">{fmtBudget(c.daily_budget)}</td>
                    <td className="py-3 px-3 text-gray-700 dark:text-gray-300">{spend!==null?`$${parseFloat(spend).toFixed(2)}`:'—'}</td>
                    <td className="py-3 px-3 text-gray-700 dark:text-gray-300">{imps!==null?fmtNum(imps):'—'}</td>
                    <td className="py-3 px-3 text-gray-700 dark:text-gray-300">{ctr!==null?fmtCTR(ctr):'—'}</td>
                    <td className="py-3 px-3"><Button variant={c.status==='ACTIVE'?'danger':'success'} size="sm" loading={togglingId===c.id} onClick={()=>toggleStatus(c)}>{c.status==='ACTIVE'?'Pause':'Resume'}</Button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </Card>
  );
}

// PRODUCT LIBRARY
// ─────────────────────────────────────────────
function ProductLibrary() {
  const toast    = useToast();
  const [storeId,     setStoreId]     = useState(STORES[0].id);
  const [catFilter,   setCatFilter]   = useState('all');
  const [showForm,    setShowForm]    = useState(false);
  const [formImg,     setFormImg]     = useState(null);
  const [formPrev,    setFormPrev]    = useState(null);
  const [formName,    setFormName]    = useState('');
  const [formSize,    setFormSize]    = useState('750ml');
  const [formCat,     setFormCat]     = useState('');
  const [formNotes,   setFormNotes]   = useState('');
  const [saving,      setSaving]      = useState(false);
  const [deleting,    setDeleting]    = useState(null);
  const fileRef = useRef();
  const { images, add, remove } = useBrandImageLibrary(storeId);

  const handleFile = file => {
    if (!file) return;
    setFormImg(file);
    const r=new FileReader(); r.onload=()=>setFormPrev(r.result); r.readAsDataURL(file);
  };

  const resetForm = () => {
    setFormImg(null); setFormPrev(null); setFormName(''); setFormSize('750ml'); setFormCat(''); setFormNotes(''); setShowForm(false);
  };

  const saveProduct = async () => {
    if (!formImg)       { toast.error('Upload a product image'); return; }
    if (!formName.trim()){ toast.error('Enter a product name'); return; }
    if (!formCat)       { toast.error('Select a category'); return; }
    setSaving(true);
    try {
      await add({ product_name:formName.trim(), size:formSize, category:formCat, notes:formNotes.trim(), data:formPrev });
      toast.success('Product added to library!');
      resetForm();
    } catch(e) { toast.error(e.message); }
    finally { setSaving(false); }
  };

  const deleteProduct = async (id) => {
    setDeleting(id);
    try { await remove(id); toast.success('Removed.'); }
    catch(e) { toast.error(e.message); }
    finally { setDeleting(null); }
  };

  const catCounts = {};
  images.forEach(i=>{ catCounts[i.category]=(catCounts[i.category]||0)+1; });
  const filtered = catFilter==='all' ? images : images.filter(i=>i.category===catFilter);
  const usedCats = LIQUOR_CATEGORIES.filter(c=>catCounts[c.id]);

  return (
    <div className="space-y-4">
      {/* Header */}
      <div className="flex items-center gap-3 flex-wrap">
        <Select value={storeId} onChange={e=>setStoreId(e.target.value)} className="w-auto text-sm">
          {STORES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </Select>
        <div className="flex-1"/>
        <Button onClick={()=>setShowForm(v=>!v)} variant={showForm?'secondary':'primary'} size="sm">
          {showForm?'✕ Cancel':'+ Add Product'}
        </Button>
      </div>

      {/* Add product form */}
      {showForm && (
        <Card className="border-2 border-indigo-200 dark:border-indigo-700">
          <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4 uppercase tracking-wide">Add Product</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            {/* Image upload */}
            <div className="sm:col-span-2">
              <Label>Product Photo</Label>
              <div className="flex items-center gap-3 flex-wrap">
                <Button variant="secondary" size="sm" onClick={()=>fileRef.current?.click()}>📷 Choose Image</Button>
                {formImg && <span className="text-xs text-gray-500 truncate max-w-xs">{formImg.name}</span>}
                {formImg && <button onClick={()=>{setFormImg(null);setFormPrev(null);}} className="text-xs text-red-500 hover:underline">Remove</button>}
              </div>
              <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={e=>handleFile(e.target.files[0])}/>
              {formPrev && <img src={formPrev} alt="" className="mt-2 h-28 rounded-xl object-contain border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 p-1"/>}
            </div>
            <div>
              <Label>Product Name</Label>
              <Input value={formName} onChange={e=>setFormName(e.target.value)} placeholder="e.g. Maker's Mark Bourbon"/>
            </div>
            <div>
              <Label>Size</Label>
              <Select value={formSize} onChange={e=>setFormSize(e.target.value)}>
                {BOTTLE_SIZES.map(s=><option key={s} value={s}>{s}</option>)}
              </Select>
            </div>
            <div className="sm:col-span-2">
              <Label>Category</Label>
              <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
                {LIQUOR_CATEGORIES.map(c=>(
                  <label key={c.id} className={`flex items-center gap-1.5 p-2 rounded-xl border cursor-pointer text-xs transition-all ${formCat===c.id?'border-indigo-500 bg-indigo-50 dark:bg-indigo-950/50 text-indigo-700 dark:text-indigo-300':'border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-400 hover:border-indigo-300'}`}>
                    <input type="radio" name="formCat" value={c.id} checked={formCat===c.id} onChange={()=>setFormCat(c.id)} className="hidden"/>
                    <span>{c.icon}</span><span className="font-medium">{c.label}</span>
                  </label>
                ))}
              </div>
            </div>
            <div className="sm:col-span-2">
              <Label>Notes (optional)</Label>
              <Input value={formNotes} onChange={e=>setFormNotes(e.target.value)} placeholder="e.g. Our best-seller, BC exclusive, seasonal"/>
            </div>
          </div>
          <div className="mt-4 flex gap-2">
            <Button onClick={saveProduct} loading={saving} className="flex-1">Save to Library</Button>
            <Button onClick={resetForm} variant="secondary">Cancel</Button>
          </div>
        </Card>
      )}

      {/* Category filter */}
      {images.length>0 && (
        <div className="flex gap-2 overflow-x-auto pb-1">
          <button onClick={()=>setCatFilter('all')} className={`flex-shrink-0 px-3 py-1.5 rounded-xl text-xs font-semibold transition-all border ${catFilter==='all'?'bg-indigo-600 text-white border-indigo-600':'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 border-gray-200 dark:border-gray-700 hover:border-indigo-300'}`}>
            All ({images.length})
          </button>
          {usedCats.map(c=>(
            <button key={c.id} onClick={()=>setCatFilter(c.id)} className={`flex-shrink-0 px-3 py-1.5 rounded-xl text-xs font-semibold transition-all border flex items-center gap-1 ${catFilter===c.id?'bg-indigo-600 text-white border-indigo-600':'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 border-gray-200 dark:border-gray-700 hover:border-indigo-300'}`}>
              {c.icon} {c.label} <span className="opacity-70">({catCounts[c.id]})</span>
            </button>
          ))}
        </div>
      )}

      {/* Product grid */}
      {filtered.length===0 && !showForm && (
        <div className="text-center py-16 text-gray-400 dark:text-gray-500">
          <p className="text-4xl mb-3">📦</p>
          <p className="text-sm font-medium">No products yet</p>
          <p className="text-xs mt-1">Click "+ Add Product" to build your library</p>
        </div>
      )}
      {filtered.length>0 && (
        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-3">
          {filtered.map(p=>{
            const cat = LIQUOR_CATEGORIES.find(c=>c.id===p.category);
            return (
              <div key={p.id} className="bg-white dark:bg-gray-800 rounded-xl border border-gray-100 dark:border-gray-700 overflow-hidden group hover:border-indigo-300 dark:hover:border-indigo-600 transition-all shadow-sm">
                <div className="relative">
                  <img src={p.data} alt={p.product_name} className="w-full aspect-square object-cover"/>
                  <button onClick={()=>deleteProduct(p.id)} disabled={deleting===p.id}
                    className="absolute top-1.5 right-1.5 bg-red-500 text-white rounded-full w-6 h-6 text-xs items-center justify-center hidden group-hover:flex hover:bg-red-600 transition-colors">
                    {deleting===p.id?'…':'✕'}
                  </button>
                </div>
                <div className="p-2.5">
                  <p className="text-xs font-bold text-gray-900 dark:text-gray-100 leading-tight truncate" title={p.product_name}>{p.product_name}</p>
                  <div className="flex items-center gap-1 mt-1.5 flex-wrap">
                    <span className="px-1.5 py-0.5 rounded-md bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400 text-xs font-medium">{p.size}</span>
                    {cat && <span className="px-1.5 py-0.5 rounded-md bg-indigo-50 dark:bg-indigo-950/50 text-indigo-700 dark:text-indigo-300 text-xs font-medium">{cat.icon} {cat.label}</span>}
                  </div>
                  {p.notes && <p className="text-xs text-gray-400 mt-1 truncate" title={p.notes}>{p.notes}</p>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// BRAND PROFILE EDITOR

function BrandProfileEditor({ storeId }) {
  const toast = useToast();
  const { profile, logo, loading, saveProfile, saveLogo, clearLogo } = useBrandProfile(storeId);
  const [form,   setForm]   = useState({ ...BRAND_DEFAULTS });
  const [saving, setSaving] = useState(false);
  const logoRef = useRef();

  useEffect(()=>setForm({...BRAND_DEFAULTS,...profile}),[profile]);

  const f = key => ({ value:form[key]||'', onChange:e=>setForm(p=>({...p,[key]:e.target.value})) });

  const handleLogo = file => {
    if (!file) return;
    const r=new FileReader();
    r.onload=async()=>{ try { await saveLogo(r.result); toast.success('Logo saved!'); } catch(e){ toast.error(e.message); } };
    r.readAsDataURL(file);
  };

  const save = async () => {
    setSaving(true);
    try { await saveProfile(form); toast.success('Brand profile saved!'); }
    catch(e) { toast.error(`Save failed: ${e.message}`); }
    finally  { setSaving(false); }
  };

  if (loading) return <div className="text-center py-16 text-gray-400 text-sm animate-pulse">Loading brand profile…</div>;

  return (
    <div className="space-y-4 max-w-2xl">
      <Card>
        <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-3 uppercase tracking-wide">Store Logo</h3>
        <div className="flex items-start gap-4">
          {logo ? (
            <div className="relative flex-shrink-0">
              <img src={logo} alt="Logo" className="h-20 w-20 object-contain rounded-xl border border-gray-200 dark:border-gray-600 bg-white p-1"/>
              <button onClick={async()=>{try{await clearLogo();toast.success('Logo removed.');}catch(e){toast.error(e.message);}}} className="absolute -top-1.5 -right-1.5 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center hover:bg-red-600 leading-none">✕</button>
            </div>
          ) : (
            <div className="h-20 w-20 rounded-xl border-2 border-dashed border-gray-300 dark:border-gray-600 flex items-center justify-center text-gray-400 text-xs text-center leading-tight flex-shrink-0 p-2">No logo yet</div>
          )}
          <div>
            <Button variant="secondary" size="sm" onClick={()=>logoRef.current?.click()}>Upload Logo</Button>
            <p className="text-xs text-gray-500 dark:text-gray-400 mt-2">PNG or SVG recommended. Stored in Supabase.</p>
          </div>
        </div>
        <input ref={logoRef} type="file" accept="image/*" className="hidden" onChange={e=>handleLogo(e.target.files[0])}/>
      </Card>
      <Card>
        <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4 uppercase tracking-wide">🎙 Voice &amp; Tone</h3>
        <div className="space-y-4">
          <div><Label>Brand Personality</Label><Input {...f('personality')} placeholder="e.g. Friendly, knowledgeable, local, approachable, authentic"/><p className="text-xs text-gray-400 mt-1">Comma-separated — used in AI caption and image prompts</p></div>
          <div><Label>Tone Description</Label><Textarea {...f('tone')} rows={2} placeholder="e.g. Warm and conversational — like advice from a knowledgeable friend. Never pushy."/></div>
          <div className="grid grid-cols-2 gap-4">
            <div><Label>✅ Language &amp; Phrases We Use</Label><Textarea {...f('do_say')} rows={4} placeholder={"e.g.\nCheers!\nGreat find.\nLocal favourite."}/></div>
            <div><Label>🚫 Language to Avoid</Label><Textarea {...f('dont_say')} rows={4} placeholder={"e.g.\nCheapest\nGet wasted"}/></div>
          </div>
          <div><Label>Target Audience</Label><Input {...f('audience')} placeholder="e.g. Adults 25–55 who enjoy quality craft spirits"/></div>
        </div>
      </Card>
      <Card>
        <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4 uppercase tracking-wide">🎨 Visual Brand</h3>
        <div className="space-y-4">
          <div className="grid grid-cols-3 gap-3">
            {[{key:'primary_color',label:'Primary'},{key:'secondary_color',label:'Secondary'},{key:'accent_color',label:'Accent'}].map(c=>(

                  <Input value={form[c.key]||''} onChange={e=>setForm(p=>({...p,[c.key]:e.target.value}))} placeholder="#1e3a5f" className="font-mono text-xs"/>

}
