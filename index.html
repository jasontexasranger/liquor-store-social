const ToastCtx = createContext(null);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((msg, type='info') => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 5000);
  }, []);
  const toast = { success:m=>add(m,'success'), error:m=>add(m,'error'), info:m=>add(m,'info') };
  return (
    <ToastCtx.Provider value={toast}>
      {children}
      <div className="fixed bottom-4 right-4 space-y-2 z-50 pointer-events-none">
        {toasts.map(t => (
          <div key={t.id} className={`px-4 py-3 rounded-xl shadow-lg text-white text-sm max-w-sm pointer-events-auto
            ${t.type==='success'?'bg-emerald-600':t.type==='error'?'bg-red-600':'bg-blue-600'}`}>
            {t.type==='success'?'✓ ':t.type==='error'?'✗ ':'ℹ '}{t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

// SUPABASE BRAND PROFILE HOOK
// ─────────────────────────────────────────────
function useBrandProfile(storeId) {
  const [profile, setProfile] = useState({ ...BRAND_DEFAULTS });
  const [logo,    setLogo]    = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const sb = getSB();
    if (!sb) { setLoading(false); return; }
    setLoading(true);
    sb.from('brand_profiles').select('*').eq('store_id', storeId).maybeSingle()
      .then(({ data }) => {
        if (data) {
          const { logo_data, id, updated_at, store_id, ...p } = data;
          setProfile({ ...BRAND_DEFAULTS, ...p });
          setLogo(logo_data || null);
        } else {
          setProfile({ ...BRAND_DEFAULTS });
          setLogo(null);
        }
      })
      .finally(() => setLoading(false));
  }, [storeId]);

  const saveProfile = async (p) => {
    const sb = getSB();
    if (!sb) throw new Error('Supabase not connected');
    const { error } = await sb.from('brand_profiles')
      .upsert({ store_id: storeId, ...p }, { onConflict: 'store_id' });
    if (error) throw error;
    setProfile(p);
  };

  const saveLogo = async (dataUrl) => {
    const sb = getSB();
    if (!sb) throw new Error('Supabase not connected');
    const { error } = await sb.from('brand_profiles')
      .upsert({ store_id: storeId, logo_data: dataUrl }, { onConflict: 'store_id' });
    if (error) throw error;
    setLogo(dataUrl);
  };

  const clearLogo = async () => {
    const sb = getSB();
    if (!sb) throw new Error('Supabase not connected');
    await sb.from('brand_profiles').update({ logo_data: null }).eq('store_id', storeId);
    setLogo(null);
  };

  return { profile, logo, loading, saveProfile, saveLogo, clearLogo };
}

// ─────────────────────────────────────────────
// PRODUCT IMAGE LIBRARY HOOK
// ─────────────────────────────────────────────
function useProductLibrary(storeId) {
  const [images,  setImages]  = useState([]);
  const [loading, setLoading] = useState(false);

  const load = useCallback(async () => {
    const sb=getSB(); if(!sb) return;
    setLoading(true);
    const {data}=await sb.from('product_images').select('id,name,data,created_at').eq('store_id',storeId).order('created_at',{ascending:false}).limit(40);
    setImages(data||[]);
    setLoading(false);
  },[storeId]);

  useEffect(()=>{ load(); },[load]);

  const save = async (name, dataUrl) => {
    const sb=getSB(); if(!sb) throw new Error('Not connected');
    // Compress before saving
    const compressed = await compressImage(dataUrl, 600, 0.75);
    await sb.from('product_images').insert({ store_id:storeId, name, data:compressed });
    await load();
  };

  const remove = async (id) => {
    const sb=getSB(); if(!sb) return;
    await sb.from('product_images').delete().eq('id',id);
    setImages(p=>p.filter(x=>x.id!==id));
  };

  return { images, loading, save, remove, reload:load };
}

// ─────────────────────────────────────────────
// IMAGE COMPRESSION UTILITY
// ─────────────────────────────────────────────
function compressImage(dataUrl, maxPx=600, quality=0.75) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const c = document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      res(c.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

    setImages(p=>p.filter(x=>x.id!==id));
  };

  return { images, load, add, remove };
}

// ─────────────────────────────────────────────
// GRAPH API HELPERS
// ─────────────────────────────────────────────
async function gFetch(path, opts={}) {
  const res  = await fetch(`${GRAPH_API}${path}`, opts);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || 'Graph API error');
  return data;
}
async function gGet(path, params, token) {
  const qs = new URLSearchParams({ ...params, access_token: token }).toString();
  return gFetch(`${path}?${qs}`);
}
async function gPost(path, body, token) {
  return gFetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, access_token: token }),
  });
}
async function gPostForm(path, form) {
  return gFetch(path, { method: 'POST', body: form });
}

async function callAI(prompt, apiKey, maxTokens=600) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text.trim();
}

async function openAIDescribeImage(base64, mime, apiKey) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      max_tokens: 200,
      messages: [{
        role: 'user',
        content: [
          { type: 'image_url', image_url: { url: `data:${mime};base64,${base64}` } },
          { type: 'text', text: 'Describe this product image in detail for a DALL-E image generation prompt. Focus on the product, packaging, label, colours, and visual characteristics. Be specific and vivid. Under 80 words, no intro text.' }
        ]
      }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.choices[0].message.content.trim();
}

async function openAIGenerateImage(prompt, dalleSize, apiKey) {
  const res = await fetch('https://api.openai.com/v1/images/generations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({ model: 'dall-e-3', prompt, n: 1, size: dalleSize, quality: 'standard' })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return { url: data.data[0].url, revised: data.data[0].revised_prompt };
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function fmtDate(iso)   { return new Date(iso).toLocaleString(undefined, { dateStyle:'medium', timeStyle:'short' }); }
function fmtBudget(c)   { return c ? `$${(+c/100).toFixed(2)}` : '—'; }
function fmtNum(n)      { if (!n||n==='—') return '—'; return Number(n).toLocaleString(); }
function fmtCTR(v)      { if (!v||v==='—') return '—'; return `${parseFloat(v).toFixed(2)}%`; }

            <Input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9…"/>
          </div>
          <Button onClick={connect} className="w-full" size="lg" disabled={!url||!key}>
            Connect →

          </p>
        </div>

  );
}

function LoginScreen() {
  const toast = useToast();
  const [email,    setEmail]    = useState('');
  const [password, setPassword] = useState('');
  const [mode,     setMode]     = useState('login'); // 'login' | 'forgot'
  const [loading,  setLoading]  = useState(false);
  const [sent,     setSent]     = useState(false);

  const signIn = async () => {
    if (!email||!password) { toast.error('Enter email and password'); return; }
    setLoading(true);
    const { error } = await getSB().auth.signInWithPassword({ email, password });

    setLoading(false);
  };

  const resetPw = async () => {
    if (!email) { toast.error('Enter your email'); return; }
    setLoading(true);
    const { error } = await getSB().auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
    if (error) toast.error(error.message);

    setLoading(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 p-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <span className="text-5xl">🥃</span>
          <h1 className="text-2xl font-bold text-white mt-3">Liquor Store Social</h1>
          <p className="text-gray-400 text-sm mt-1">4 locations · Social Media Manager</p>
        </div>
        <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6">
          <h2 className="text-lg font-bold text-gray-900 dark:text-white mb-5 text-center">
            {mode==='login' ? 'Sign In' : 'Reset Password'}
          </h2>
          <div className="space-y-3">
            <div>
              <Label>Email</Label>
              <Input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"
                onKeyDown={e=>e.key==='Enter'&&mode==='login'&&signIn()}/>
            </div>
            {mode==='login' && (
              <div>
                <Label>Password</Label>
                <Input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••"
                  onKeyDown={e=>e.key==='Enter'&&signIn()}/>
              </div>
            )}
          </div>
          <div className="mt-5">
            {mode==='login' && <Button onClick={signIn} loading={loading} className="w-full" size="lg">Sign In</Button>}
            {mode==='forgot' && !sent && <Button onClick={resetPw} loading={loading} className="w-full" size="lg">Send Reset Email</Button>}

          </div>
          <div className="mt-4 text-center text-xs text-gray-500">
            {mode==='login'
              ? <button onClick={()=>setMode('forgot')} className="hover:text-indigo-600 underline">Forgot password?</button>
              : <button onClick={()=>{setMode('login');setSent(false);}} className="hover:text-indigo-600 underline">← Back to sign in</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// AI WRITER PANEL
// ─────────────────────────────────────────────
function AIWriter({ storeName, apiKey, mode='caption', onResult }) {
  const toast = useToast();
  const [topic,   setTopic]   = useState('');
  const [tone,    setTone]    = useState('Friendly');
  const [extra,   setExtra]   = useState('');
  const [loading, setLoading] = useState(false);

  const generate = async () => {
    if (!apiKey)       { toast.error('Add your Anthropic API key in Settings first'); return; }
    if (!topic.trim()) { toast.error('Enter a topic or promotion description'); return; }
    setLoading(true);
    try {
      let prompt;
      if (mode==='caption') {
        prompt = `Write a ${tone.toLowerCase()} Facebook post caption for "${storeName}", an independent retail liquor store in BC, Canada.\n\nPost topic/promotion: ${topic}${extra?`\n\nAdditional instructions: ${extra}`:''}\n\nRules:\n- Under 280 characters\n- Engaging and authentic\n- No hashtags unless requested\n- Output ONLY the caption text with no quotes, labels, or explanation`;
      } else {
        prompt = `Write Facebook ad copy for "${storeName}", an independent retail liquor store in BC, Canada.\n\nPromotion: ${topic}\nTone: ${tone}${extra?`\nNotes: ${extra}`:''}\n\nOutput EXACTLY two lines:\nHEADLINE: [max 25 characters]\nBODY: [max 90 characters]\n\nNo other text.`;
      }
      const result = await callAI(prompt, apiKey, 400);
      onResult(result, mode);
      toast.success('AI copy generated!');
    } catch (e) {
      toast.error(`AI error: ${e.message}`);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="rounded-xl border border-violet-200 dark:border-violet-800 bg-violet-50 dark:bg-violet-950/40 p-4 space-y-3">
      <p className="text-xs font-bold text-violet-700 dark:text-violet-300 uppercase tracking-widest">✨ AI Copy Writer</p>
      <div>
        <Label>Topic / Promotion</Label>
        <Input value={topic} onChange={e=>setTopic(e.target.value)} placeholder={mode==='caption'?'e.g. Weekend sale — 20% off all BC craft beer':'e.g. Summer whiskey sale, $5 off any bottle'}/>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <Label>Tone</Label>
          <Select value={tone} onChange={e=>setTone(e.target.value)}>{TONES.map(t=><option key={t}>{t}</option>)}</Select>
        </div>
        <div>
          <Label>Extra instructions</Label>
          <Input value={extra} onChange={e=>setExtra(e.target.value)} placeholder="Optional"/>
        </div>
      </div>
      <Button onClick={generate} loading={loading} variant="outline" className="w-full">Generate with Claude Haiku</Button>
    </div>
  );
}

// ─────────────────────────────────────────────
// INLINE IMAGE GENERATOR (embedded in PostComposer)
// ─────────────────────────────────────────────
function InlineImageGenerator({ storeId, settings, onGenerated }) {
  const toast = useToast();
  const [brief,      setBrief]      = useState('');
  const [size,       setSize]       = useState('1024x1024');
  const [prodFile,   setProdFile]   = useState(null);
  const [prodPrev,   setProdPrev]   = useState(null);
  const [genStep,    setGenStep]    = useState('idle');
  const [brand,      setBrand]      = useState({ ...BRAND_DEFAULTS });
  const [showLib,    setShowLib]    = useState(false);
  const { images:libImages, remove:removeFromLib } = useBrandImageLibrary(storeId);
  const { save:saveToQuickLib } = useProductLibrary(storeId);
  const prodRef = useRef();

  useEffect(()=>{
    const sb=getSB(); if(!sb) return;
    sb.from('brand_profiles').select('*').eq('store_id',storeId).maybeSingle()
      .then(({data})=>{ if(data){ const {logo_data,...p}=data; setBrand({...BRAND_DEFAULTS,...p}); } else setBrand({...BRAND_DEFAULTS}); });
  },[storeId]);

  const handleProd = file => {
    if (!file) return;
    setProdFile(file);
    const r=new FileReader();
    r.onload=async()=>{ setProdPrev(r.result); try { await saveToLib(file.name, r.result); } catch{} };
    r.readAsDataURL(file);
  };

  const selectFromLib = img => {
    setProdPrev(img.data);
    fetch(img.data).then(r=>r.blob()).then(blob=>setProdFile(new File([blob],img.name,{type:'image/jpeg'}))).catch(()=>{});
    setShowLib(false);
  };

  const generate = async () => {
    const apiKey = settings.openaiKey;
    if (!apiKey) { toast.error('Add your OpenAI API key in Settings'); return; }
    setGenStep('building');
    try {
      let productDesc = '';
      if (prodFile) {
        setGenStep('analyzing');
        const b64 = await fileToBase64(prodFile);
        productDesc = await openAIDescribeImage(b64, prodFile.type||'image/jpeg', apiKey);
      }
      setGenStep('generating');
      const parts = [`Professional social media image for "${STORES.find(s=>s.id===storeId)?.name}", a retail liquor store in BC, Canada.`];
      if (brand.visual_style)   parts.push(`Visual style: ${brand.visual_style}.`);
      if (brand.mood)           parts.push(`Mood: ${brand.mood}.`);
      if (brand.style_keywords) parts.push(`Style keywords: ${brand.style_keywords}.`);
      if (brand.primary_color)  parts.push(`Brand colour: ${brand.primary_color}.`);
      if (brand.avoid_visually) parts.push(`Do NOT include: ${brand.avoid_visually}.`);
      if (productDesc)          parts.push(`Feature this product: ${productDesc}`);
      if (brief.trim())         parts.push(`Creative direction: ${brief.trim()}.`);
      parts.push('High-quality commercial photography. No text or words in the image.');
      const dalleSize = IMAGE_SIZES.find(s=>s.value===size)?.dalleSize||'1024x1024';
      const img = await openAIGenerateImage(parts.join(' '), dalleSize, apiKey);
      onGenerated(img.url);
      toast.success('Image generated — ready to post!');
      setGenStep('idle');
      // Save to history
      const sb=getSB();
      if(sb) await sb.from('generation_history').insert({ store_id:storeId, store_name:STORES.find(s=>s.id===storeId)?.name, image_url:img.url, revised_prompt:img.revised, brief, size_label:size, prompt:parts.join(' ') });
    } catch(e) { toast.error(`Generation failed: ${e.message}`); setGenStep('idle'); }
  };

  const isBusy = genStep !== 'idle';
  const stepLabel = { analyzing:'🔍 Analysing product…', building:'⚙️ Building prompt…', generating:'🎨 Generating…' };

  return (
    <div className="rounded-xl border border-indigo-200 dark:border-indigo-800 bg-indigo-50 dark:bg-indigo-950/30 p-4 space-y-3">
      <p className="text-xs font-bold text-indigo-700 dark:text-indigo-300 uppercase tracking-widest">🎨 Generate Image with AI</p>
      <div>
        <Label>Image Brief</Label>
        <Textarea value={brief} onChange={e=>setBrief(e.target.value)} rows={2} placeholder="e.g. A bottle of Maker's Mark on a warm wooden bar — cozy summer evening"/>
      </div>
      <div>
        <div className="flex items-center justify-between mb-1">
          <Label className="mb-0">Product Reference (optional)</Label>
          {libImages.length>0 && <button onClick={()=>setShowLib(v=>!v)} className="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline">{showLib?'Hide ↑':`📚 Library (${libImages.length})`}</button>}
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <Button variant="secondary" size="sm" onClick={()=>prodRef.current?.click()}>📦 Upload</Button>
          {prodFile && <span className="text-xs text-gray-500 truncate max-w-[140px]">{prodFile.name}</span>}
          {prodFile && <button onClick={()=>{setProdFile(null);setProdPrev(null);}} className="text-xs text-red-500 hover:underline">✕</button>}
        </div>
        <input ref={prodRef} type="file" accept="image/*" className="hidden" onChange={e=>handleProd(e.target.files[0])}/>
        {prodPrev && <img src={prodPrev} alt="" className="mt-2 h-16 rounded-lg object-contain border border-gray-200 dark:border-gray-600 bg-white p-0.5"/>}
        {showLib && libImages.length>0 && (
          <div className="mt-2 grid grid-cols-4 gap-2">
            {libImages.map(img=>{
              const cat=LIQUOR_CATEGORIES.find(c=>c.id===img.category);
              return (
                <div key={img.id} className="relative group cursor-pointer" onClick={()=>selectFromLib(img)}>
                  <img src={img.data} alt={img.product_name} title={img.product_name}
                    className="w-full aspect-square object-cover rounded-lg border border-gray-200 dark:border-gray-600 hover:border-indigo-400 transition-all"/>
                  <div className="absolute inset-0 bg-black/0 group-hover:bg-black/20 rounded-lg transition-all"/>
                  <p className="text-xs text-gray-600 dark:text-gray-400 mt-0.5 truncate font-medium">{img.product_name}</p>
                  <p className="text-xs text-gray-400">{img.size}{cat?` · ${cat.icon}`:''}</p>
                </div>
              );
            })}
          </div>
        )}
        {showLib && libImages.length===0 && (
          <p className="text-xs text-gray-400 mt-2 italic">No products in library yet — add some under Brand → Product Library.</p>
        )}
      </div>
      <div>
        <Label>Size</Label>
        <div className="grid grid-cols-2 gap-1.5">
          {IMAGE_SIZES.map(s=>(
            <label key={s.value} className={`flex items-center gap-2 p-2 rounded-lg border cursor-pointer text-xs transition-all ${size===s.value?'border-indigo-500 bg-white dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300':'border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-400'}`}>
              <input type="radio" name="inlineSize" value={s.value} checked={size===s.value} onChange={()=>setSize(s.value)} className="flex-shrink-0"/>
              <span><strong>{s.label}</strong> — {s.desc}</span>
            </label>
          ))}
        </div>
      </div>
      <Button onClick={generate} loading={isBusy} className="w-full" variant="primary">
        {isBusy?(stepLabel[genStep]||'Working…'):'🎨 Generate & Add to Post'}
      </Button>
    </div>
  );
}

// ─────────────────────────────────────────────
// MODULE 1 — POST COMPOSER
// ─────────────────────────────────────────────
function PostComposer({ settings, pendingImage, onClearPending }) {
  const toast = useToast();
  const [selected,   setSelected]   = useState([STORES[0].id]);
  const [caption,    setCaption]    = useState('');
  const [imgFile,    setImgFile]    = useState(null);
  const [imgPrev,    setImgPrev]    = useState(null);
  const [genImgUrl,  setGenImgUrl]  = useState(null);
  const [schedule,   setSchedule]   = useState('');
  const [loading,    setLoading]    = useState(false);
  const [showAI,     setShowAI]     = useState(false);
  const [showImgGen, setShowImgGen] = useState(false);
  const [results,    setResults]    = useState([]);

  useEffect(()=>{
    if (pendingImage) { setImgFile(null); setImgPrev(pendingImage); setGenImgUrl(pendingImage); setShowImgGen(false); }
  },[pendingImage]);

  const toggleStore = id => setSelected(p => p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  const handleFile = file => {
    if (!file) return;
    setImgFile(file); setGenImgUrl(null);
    const r=new FileReader(); r.onload=()=>setImgPrev(r.result); r.readAsDataURL(file);
    if (onClearPending) onClearPending();
  };

  const clearImage = () => {
    setImgFile(null); setImgPrev(null); setGenImgUrl(null);
    if (onClearPending) onClearPending();
  };

  const handleGenerated = (url) => {
    setGenImgUrl(url); setImgPrev(url); setImgFile(null);
    setShowImgGen(false);
    if (onClearPending) onClearPending();
  };

  const post = async () => {
    if (!caption.trim())     { toast.error('Write a caption first'); return; }
    if (selected.length===0) { toast.error('Select at least one store'); return; }
    const missing = selected.filter(id=>!settings.tokens[id]);
    if (missing.length) { toast.error(`Missing token(s) for: ${missing.map(id=>STORES.find(s=>s.id===id)?.name).join(', ')}`); return; }
    if (schedule) {
      const ts = new Date(schedule).getTime();
      if (ts < Date.now()+10*60*1000) { toast.error('Scheduled time must be at least 10 minutes in the future'); return; }
    }

    setLoading(true); setResults([]);
    const res = [];
    const activeImgUrl = genImgUrl || (pendingImage&&!imgFile?pendingImage:null);

    for (const storeId of selected) {
      const store   = STORES.find(s=>s.id===storeId);
      const token   = settings.tokens[storeId];
      const schedTs = schedule ? Math.floor(new Date(schedule).getTime()/1000) : null;
      try {
        let postId;
        if (imgFile) {
          const form = new FormData();
          form.append('caption', caption+POST_SUFFIX);
          form.append('source', imgFile);
          form.append('access_token', token);
          if (schedTs) { form.append('published','false'); form.append('scheduled_publish_time',String(schedTs)); }
          const r = await gPostForm(`/${store.pageId}/photos`, form);
          postId = r.post_id||r.id;
        } else if (activeImgUrl) {
          const body = { url: activeImgUrl, caption: caption+POST_SUFFIX };
          if (schedTs) { body.published=false; body.scheduled_publish_time=schedTs; }
          const r = await gPost(`/${store.pageId}/photos`, body, token);
          postId = r.post_id||r.id;
        } else {
          const body = { message: caption+POST_SUFFIX };
          if (schedTs) { body.published=false; body.scheduled_publish_time=schedTs; }
          const r = await gPost(`/${store.pageId}/feed`, body, token);
          postId = r.id;
        }
        res.push({ store:store.name, success:true, postId, scheduled:!!schedTs });
      } catch(e) {
        res.push({ store:store.name, success:false, error:e.message });
      }
    }

    setResults(res);
    res.forEach(r => { if(r.success) toast.success(`${r.store}: ${r.scheduled?'Scheduled!':'Published!'}`); else toast.error(`${r.store}: ${r.error}`); });
    if (res.some(r=>r.success)) { setCaption(''); setImgFile(null); setImgPrev(null); setGenImgUrl(null); setSchedule(''); if(onClearPending) onClearPending(); }
    setLoading(false);
  };

  const activeStoreId = selected.length===1 ? selected[0] : STORES[0].id;
  const activeStore   = STORES.find(s=>s.id===activeStoreId)?.name || 'our store';

  return (
    <Card>
      <h2 className="text-base font-bold text-gray-900 dark:text-white mb-4">📝 Compose Post</h2>
      <div className="mb-4">
        <Label>Post to</Label>
        <div className="grid grid-cols-2 gap-2">
          {STORES.map(s => (
            <label key={s.id} className={`flex items-center gap-2 p-2.5 rounded-xl border cursor-pointer text-sm transition-all
              ${selected.includes(s.id)?'border-indigo-500 bg-indigo-50 dark:bg-indigo-950/50 text-indigo-800 dark:text-indigo-200 shadow-sm':'border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:border-indigo-300'}`}>
              <input type="checkbox" className="rounded" checked={selected.includes(s.id)} onChange={()=>toggleStore(s.id)}/>
              <span className="leading-tight">{s.name}</span>
            </label>
          ))}
        </div>
      </div>
      <div className="mb-3">
        <div className="flex items-center justify-between mb-1">
          <Label className="mb-0">Caption</Label>
          <button onClick={()=>setShowAI(v=>!v)} className="text-xs font-semibold text-violet-600 dark:text-violet-400 hover:underline">{showAI?'Hide AI Writer ↑':'✨ AI Writer'}</button>
        </div>
        <Textarea value={caption} onChange={e=>setCaption(e.target.value)} rows={4} placeholder="What's happening at the store?"/>
        <p className="text-xs text-gray-400 mt-1 text-right">{caption.length} chars</p>
        <p className="text-xs text-gray-400 dark:text-gray-500 mt-1 italic">↳ <span className="text-gray-500 dark:text-gray-400">Auto-appended:</span> Prices exclude tax &amp; deposit - while supplies last</p>
      </div>
      {showAI && <div className="mb-4"><AIWriter storeName={activeStore} apiKey={settings.anthropicKey} mode="caption" onResult={t=>setCaption(t)}/></div>}

      {/* Image section */}
      <div className="mb-4">
        <div className="flex items-center justify-between mb-2">
          <Label className="mb-0">Image</Label>
          <div className="flex gap-2">
            <button onClick={()=>setShowImgGen(v=>!v)} className={`text-xs font-semibold hover:underline ${showImgGen?'text-indigo-600 dark:text-indigo-400':'text-indigo-500 dark:text-indigo-400'}`}>{showImgGen?'Hide Generator ↑':'🎨 Generate with AI'}</button>
          </div>
        </div>

        {/* Generated image preview */}
        {(genImgUrl||(pendingImage&&!imgFile)) && (
          <div className="mb-3">
            <div className="relative inline-block">
              <img src={genImgUrl||pendingImage} alt="" className="h-32 rounded-xl object-cover border border-indigo-300 dark:border-indigo-600 shadow-sm"/>
              <button onClick={clearImage} className="absolute -top-1.5 -right-1.5 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center hover:bg-red-600">✕</button>
            </div>
            <p className="text-xs text-amber-600 dark:text-amber-400 mt-1">⚠ Generated URLs expire in ~1 hour — post soon.</p>
          </div>
        )}

        {/* File upload (shown when no generated image) */}
        {!genImgUrl && !(pendingImage&&!imgFile) && (
          <ImagePicker file={imgFile} preview={imgPrev} onFile={handleFile} onClear={clearImage} label="Upload Image"/>
        )}

        {/* Inline generator */}
        {showImgGen && (
          <div className="mt-3">
            <InlineImageGenerator storeId={activeStoreId} settings={settings} onGenerated={handleGenerated}/>
          </div>
        )}
      </div>

      <div className="mb-5">
        <Label>Schedule (leave blank to post immediately)</Label>
        <Input type="datetime-local" value={schedule} onChange={e=>setSchedule(e.target.value)}/>
      </div>
      <Button onClick={post} loading={loading} className="w-full" size="lg">
        {schedule?'📅 Schedule Post':'🚀 Publish Now'}
      </Button>
      {results.length>0 && (
        <div className="mt-4 space-y-2">
          <Divider label="Results"/>
          {results.map((r,i) => (
            <div key={i} className={`flex items-center justify-between text-sm p-3 rounded-xl ${r.success?'bg-emerald-50 dark:bg-emerald-950/30 text-emerald-800 dark:text-emerald-300':'bg-red-50 dark:bg-red-950/30 text-red-700 dark:text-red-400'}`}>
              <span>{r.success?'✓':'✗'} {r.store} — {r.success?(r.scheduled?'Scheduled':'Published'):r.error}</span>
              {r.success&&r.postId && <a href={fbPostUrl(r.postId)} target="_blank" rel="noopener noreferrer" className="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline ml-3 whitespace-nowrap">View post →</a>}
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

// ─────────────────────────────────────────────
// MODULE 1 — POST HISTORY
// ─────────────────────────────────────────────
function PostHistory({ settings }) {
  const toast   = useToast();
  const [storeId, setStoreId] = useState(STORES[0].id);
  const [posts,   setPosts]   = useState([]);
  const [loading, setLoading] = useState(false);
  const [loaded,  setLoaded]  = useState(false);
  const store = STORES.find(s=>s.id===storeId);

  useEffect(()=>{setLoaded(false);setPosts([]);},[storeId]);

  const load = async () => {
    const token = settings.tokens[storeId];
    if (!token) { toast.error('No page token for this store — add it in Settings'); return; }
    setLoading(true);
    try {
      const data = await gGet(`/${store.pageId}/posts`,{
        fields:'message,story,created_time,full_picture,permalink_url,likes.summary(true),comments.summary(true),shares',limit:12
      },token);
      setPosts(data.data||[]);
      setLoaded(true);
    } catch(e) { toast.error(`Failed to load posts: ${e.message}`); }
    finally    { setLoading(false); }
  };

  return (
    <Card>
      <div className="flex items-center gap-2 mb-4 flex-wrap">
        <h2 className="text-base font-bold text-gray-900 dark:text-white flex-1">📋 Post History</h2>
        <Select value={storeId} onChange={e=>setStoreId(e.target.value)} className="w-auto text-xs">{STORES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</Select>
        <Button variant="secondary" size="sm" onClick={load} loading={loading}>{loaded?'Refresh':'Load Posts'}</Button>
      </div>
      {!loaded&&!loading && <div className="text-center py-10 text-gray-400 dark:text-gray-500 text-sm">Select a store and click Load Posts</div>}
      {loaded&&posts.length===0 && <div className="text-center py-10 text-gray-400 dark:text-gray-500 text-sm">No posts found.</div>}
      <div className="space-y-3 max-h-[480px] overflow-y-auto pr-1">
        {posts.map(p => {
          const text = p.message||p.story||'(no text)';
          return (
            <div key={p.id} className="flex gap-3 p-3 rounded-xl border border-gray-100 dark:border-gray-700 hover:border-indigo-200 dark:hover:border-indigo-700 transition-colors">
              {p.full_picture && <img src={p.full_picture} alt="" className="w-16 h-16 rounded-lg object-cover flex-shrink-0 border border-gray-200 dark:border-gray-600"/>}
              <div className="flex-1 min-w-0">
                <p className="text-sm text-gray-800 dark:text-gray-200 line-clamp-3 leading-snug">{text}</p>
                <p className="text-xs text-gray-400 mt-1">{fmtDate(p.created_time)}</p>
                <div className="flex items-center gap-3 mt-1.5 flex-wrap">
                  <span className="text-xs text-gray-500 dark:text-gray-400">👍 {p.likes?.summary?.total_count??0}</span>
                  <span className="text-xs text-gray-500 dark:text-gray-400">💬 {p.comments?.summary?.total_count??0}</span>
                  {(p.shares?.count??0)>0 && <span className="text-xs text-gray-500 dark:text-gray-400">🔄 {p.shares.count}</span>}
                  <a href={p.permalink_url||fbPostUrl(p.id)} target="_blank" rel="noopener noreferrer" className="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline ml-auto">Open →</a>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

// ─────────────────────────────────────────────
// MODULE 2 — CAMPAIGN BUILDER
// ─────────────────────────────────────────────
function CampaignBuilder({ settings }) {
  const toast = useToast();
  const [storeId,     setStoreId]     = useState(STORES[0].id);
  const [objective,   setObjective]   = useState('OUTCOME_AWARENESS');
  const [campName,    setCampName]    = useState('');
  const [dailyBudget, setDailyBudget] = useState('20');
  const [lat,         setLat]         = useState(String(STORES[0].lat));
  const [lng,         setLng]         = useState(String(STORES[0].lng));
  const [radius,      setRadius]      = useState('25');
  const [ageMin,      setAgeMin]      = useState('21');
  const [ageMax,      setAgeMax]      = useState('65');
  const [placements,  setPlacements]  = useState(['facebook_feed']);
  const [headline,    setHeadline]    = useState('');
  const [bodyText,    setBodyText]    = useState('');
  const [ctaType,     setCtaType]     = useState('LEARN_MORE');
  const [destUrl,     setDestUrl]     = useState('');
  const [adImg,       setAdImg]       = useState(null);
  const [adImgPrev,   setAdImgPrev]   = useState(null);
  const [showAI,      setShowAI]      = useState(false);
  const [steps,       setSteps]       = useState([]);
  const [running,     setRunning]     = useState(false);

  const store = STORES.find(s=>s.id===storeId);

  useEffect(()=>{ const s=STORES.find(x=>x.id===storeId); if(s){setLat(String(s.lat));setLng(String(s.lng));} },[storeId]);

  const togglePlacement = p => setPlacements(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p]);

  const handleAI = (text) => {
    const lines = text.split('\n');
    for (const ln of lines) {
      if (ln.startsWith('HEADLINE:')) setHeadline(ln.replace('HEADLINE:','').trim().slice(0,25));
      if (ln.startsWith('BODY:'))     setBodyText(ln.replace('BODY:','').trim().slice(0,125));
    }
  };

  const addStep    = (label,status='pending',detail='') => setSteps(p=>[...p,{label,status,detail}]);
  const finishStep = (status,detail='') => setSteps(p=>{ const a=[...p]; a[a.length-1]={...a[a.length-1],status,detail}; return a; });

  const launch = async () => {
    const token = settings.metaToken;
    if (!token)            { toast.error('Meta User Access Token not set in Settings'); return; }
    if (!campName.trim())  { toast.error('Enter a campaign name'); return; }
    if (!headline.trim()||!bodyText.trim()) { toast.error('Enter headline and body copy'); return; }
    if (placements.length===0) { toast.error('Select at least one placement'); return; }

    const objMeta = AD_OBJECTIVES.find(o=>o.value===objective);
    setRunning(true); setSteps([]);

    try {
      addStep('Creating campaign…','running');
      const camp = await gPost(`/${AD_ACCOUNT_ID}/campaigns`,{ name:`[${store.name}] ${campName}`, objective, status:'PAUSED', special_ad_categories:[] },token);
      finishStep('done',`ID: ${camp.id}`);

      addStep('Creating ad set…','running');
      const targeting = { geo_locations:{ custom_locations:[{ latitude:parseFloat(lat)||store.lat, longitude:parseFloat(lng)||store.lng, radius:parseInt(radius)||25, distance_unit:'kilometer' }] }, age_min:parseInt(ageMin)||21, age_max:parseInt(ageMax)||65, facebook_positions:placements.filter(p=>p.startsWith('facebook')).map(p=>p.replace('facebook_','')).filter(Boolean), instagram_positions:placements.filter(p=>p.startsWith('instagram')).map(p=>p.replace('instagram_','')).filter(Boolean) };
      const adSet = await gPost(`/${AD_ACCOUNT_ID}/adsets`,{ name:`${campName} — Ad Set`, campaign_id:camp.id, daily_budget:Math.round(parseFloat(dailyBudget)*100), billing_event:'IMPRESSIONS', optimization_goal:objMeta.optGoal, targeting, status:'PAUSED', page_id:store.pageId },token);
      finishStep('done',`ID: ${adSet.id}`);

      let imageHash=null;
      if (adImg) {
        addStep('Uploading image…','running');
        const b64=await fileToBase64(adImg);
        const resp=await gPost(`/${AD_ACCOUNT_ID}/adimages`,{[adImg.name]:b64},token);
        imageHash=resp.images?Object.values(resp.images)[0]?.hash:null;
        finishStep('done',imageHash?`Hash: ${imageHash}`:'Uploaded');
      }

      addStep('Creating ad creative…','running');
      const linkUrl=destUrl.trim()||`https://www.facebook.com/${store.pageId}`;
      const creative = await gPost(`/${AD_ACCOUNT_ID}/adcreatives`,{ name:`${campName} — Creative`, object_story_spec:{ page_id:store.pageId, link_data:{ message:bodyText, name:headline, link:linkUrl, call_to_action:{type:ctaType,value:{link:linkUrl}}, ...(imageHash?{image_hash:imageHash}:{}) } } },token);
      finishStep('done',`ID: ${creative.id}`);

      addStep('Creating ad…','running');
      const ad=await gPost(`/${AD_ACCOUNT_ID}/ads`,{ name:`${campName} — Ad`, adset_id:adSet.id, creative:{creative_id:creative.id}, status:'PAUSED' },token);
      finishStep('done',`ID: ${ad.id}`);

      addStep('🎉 Campaign created — all assets are PAUSED','done','Activate in Meta Ads Manager when ready.');
      toast.success('Campaign created!');
    } catch(e) { finishStep('error',e.message); toast.error(`Failed: ${e.message}`); }
    finally    { setRunning(false); }
  };

  return (
    <div className="space-y-4">
      <Card>
        <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4 uppercase tracking-wide">Campaign</h3>
        <div className="grid grid-cols-2 gap-4">
          <div><Label>Store</Label><Select value={storeId} onChange={e=>setStoreId(e.target.value)}>{STORES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</Select></div>
          <div><Label>Objective</Label><Select value={objective} onChange={e=>setObjective(e.target.value)}>{AD_OBJECTIVES.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</Select></div>
          <div><Label>Campaign Name</Label><Input value={campName} onChange={e=>setCampName(e.target.value)} placeholder="Summer Whiskey Sale"/></div>
          <div><Label>Daily Budget (CAD $)</Label><Input type="number" min="1" step="1" value={dailyBudget} onChange={e=>setDailyBudget(e.target.value)}/></div>
        </div>
      </Card>
      <Card>
        <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4 uppercase tracking-wide">Ad Set &amp; Targeting</h3>
        <div className="grid grid-cols-3 gap-3 mb-4">
          <div><Label>Latitude</Label><Input value={lat} onChange={e=>setLat(e.target.value)} placeholder="50.6745"/></div>
          <div><Label>Longitude</Label><Input value={lng} onChange={e=>setLng(e.target.value)} placeholder="-120.3273"/></div>
          <div><Label>Radius (km)</Label><Input type="number" min="1" max="80" value={radius} onChange={e=>setRadius(e.target.value)}/></div>
          <div><Label>Min Age</Label><Input type="number" min="18" max="65" value={ageMin} onChange={e=>setAgeMin(e.target.value)}/></div>
          <div><Label>Max Age</Label><Input type="number" min="18" max="65" value={ageMax} onChange={e=>setAgeMax(e.target.value)}/></div>
        </div>
        <div><Label>Placements</Label>
          <div className="flex gap-2 flex-wrap">
            {AD_PLACEMENTS.map(p => (
              <label key={p.value} className={`flex items-center gap-2 px-3 py-2 rounded-xl border cursor-pointer text-sm transition-all
                ${placements.includes(p.value)?'border-indigo-500 bg-indigo-50 dark:bg-indigo-950/50 text-indigo-700 dark:text-indigo-300':'border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-400'}`}>
                <input type="checkbox" className="rounded" checked={placements.includes(p.value)} onChange={()=>togglePlacement(p.value)}/>{p.label}
              </label>
            ))}
          </div>
        </div>
      </Card>
      <Card>
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-sm font-bold text-gray-900 dark:text-white uppercase tracking-wide">Ad Creative</h3>
          <button onClick={()=>setShowAI(v=>!v)} className="text-xs font-semibold text-violet-600 dark:text-violet-400 hover:underline">{showAI?'Hide AI ↑':'✨ AI Copy'}</button>
        </div>
        {showAI && <div className="mb-4"><AIWriter storeName={store.name} apiKey={settings.anthropicKey} mode="ad" onResult={handleAI}/></div>}
        <div className="space-y-3">
          <div><Label>Headline <span className="text-gray-400 font-normal normal-case">({headline.length}/25)</span></Label><Input value={headline} onChange={e=>setHeadline(e.target.value)} maxLength={25} placeholder="Shop Our Whiskey Sale"/></div>
          <div><Label>Primary Text</Label><Textarea value={bodyText} onChange={e=>setBodyText(e.target.value)} rows={3} placeholder="Discover amazing local spirits…"/></div>
          <div className="grid grid-cols-2 gap-3">
            <div><Label>Call to Action</Label><Select value={ctaType} onChange={e=>setCtaType(e.target.value)}>{CTA_OPTIONS.map(c=><option key={c} value={c}>{c.replace(/_/g,' ')}</option>)}</Select></div>
            <div><Label>Destination URL</Label><Input value={destUrl} onChange={e=>setDestUrl(e.target.value)} placeholder="https://yourstore.com" type="url"/></div>
          </div>
          <ImagePicker file={adImg} preview={adImgPrev} onFile={f=>{setAdImg(f);const r=new FileReader();r.onload=()=>setAdImgPrev(r.result);r.readAsDataURL(f);}} onClear={()=>{setAdImg(null);setAdImgPrev(null);}} label="Ad Image (optional)"/>
        </div>
      </Card>
      {steps.length>0 && <Card><h3 className="text-sm font-bold text-gray-900 dark:text-white mb-3 uppercase tracking-wide">Build Progress</h3><StepIndicator steps={steps}/></Card>}
      <Button onClick={launch} loading={running} className="w-full" size="lg">🚀 Create Campaign (starts Paused)</Button>
    </div>
  );
}

// ─────────────────────────────────────────────
// MODULE 2 — CAMPAIGN DASHBOARD
// ─────────────────────────────────────────────
function CampaignDashboard({ settings }) {
  const toast = useToast();
  const [campaigns,  setCampaigns]  = useState([]);
  const [loading,    setLoading]    = useState(false);
  const [filter,     setFilter]     = useState('all');
  const [togglingId, setTogglingId] = useState(null);

  const load = async () => {
    const token=settings.metaToken;
    if (!token) { toast.error('Meta User Access Token not set in Settings'); return; }
    setLoading(true);
    try {
      const data=await gGet(`/${AD_ACCOUNT_ID}/campaigns`,{ fields:'name,status,objective,daily_budget,insights{spend,impressions,clicks,ctr}',limit:100 },token);
      setCampaigns(data.data||[]);
    } catch(e) { toast.error(`Failed: ${e.message}`); }
    finally    { setLoading(false); }
  };

  useEffect(()=>{ load(); },[]);

  const toggleStatus = async (camp) => {
    const token=settings.metaToken;
    if(!token) { toast.error('Meta User Access Token not set'); return; }
    const newStatus=camp.status==='ACTIVE'?'PAUSED':'ACTIVE';
    setTogglingId(camp.id);
    try {
      await gPost(`/${camp.id}`,{status:newStatus},token);
      setCampaigns(p=>p.map(c=>c.id===camp.id?{...c,status:newStatus}:c));
      toast.success(`Campaign ${newStatus==='ACTIVE'?'resumed':'paused'}`);
    } catch(e) { toast.error(`Failed: ${e.message}`); }
    finally    { setTogglingId(null); }
  };

  const storeOf = name => STORES.find(s=>(name||'').startsWith(`[${s.name}]`));
  const filtered = filter==='all'?campaigns:campaigns.filter(c=>storeOf(c.name)?.id===filter);
  const insight  = (c,f) => c.insights?.data?.[0]?.[f]??null;
  const statusColor = s=>({ACTIVE:'green',PAUSED:'yellow',DELETED:'red',ARCHIVED:'gray'}[s]||'gray');

  return (
    <Card>
      <div className="flex items-center gap-3 mb-4 flex-wrap">
        <h2 className="text-base font-bold text-gray-900 dark:text-white flex-1">📊 Campaign Dashboard</h2>
        <Select value={filter} onChange={e=>setFilter(e.target.value)} className="w-auto text-xs">
          <option value="all">All Stores</option>
          {STORES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </Select>
        <Button variant="secondary" size="sm" onClick={load} loading={loading}>Refresh</Button>
      </div>
      {!loading&&filtered.length===0 && <div className="text-center py-12 text-gray-400 dark:text-gray-500 text-sm">No campaigns found.</div>}
      {filtered.length>0 && (
        <div className="overflow-x-auto -mx-1">
          <table className="w-full text-sm min-w-[700px]">
            <thead>
              <tr className="border-b border-gray-100 dark:border-gray-700">
                {['Campaign','Store','Status','Budget/day','Spend','Impressions','CTR',''].map(h=>(
                  <th key={h} className="text-left py-2 px-3 text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wide whitespace-nowrap">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-50 dark:divide-gray-700/50">
              {filtered.map(c => {
                const s=storeOf(c.name);
                const displayName=s?c.name.replace(`[${s.name}] `,''):c.name;
                const spend=insight(c,'spend'), imps=insight(c,'impressions'), ctr=insight(c,'ctr');
                return (
                  <tr key={c.id} className="hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
                    <td className="py-3 px-3"><p className="font-medium text-gray-900 dark:text-gray-100 max-w-[180px] truncate" title={displayName}>{displayName}</p><p className="text-xs text-gray-400 font-mono">{c.id}</p></td>
                    <td className="py-3 px-3">{s?<Badge color="indigo">{s.name.split(' ')[0]}</Badge>:<span className="text-xs text-gray-400">—</span>}</td>
                    <td className="py-3 px-3"><Badge color={statusColor(c.status)}>{c.status}</Badge></td>
                    <td className="py-3 px-3 text-gray-700 dark:text-gray-300">{fmtBudget(c.daily_budget)}</td>
                    <td className="py-3 px-3 text-gray-700 dark:text-gray-300">{spend!==null?`$${parseFloat(spend).toFixed(2)}`:'—'}</td>
                    <td className="py-3 px-3 text-gray-700 dark:text-gray-300">{imps!==null?fmtNum(imps):'—'}</td>
                    <td className="py-3 px-3 text-gray-700 dark:text-gray-300">{ctr!==null?fmtCTR(ctr):'—'}</td>
                    <td className="py-3 px-3"><Button variant={c.status==='ACTIVE'?'danger':'success'} size="sm" loading={togglingId===c.id} onClick={()=>toggleStatus(c)}>{c.status==='ACTIVE'?'Pause':'Resume'}</Button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </Card>
  );
}

// ─────────────────────────────────────────────
// PRODUCT LIBRARY
// ─────────────────────────────────────────────
function ProductLibrary() {
  const toast    = useToast();
  const [storeId,     setStoreId]     = useState(STORES[0].id);
  const [catFilter,   setCatFilter]   = useState('all');
  const [showForm,    setShowForm]    = useState(false);
  const [formImg,     setFormImg]     = useState(null);
  const [formPrev,    setFormPrev]    = useState(null);
  const [formName,    setFormName]    = useState('');
  const [formSize,    setFormSize]    = useState('750ml');
  const [formCat,     setFormCat]     = useState('');
  const [formNotes,   setFormNotes]   = useState('');
  const [saving,      setSaving]      = useState(false);
  const [deleting,    setDeleting]    = useState(null);
  const fileRef = useRef();
  const { images, add, remove } = useBrandImageLibrary(storeId);

  const handleFile = file => {
    if (!file) return;
    setFormImg(file);
    const r=new FileReader(); r.onload=()=>setFormPrev(r.result); r.readAsDataURL(file);
  };

  const resetForm = () => {
    setFormImg(null); setFormPrev(null); setFormName(''); setFormSize('750ml'); setFormCat(''); setFormNotes(''); setShowForm(false);
  };

  const saveProduct = async () => {
    if (!formImg)       { toast.error('Upload a product image'); return; }
    if (!formName.trim()){ toast.error('Enter a product name'); return; }
    if (!formCat)       { toast.error('Select a category'); return; }
    setSaving(true);
    try {
      await add({ product_name:formName.trim(), size:formSize, category:formCat, notes:formNotes.trim(), data:formPrev });
      toast.success('Product added to library!');
      resetForm();
    } catch(e) { toast.error(e.message); }
    finally { setSaving(false); }
  };

  const deleteProduct = async (id) => {
    setDeleting(id);
    try { await remove(id); toast.success('Removed.'); }
    catch(e) { toast.error(e.message); }
    finally { setDeleting(null); }
  };

  const catCounts = {};
  images.forEach(i=>{ catCounts[i.category]=(catCounts[i.category]||0)+1; });
  const filtered = catFilter==='all' ? images : images.filter(i=>i.category===catFilter);
  const usedCats = LIQUOR_CATEGORIES.filter(c=>catCounts[c.id]);

  return (
    <div className="space-y-4">
      {/* Header */}
      <div className="flex items-center gap-3 flex-wrap">
        <Select value={storeId} onChange={e=>setStoreId(e.target.value)} className="w-auto text-sm">
          {STORES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </Select>
        <div className="flex-1"/>
        <Button onClick={()=>setShowForm(v=>!v)} variant={showForm?'secondary':'primary'} size="sm">
          {showForm?'✕ Cancel':'+ Add Product'}
        </Button>
      </div>

      {/* Add product form */}
      {showForm && (
        <Card className="border-2 border-indigo-200 dark:border-indigo-700">
          <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4 uppercase tracking-wide">Add Product</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            {/* Image upload */}
            <div className="sm:col-span-2">
              <Label>Product Photo</Label>
              <div className="flex items-center gap-3 flex-wrap">
                <Button variant="secondary" size="sm" onClick={()=>fileRef.current?.click()}>📷 Choose Image</Button>
                {formImg && <span className="text-xs text-gray-500 truncate max-w-xs">{formImg.name}</span>}
                {formImg && <button onClick={()=>{setFormImg(null);setFormPrev(null);}} className="text-xs text-red-500 hover:underline">Remove</button>}
              </div>
              <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={e=>handleFile(e.target.files[0])}/>
              {formPrev && <img src={formPrev} alt="" className="mt-2 h-28 rounded-xl object-contain border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 p-1"/>}
            </div>
            <div>
              <Label>Product Name</Label>
              <Input value={formName} onChange={e=>setFormName(e.target.value)} placeholder="e.g. Maker's Mark Bourbon"/>
            </div>
            <div>
              <Label>Size</Label>
              <Select value={formSize} onChange={e=>setFormSize(e.target.value)}>
                {BOTTLE_SIZES.map(s=><option key={s} value={s}>{s}</option>)}
              </Select>
            </div>
            <div className="sm:col-span-2">
              <Label>Category</Label>
              <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
                {LIQUOR_CATEGORIES.map(c=>(
                  <label key={c.id} className={`flex items-center gap-1.5 p-2 rounded-xl border cursor-pointer text-xs transition-all ${formCat===c.id?'border-indigo-500 bg-indigo-50 dark:bg-indigo-950/50 text-indigo-700 dark:text-indigo-300':'border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-400 hover:border-indigo-300'}`}>
                    <input type="radio" name="formCat" value={c.id} checked={formCat===c.id} onChange={()=>setFormCat(c.id)} className="hidden"/>
                    <span>{c.icon}</span><span className="font-medium">{c.label}</span>
                  </label>
                ))}
              </div>
            </div>
            <div className="sm:col-span-2">
              <Label>Notes (optional)</Label>
              <Input value={formNotes} onChange={e=>setFormNotes(e.target.value)} placeholder="e.g. Our best-seller, BC exclusive, seasonal"/>
            </div>
          </div>
          <div className="mt-4 flex gap-2">
            <Button onClick={saveProduct} loading={saving} className="flex-1">Save to Library</Button>
            <Button onClick={resetForm} variant="secondary">Cancel</Button>
          </div>
        </Card>
      )}

      {/* Category filter */}
      {images.length>0 && (
        <div className="flex gap-2 overflow-x-auto pb-1">
          <button onClick={()=>setCatFilter('all')} className={`flex-shrink-0 px-3 py-1.5 rounded-xl text-xs font-semibold transition-all border ${catFilter==='all'?'bg-indigo-600 text-white border-indigo-600':'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 border-gray-200 dark:border-gray-700 hover:border-indigo-300'}`}>
            All ({images.length})
          </button>
          {usedCats.map(c=>(
            <button key={c.id} onClick={()=>setCatFilter(c.id)} className={`flex-shrink-0 px-3 py-1.5 rounded-xl text-xs font-semibold transition-all border flex items-center gap-1 ${catFilter===c.id?'bg-indigo-600 text-white border-indigo-600':'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 border-gray-200 dark:border-gray-700 hover:border-indigo-300'}`}>
              {c.icon} {c.label} <span className="opacity-70">({catCounts[c.id]})</span>
            </button>
          ))}
        </div>
      )}

      {/* Product grid */}
      {filtered.length===0 && !showForm && (
        <div className="text-center py-16 text-gray-400 dark:text-gray-500">
          <p className="text-4xl mb-3">📦</p>
          <p className="text-sm font-medium">No products yet</p>
          <p className="text-xs mt-1">Click "+ Add Product" to build your library</p>
        </div>
      )}
      {filtered.length>0 && (
        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-3">
          {filtered.map(p=>{
            const cat = LIQUOR_CATEGORIES.find(c=>c.id===p.category);
            return (
              <div key={p.id} className="bg-white dark:bg-gray-800 rounded-xl border border-gray-100 dark:border-gray-700 overflow-hidden group hover:border-indigo-300 dark:hover:border-indigo-600 transition-all shadow-sm">
                <div className="relative">
                  <img src={p.data} alt={p.product_name} className="w-full aspect-square object-cover"/>
                  <button onClick={()=>deleteProduct(p.id)} disabled={deleting===p.id}
                    className="absolute top-1.5 right-1.5 bg-red-500 text-white rounded-full w-6 h-6 text-xs items-center justify-center hidden group-hover:flex hover:bg-red-600 transition-colors">
                    {deleting===p.id?'…':'✕'}
                  </button>
                </div>
                <div className="p-2.5">
                  <p className="text-xs font-bold text-gray-900 dark:text-gray-100 leading-tight truncate" title={p.product_name}>{p.product_name}</p>
                  <div className="flex items-center gap-1 mt-1.5 flex-wrap">
                    <span className="px-1.5 py-0.5 rounded-md bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400 text-xs font-medium">{p.size}</span>
                    {cat && <span className="px-1.5 py-0.5 rounded-md bg-indigo-50 dark:bg-indigo-950/50 text-indigo-700 dark:text-indigo-300 text-xs font-medium">{cat.icon} {cat.label}</span>}
                  </div>
                  {p.notes && <p className="text-xs text-gray-400 mt-1 truncate" title={p.notes}>{p.notes}</p>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// IMAGE GENERATOR
// ─────────────────────────────────────────────
function ImageGenerator({ settings, onUseInPost }) {
  const toast = useToast();
  const [storeId,    setStoreId]    = useState(STORES[0].id);
  const [brief,      setBrief]      = useState('');
  const [size,       setSize]       = useState('1024x1024');
  const [prodFile,   setProdFile]   = useState(null);
  const [prodPrev,   setProdPrev]   = useState(null);
  const [editPrompt, setEditPrompt] = useState('');
  const [showPrompt, setShowPrompt] = useState(false);
  const [genStep,    setGenStep]    = useState('idle');
  const [result,     setResult]     = useState(null);
  const [brand,      setBrand]      = useState({ ...BRAND_DEFAULTS });
  const [logo,       setLogo]       = useState(null);
  const [history,    setHistory]    = useState([]);
  const [showLib,    setShowLib]    = useState(false);
  const { images:libImages, save:saveToLib, remove:removeFromLib } = useProductLibrary(storeId);
  const prodRef = useRef();

  const store     = STORES.find(s=>s.id===storeId);
  const dalleSize = IMAGE_SIZES.find(s=>s.value===size)?.dalleSize||'1024x1024';

  // Load brand profile from Supabase when store changes
  useEffect(()=>{
    const sb=getSB(); if(!sb) return;
    sb.from('brand_profiles').select('*').eq('store_id',storeId).maybeSingle()
      .then(({data})=>{
        if (data) { const {logo_data,...p}=data; setBrand({...BRAND_DEFAULTS,...p}); setLogo(logo_data||null); }
        else      { setBrand({...BRAND_DEFAULTS}); setLogo(null); }
      });
  },[storeId]);

  // Load generation history from Supabase
  useEffect(()=>{
    const sb=getSB(); if(!sb) return;
    sb.from('generation_history').select('*').order('created_at',{ascending:false}).limit(24)
      .then(({data})=>setHistory(data||[]));
  },[]);

  const handleProd = file => {
    if (!file) return;
    setProdFile(file);
    const r=new FileReader();
    r.onload=async()=>{
      setProdPrev(r.result);
      try { await saveToQuickLib(file.name, r.result); } catch{}
    };
    r.readAsDataURL(file);
  };

  const selectFromLib = (img) => {
    setProdPrev(img.data);
    fetch(img.data).then(r=>r.blob()).then(blob=>{
      const f=new File([blob], img.product_name||'product', {type:'image/jpeg'});
      setProdFile(f);
    }).catch(()=>{});
    setShowLib(false);
    toast.info(`Selected: ${img.product_name||img.name}`);
  };

  const assemblePrompt = async () => {
    const apiKey=settings.openaiKey;
    if (!apiKey) { toast.error('Add your OpenAI API key in Settings'); return null; }
    let productDesc='';
    if (prodFile) {
      setGenStep('analyzing');
      const b64=await fileToBase64(prodFile);
      productDesc=await openAIDescribeImage(b64,prodFile.type||'image/jpeg',apiKey);
    }
    setGenStep('building');
    const parts=[`Professional social media image for "${store.name}", an independent retail liquor store in British Columbia, Canada.`];
    if (brand.visual_style)   parts.push(`Visual style: ${brand.visual_style}.`);
    if (brand.mood)           parts.push(`Mood: ${brand.mood}.`);
    if (brand.style_keywords) parts.push(`Style keywords: ${brand.style_keywords}.`);
    if (brand.primary_color&&brand.secondary_color) parts.push(`Brand colours: primary ${brand.primary_color}, secondary ${brand.secondary_color}.`);
    if (brand.avoid_visually) parts.push(`Do NOT include: ${brand.avoid_visually}.`);
    if (productDesc)          parts.push(`Feature this product prominently: ${productDesc}`);
    if (brief.trim())         parts.push(`Creative direction: ${brief.trim()}.`);
    parts.push('High-quality commercial photography. No text or words in the image unless specified. Suitable for Facebook and Instagram.');
    return parts.join(' ');
  };

  const previewPrompt = async () => {
    try { const p=await assemblePrompt(); if(p){setEditPrompt(p);setShowPrompt(true);setGenStep('idle');} }
    catch(e) { toast.error(e.message); setGenStep('idle'); }
  };

  const generate = async () => {
    const apiKey=settings.openaiKey;
    if (!apiKey) { toast.error('Add your OpenAI API key in Settings'); return; }
    setResult(null);
    try {
      let prompt;
      if (showPrompt&&editPrompt.trim()) { prompt=editPrompt.trim(); setGenStep('generating'); }
      else { prompt=await assemblePrompt(); if(!prompt) return; setEditPrompt(prompt); setShowPrompt(true); setGenStep('generating'); }

      const img=await openAIGenerateImage(prompt,dalleSize,apiKey);
      setResult(img);
      setGenStep('done');
      toast.success('Image generated!');

      // Save to Supabase
      const sb=getSB();
      if (sb) {
        await sb.from('generation_history').insert({ store_id:storeId, store_name:store.name, image_url:img.url, revised_prompt:img.revised, brief, size_label:size, prompt });
        const {data}=await sb.from('generation_history').select('*').order('created_at',{ascending:false}).limit(24);
        setHistory(data||[]);
      }
    } catch(e) { setGenStep('error'); toast.error(`Generation failed: ${e.message}`); }
  };

  const storeHistory = history.filter(h=>h.store_id===storeId);
  const isBusy = ['analyzing','building','generating'].includes(genStep);
  const stepLabel = { analyzing:'🔍 Analysing product image…', building:'⚙️ Building prompt…', generating:'🎨 Generating image…' };

  return (
    <div className="grid grid-cols-1 xl:grid-cols-2 gap-5">
      <div className="space-y-4">
        <Card>
          <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4 uppercase tracking-wide">🖼 Generate Image</h3>
          <div className="mb-4">
            <Label>Store</Label>
            <Select value={storeId} onChange={e=>{setStoreId(e.target.value);setResult(null);setShowPrompt(false);}}>
              {STORES.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </Select>
            <div className="flex items-center gap-2 mt-2 flex-wrap">
              {logo && <img src={logo} alt="logo" className="h-7 w-7 rounded object-contain bg-white border border-gray-200 p-0.5"/>}
              {brand.personality && brand.personality.split(',').slice(0,3).map((p,i)=><Badge key={i} color="indigo">{p.trim()}</Badge>)}
              {brand.style_keywords && brand.style_keywords.split(',').slice(0,2).map((k,i)=><Badge key={i} color="gray">{k.trim()}</Badge>)}
              {!brand.personality&&!brand.style_keywords && <span className="text-xs text-amber-600 dark:text-amber-400">⚠ No brand profile — add one in the Brand Profile tab</span>}
            </div>
          </div>
          <div className="mb-4"><Label>Image Brief</Label><Textarea value={brief} onChange={e=>setBrief(e.target.value)} rows={3} placeholder="e.g. A bottle of Maker's Mark on a warm wooden bar with BC mountain scenery. Cozy summer evening."/></div>
          <div className="mb-4">
            <div className="flex items-center justify-between mb-1">
              <Label className="mb-0">Product Reference Photo (optional)</Label>
              {libImages.length>0 && <button onClick={()=>setShowLib(v=>!v)} className="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline">{showLib?'Hide Library ↑':`📚 Library (${libImages.length})`}</button>}
            </div>
            <p className="text-xs text-gray-500 dark:text-gray-400 mb-2">GPT-4o Vision will describe it and weave it into the prompt. Photos are auto-saved to your library.</p>
            <div className="flex items-center gap-2 flex-wrap">
              <Button variant="secondary" size="sm" onClick={()=>prodRef.current?.click()}>📦 Upload Product Photo</Button>
              {prodFile && <span className="text-xs text-gray-600 dark:text-gray-400 truncate max-w-xs">{prodFile.name}</span>}
              {prodFile && <button onClick={()=>{setProdFile(null);setProdPrev(null);}} className="text-xs text-red-500 hover:underline">Remove</button>}
            </div>
            <input ref={prodRef} type="file" accept="image/*" className="hidden" onChange={e=>handleProd(e.target.files[0])}/>
            {prodPrev && <img src={prodPrev} alt="" className="mt-2 h-24 rounded-xl object-contain border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 p-1"/>}

            {/* Product Library */}
            {showLib && (
              <div className="mt-3 p-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-750">
                <p className="text-xs font-semibold text-gray-600 dark:text-gray-400 mb-2 uppercase tracking-wide">Product Library — {STORES.find(s=>s.id===storeId)?.name}</p>
                <div className="grid grid-cols-5 gap-2">
                  {libImages.map(img=>(
                    <div key={img.id} className="relative group">
                      <img src={img.data} alt={img.name} title={img.name}
                        onClick={()=>selectFromLib(img)}
                        className="w-full aspect-square object-cover rounded-lg border border-gray-200 dark:border-gray-600 cursor-pointer hover:border-indigo-400 hover:opacity-90 transition-all"/>
                      <button onClick={()=>removeFromLib(img.id)}
                        className="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 text-xs items-center justify-center hidden group-hover:flex leading-none">✕</button>
                      <p className="text-xs text-gray-400 mt-0.5 truncate">{img.name}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
          <div className="mb-4">
            <Label>Image Size</Label>
            <div className="grid grid-cols-2 gap-2">
              {IMAGE_SIZES.map(s=>(
                <label key={s.value} className={`flex items-start gap-2 p-2.5 rounded-xl border cursor-pointer transition-all ${size===s.value?'border-indigo-500 bg-indigo-50 dark:bg-indigo-950/50':'border-gray-200 dark:border-gray-700 hover:border-indigo-300'}`}>
                  <input type="radio" name="imgSize" value={s.value} checked={size===s.value} onChange={()=>setSize(s.value)} className="mt-0.5 flex-shrink-0"/>
                  <div>
                    <p className="text-xs font-bold text-gray-800 dark:text-gray-200">{s.label}</p>
                    <p className="text-xs text-gray-500">{s.desc}</p>
                    {s.dalleSize!==s.value && <p className="text-xs text-amber-600 dark:text-amber-400">Renders at {s.dalleSize}</p>}
                  </div>
                </label>
              ))}
            </div>
          </div>
          <div className="mb-5">
            <div className="flex items-center justify-between mb-1">
              <Label className="mb-0">DALL-E 3 Prompt</Label>
              <button onClick={previewPrompt} disabled={isBusy} className="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline disabled:opacity-50">⚙ Preview &amp; Edit Prompt</button>
            </div>
            {showPrompt
              ? <Textarea value={editPrompt} onChange={e=>setEditPrompt(e.target.value)} rows={6} className="text-xs font-mono"/>
              : <div className="rounded-xl border border-dashed border-gray-200 dark:border-gray-700 p-3 text-xs text-gray-400 italic">Click "Preview &amp; Edit Prompt" to see the auto-built prompt — or just click Generate.</div>}
          </div>
          <Button onClick={generate} loading={isBusy} className="w-full" size="lg">
            {isBusy?(stepLabel[genStep]||'Working…'):'🎨 Generate Image'}
          </Button>
        </Card>
      </div>
      <div className="space-y-4">
        {result && (
          <Card>
            <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
              <h3 className="text-sm font-bold text-gray-900 dark:text-white uppercase tracking-wide">Result</h3>
              <div className="flex gap-2">
                {onUseInPost && (
                  <Button variant="success" size="sm" onClick={()=>onUseInPost(result.url)}>
                    📝 Use in Post
                  </Button>
                )}
                <a href={result.url} download="generated.png" target="_blank" rel="noopener noreferrer"><Button variant="secondary" size="sm">⬇ Download</Button></a>
              </div>
            </div>
            <img src={result.url} alt="Generated" className="w-full rounded-xl border border-gray-200 dark:border-gray-600 shadow-md"/>
            {result.revised && <details className="mt-3"><summary className="text-xs text-gray-400 cursor-pointer hover:text-gray-600 dark:hover:text-gray-300 select-none">DALL-E revised prompt ↓</summary><p className="text-xs text-gray-500 dark:text-gray-400 mt-1.5 font-mono leading-relaxed">{result.revised}</p></details>}
          </Card>
        )}
        {storeHistory.length>0 && (
          <Card>
            <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-3 uppercase tracking-wide">Recent — {store.name}</h3>
            <div className="grid grid-cols-4 gap-1.5">
              {storeHistory.slice(0,8).map(h=>(
                <a key={h.id} href={h.image_url} target="_blank" rel="noopener noreferrer" title={h.brief||'Generated image'}>
                  <img src={h.image_url} alt="" className="w-full aspect-square object-cover rounded-lg border border-gray-200 dark:border-gray-600 hover:opacity-75 transition-opacity"/>
                </a>
              ))}
            </div>
            <p className="text-xs text-gray-400 mt-2.5">⚠ DALL-E URLs expire in ~1 hour — download images to keep them.</p>
          </Card>
        )}
        {storeHistory.length===0&&!result && (
          <Card><div className="text-center py-10 text-gray-400 dark:text-gray-500 text-sm"><p className="text-3xl mb-2">🖼</p><p>Generated images appear here.</p><p className="text-xs mt-1">Set a brand profile first for best results.</p></div></Card>
        )}
      </div>
    </div>
  );
}

      </Card>
      <Card>
        <h2 className="text-base font-bold text-gray-900 dark:text-white mb-1">AI Copy Writer — Anthropic</h2>
        <p className="text-xs text-gray-500 dark:text-gray-400 mb-4">Used client-side with Claude Haiku to generate post captions and ad copy.<br/>Get yours at <a href="https://console.anthropic.com/" target="_blank" rel="noopener" className="text-indigo-600 dark:text-indigo-400 underline">console.anthropic.com</a>.</p>
        <Input type="password" value={form.anthropicKey||''} onChange={e=>setForm(f=>({...f,anthropicKey:e.target.value}))} placeholder="sk-ant-xxxxx…"/>
      </Card>
      <Card>
        <h2 className="text-base font-bold text-gray-900 dark:text-white mb-1">AI Image Generator — OpenAI</h2>
        <p className="text-xs text-gray-500 dark:text-gray-400 mb-4">Used client-side with DALL-E 3 (images) and GPT-4o Mini Vision (product analysis).<br/>Get yours at <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener" className="text-indigo-600 dark:text-indigo-400 underline">platform.openai.com</a>.</p>
        <Input type="password" value={form.openaiKey||''} onChange={e=>setForm(f=>({...f,openaiKey:e.target.value}))} placeholder="sk-xxxxx…"/>
      </Card>
      <Button onClick={save} loading={saving} size="lg" className="w-full">Save All Settings</Button>
      <p className="text-xs text-center text-gray-400 dark:text-gray-500">All keys are encrypted at rest in Supabase and protected by Row Level Security — only authenticated users can read them.</p>
    </div>
  );
}

// ─────────────────────────────────────────────
// AUTHENTICATED APP (main shell)
// ─────────────────────────────────────────────
function AuthenticatedApp({ user, dark, onDark }) {
  const toast = useToast();
  const [page,           setPage]           = useState('posts');
  const [settingsLoaded, setSettingsLoaded] = useState(false);
  const [settings,       setSettings]       = useState({
    tokens: Object.fromEntries(STORES.map(s=>[s.id,''])),
    metaToken:'', anthropicKey:'', openaiKey:'',
  });

  // Load settings from Supabase on mount
  useEffect(()=>{
    const sb=getSB(); if(!sb) return;
    Promise.all([
      sb.from('store_tokens').select('store_id,page_token'),
      sb.from('api_keys').select('key_name,key_value'),
    ]).then(([{data:tokens},{data:keys}])=>{
      const tMap=Object.fromEntries(STORES.map(s=>[s.id,'']));
      (tokens||[]).forEach(r=>{ if(r.store_id in tMap) tMap[r.store_id]=r.page_token||''; });
      const kMap=Object.fromEntries((keys||[]).map(r=>[r.key_name,r.key_value||'']));
      setSettings({ tokens:tMap, metaToken:kMap.meta_token||'', anthropicKey:kMap.anthropic_key||'', openaiKey:kMap.openai_key||'' });
    }).catch(()=>{}).finally(()=>setSettingsLoaded(true));
  },[]);

  const saveSettings = async (s) => {
    const sb=getSB(); if(!sb) throw new Error('Supabase not connected');
    const [r1,r2]=await Promise.all([
      sb.from('store_tokens').upsert(STORES.map(st=>({store_id:st.id,page_token:s.tokens[st.id]||''})),{onConflict:'store_id'}),
      sb.from('api_keys').upsert([
        {key_name:'meta_token',    key_value:s.metaToken    ||''},
        {key_name:'anthropic_key', key_value:s.anthropicKey ||''},
        {key_name:'openai_key',    key_value:s.openaiKey    ||''},
      ],{onConflict:'key_name'}),
    ]);
    if(r1.error) throw r1.error;
    if(r2.error) throw r2.error;
    setSettings(s);
  };

  const signOut = async () => {
    await getSB().auth.signOut();
    ls.set('smm_sb_url',''); ls.set('smm_sb_key','');
    _sb=null;
    window.location.reload();
  };

  const nav = [
    { id:'posts',    icon:'📝', label:'Posts' },
    { id:'ads',      icon:'📣', label:'Ads' },
    { id:'brand',    icon:'🎨', label:'Brand' },
    { id:'settings', icon:'⚙️', label:'Settings' },
  ];

  if (!settingsLoaded) return (
    <div className="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-gray-900">
      <div className="text-center"><div className="text-4xl mb-3">🥃</div><p className="text-gray-500 dark:text-gray-400 text-sm animate-pulse">Loading settings…</p></div>
    </div>
  );

  return (
    <div className="min-h-screen flex flex-col bg-gray-100 dark:bg-gray-900 transition-colors">
      <header className="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-30">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14">
          <div className="flex items-center gap-2.5">
            <span className="text-2xl">🥃</span>
            <div>
              <p className="text-sm font-bold text-gray-900 dark:text-white leading-none">Liquor Store Social</p>
              <p className="text-xs text-gray-400 leading-none mt-0.5">4 locations · Meta v21</p>
            </div>
          </div>
          <div className="flex items-center gap-1">
            {nav.map(n=>(
              <button key={n.id} onClick={()=>setPage(n.id)} className={`px-3 py-2 rounded-xl text-sm font-semibold transition-all ${page===n.id?'bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300':'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-gray-200'}`}>
                <span className="mr-1">{n.icon}</span><span className="hidden sm:inline">{n.label}</span>
              </button>
            ))}
            <button onClick={()=>onDark(d=>!d)} className="ml-1 p-2 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="Toggle dark mode">{dark?'☀️':'🌙'}</button>
            <button onClick={signOut} className="ml-1 p-2 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title={`Sign out (${user?.email})`}>👤</button>
          </div>
        </div>
      </header>
      <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 py-6">
        {page==='posts'    && <PostsPage    settings={settings}/>}
        {page==='ads'      && <AdsPage      settings={settings}/>}
        {page==='brand'    && <BrandPage    settings={settings}/>}
        {page==='settings' && <SettingsPage settings={settings} onSave={saveSettings}/>}
      </main>
      <footer className="text-center py-3 text-xs text-gray-300 dark:text-gray-600">
        Liquor Store Social · Supabase · Graph API v21.0 · {user?.email}
      </footer>
    </div>
  );
}

// ─────────────────────────────────────────────
// ROOT APP (auth routing)
// ─────────────────────────────────────────────
function App() {
  const [dark,         setDark]         = useState(()=>ls.get('smm_dark',false));
  const [sbReady,      setSbReady]      = useState(()=>!!(ls.get('smm_sb_url','')&&ls.get('smm_sb_key','')));
  const [authState,    setAuthState]    = useState('checking');
  const [user,         setUser]         = useState(null);

  useEffect(()=>{
    document.documentElement.classList.toggle('dark',dark);
    ls.set('smm_dark',dark);
  },[dark]);

  useEffect(()=>{
    if (!sbReady) return;
    const sb=getSB(); if(!sb) return;
    sb.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);
      setAuthState(session?'authed':'anon');
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
      setAuthState(session?'authed':'anon');
    });
    return ()=>subscription.unsubscribe();
  },[sbReady]);

  if (!sbReady) return (
    <ToastProvider>
      <SetupScreen onSetup={()=>setSbReady(true)}/>
    </ToastProvider>
  );

  if (authState==='checking') return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900">
      <div className="text-center"><div className="text-4xl mb-3">🥃</div><p className="text-gray-400 text-sm animate-pulse">Connecting…</p></div>
    </div>
  );

  if (authState==='anon') return (
    <ToastProvider>
      <LoginScreen/>
    </ToastProvider>
  );

  return (
    <ToastProvider>
      <AuthenticatedApp user={user} dark={dark} onDark={setDark}/>
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
