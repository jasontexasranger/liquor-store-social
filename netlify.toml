# Netlify configuration for Liquor Store Social Media Manager
# Static site — no build step required

[build]
  # No build command — index.html is already the final artifact
  publish = "."

# Serve index.html for all routes (single-page app)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"

  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), camera=(), microphone=()"
    # Allow connections to Meta Graph API, Anthropic, OpenAI, and Supabase
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; connect-src 'self' https://graph.facebook.com https://api.anthropic.com https://api.openai.com https://*.supabase.co; img-src 'self' data: blob: https://*.fbcdn.net https://oaidalleapiprodscus.blob.core.windows.net https://*.supabase.co; font-src 'self' data:; frame-ancestors 'none';"
